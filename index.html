o:["Para evitar fuga de información del test al entrenamiento (data leakage)","Porque el conjunto de test no admite transformaciones","Para que el test tenga una media distinta de cero"],c:0,
e:"Si calculas medias/máximos usando también el test, estás filtrando información del test al proceso de entrenamiento y la evaluación deja de ser realista. Se hace fit en train y transform en train y test."},
{m:"M1",p:1,t:"(PEC) Al dividir un dataset desbalanceado en train/test conviene usar una partición estratificada para...",
o:["mantener la misma proporción de clases en ambos conjuntos","que el test tenga más ejemplos de la clase minoritaria que el train","reducir el número de atributos"],c:0,
e:"La estratificación conserva la distribución de la variable objetivo en cada partición, evitando modelos y evaluaciones sesgados, tal como recomiendan los materiales al hablar de particiones aleatorias."},
/* ---------- M2 ---------- */
{m:"M2",t:"En Naive Bayes, con P(poisonous)=3/7 y siendo 2 de los 3 ejemplos venenosos de color blanco, ¿cuánto vale P(cap-color=white | poisonous)?",
o:["2/3","3/7","2/7"],c:0,
e:"P(valor|clase) se estima por frecuencia relativa dentro de la clase: de los 3 venenosos, 2 son blancos → 2/3 ≈ 0.67."},
{m:"M2",t:"¿Qué algoritmo asume explícitamente la independencia condicional de los atributos dada la clase?",
o:["Naive Bayes","Regresión logística","SVM con kernel RBF"],c:0,
e:"Es la suposición «naive»: P(x₁..xₘ|k) ≈ Π P(xᵢ|k). La regresión logística no asume esa independencia (combina pruebas de diferentes fuentes de forma flexible)."},
{m:"M2",t:"En kNN con k=3, los vecinos más cercanos de un ejemplo tienen clases [setosa, setosa, versicolor]. La predicción es...",
o:["setosa, por ser la clase más frecuente entre los 3 vecinos","versicolor, por ser el vecino más cercano","empate: no se puede predecir"],c:0,
e:"kNN vota entre los k vecinos: setosa gana 2 a 1. Solo con k=1 mandaría únicamente el vecino más cercano."},
{m:"M2",t:"¿Por qué se recomienda elegir k impar o primo en kNN?",
o:["Para minimizar la posibilidad de empates en la votación","Para reducir el coste computacional del entrenamiento","Porque mejora la convergencia del descenso de gradiente"],c:0,
e:"Con k par es más fácil que haya empate entre clases en la votación. kNN no usa descenso de gradiente ni tiene fase de entrenamiento costosa."},
{m:"M2",t:"El conjunto S tiene 4 ejemplos «edible» y 3 «poisonous» y entropía H(S)=0.985. Esto indica que el conjunto...",
o:["está bastante mezclado (cerca del máximo desorden)","es prácticamente puro","tiene una sola clase"],c:0,
e:"La entropía binaria máxima es 1 (50/50). 0.985 está muy cerca: el 4/7 vs 3/7 es casi un reparto al 50 %, máximo desorden."},
{m:"M2",t:"En un árbol de decisión, tras particionar por un atributo NOMINAL, ese atributo...",
o:["se elimina y no vuelve a usarse en las ramas inferiores","se reutiliza obligatoriamente en el siguiente nivel","se convierte en numérico"],c:0,
e:"El atributo nominal ya no aporta información tras particionar por él (todos los ejemplos de la rama comparten su valor). Los numéricos con puntos de corte sí pueden reutilizarse."},
{m:"M2",t:"¿Cuál es el mejor punto de corte para un atributo numérico en un árbol de decisión?",
o:["El promedio de dos valores consecutivos (sin repetidos) que maximiza la bondad de la partición","Siempre la media aritmética de todos los valores","El valor máximo del atributo"],c:0,
e:"Se ordenan los valores, se eliminan repetidos, se calculan los candidatos como promedio de cada par consecutivo y se elige el de mejor bondad (p. ej., 5.35 con 66.7 % en el ejemplo del módulo)."},
{m:"M2",t:"La poda (pruning) de un árbol de decisión sirve para...",
o:["evitar hojas que cubren pocos ejemplos y reducir el sobreajuste","acelerar la clasificación de nuevos ejemplos sin cambiar el modelo","aumentar la profundidad efectiva del árbol"],c:0,
e:"Las hojas con pocos ejemplos dan estimaciones poco fiables (sobreajuste). La estrategia habitual: construir el árbol completo y podar de abajo arriba los nodos superfluos."},
{m:"M2",t:"En un clasificador lineal h(x)=signo(⟨w,x⟩+b), la magnitud |⟨w,x⟩+b| puede interpretarse como...",
o:["una medida de la confianza de la predicción (distancia al hiperplano)","la probabilidad exacta de la clase positiva","el error de entrenamiento del modelo"],c:0,
e:"El producto escalar mide la distancia (escalada) del punto al hiperplano: cuanto más lejos, más confianza. No es una probabilidad calibrada."},
{m:"M2",t:"¿Qué propiedad permite usar kernels en las SVM?",
o:["Que en la formulación dual los ejemplos solo aparecen dentro de productos escalares","Que el margen es siempre rígido","Que la solución del problema de optimización no es única"],c:0,
e:"Al aparecer solo ⟨xᵢ,xⱼ⟩, basta sustituirlo por κ(xᵢ,xⱼ)=⟨φ(xᵢ),φ(xⱼ)⟩ para trabajar implícitamente en otro espacio (kernel trick)."},
{m:"M2",t:"En una SVM con kernel RBF, un valor de gamma muy alto produce típicamente...",
o:["fronteras muy ajustadas a los puntos, con riesgo de sobreajuste","fronteras más suaves y generales","que el modelo se vuelva lineal"],c:0,
e:"γ grande hace que la influencia de cada punto sea muy local: la frontera se ciñe a los ejemplos (mucha varianza). γ pequeño suaviza la frontera."},
{m:"M2",t:"Tras entrenar una SVM, observas que casi todos los ejemplos de entrenamiento son vectores de soporte y el entrenamiento ha tardado muchísimo. Esto sugiere que...",
o:["el kernel elegido no encaja bien con los datos y la solución es mala","el modelo ha encontrado el hiperplano óptimo global","los datos eran perfectamente separables"],c:0,
e:"Pocos vectores de soporte y entrenamiento rápido indican buena separabilidad; lo contrario (muchos vectores, mucho tiempo) delata que el kernel no encaja con la estructura de los datos."},
{m:"M2",t:"Para un problema de 4 clases con clasificadores binarios, la estrategia una-contra-una (OvO) requiere...",
o:["6 clasificadores","4 clasificadores","12 clasificadores"],c:0,
e:"OvO entrena C(C−1)/2 = 4·3/2 = 6 clasificadores (uno por par de clases) y decide por votación. OvA requeriría 4."},
{m:"M2",t:"Etiquetar una noticia a la vez como «deportes» y «economía» es un problema de...",
o:["clasificación multietiqueta","clasificación multiclase","regresión multivariante"],c:0,
e:"Multietiqueta = varias etiquetas simultáneas por instancia. Multiclase = una única etiqueta entre más de dos posibles."},
{m:"M2",p:1,t:"(PEC) Entrenas un clasificador con accuracy del 98 % en un dataset donde el 97 % de ejemplos son de la clase negativa. ¿Qué deberías hacer?",
o:["Desconfiar: comparar con el clasificador trivial y mirar precisión/recall o la matriz de confusión","Concluir que el modelo es excelente","Aumentar el umbral de decisión hasta el 100 % de accuracy"],c:0,
e:"Con clases desbalanceadas, predecir siempre la mayoritaria ya da 97 %. Hay que mirar métricas por clase (precision, recall, F1) y la matriz de confusión."},
{m:"M2",p:1,t:"(PEC) ¿Para qué sirve GridSearchCV (búsqueda en rejilla con validación cruzada) en scikit-learn?",
o:["Probar combinaciones de hiperparámetros y elegir la mejor según la validación cruzada","Entrenar varios modelos y promediarlos como un ensemble","Reducir la dimensionalidad de los datos"],c:0,
e:"Grid search recorre una rejilla de hiperparámetros (C, gamma, k…) evaluando cada combinación con validación cruzada sobre el conjunto de entrenamiento, y se queda con la mejor."},
/* ---------- M3 ---------- */
{m:"M3",t:"En la regresión lineal, la función de coste J(θ) basada en el MSE es...",
o:["convexa y derivable: tiene un único mínimo global","no convexa: tiene múltiples mínimos locales","discontinua en el óptimo"],c:0,
e:"Para regresión lineal, J es convexa → el descenso de gradiente llega al mínimo global. En redes neuronales el MSE deja de ser convexo."},
{m:"M3",t:"En la regresión lineal univariante h(x)=θ₁x+θ₀, el parámetro θ₁ controla...",
o:["la pendiente de la recta","el punto de corte con el eje vertical","el error mínimo alcanzable"],c:0,
e:"θ₁ es la pendiente; θ₀ es el punto de corte con el eje vertical (intercept)."},
{m:"M3",t:"En kNN para regresión con ponderación por distancia, los vecinos más cercanos...",
o:["contribuyen más a la predicción que los lejanos","contribuyen igual que los lejanos","se descartan para evitar sobreajuste"],c:0,
e:"La media ponderada usa pesos inversamente proporcionales a la distancia: los puntos próximos a x influyen más en la predicción."},
{m:"M3",t:"En un árbol de regresión, el valor que se asigna a un nodo terminal es...",
o:["la media de los valores y de los ejemplos de entrenamiento que llegan a esa hoja","la clase mayoritaria de la hoja","el valor del ejemplo más cercano al centroide"],c:0,
e:"Se sustituye la etiqueta de clase por un número real que sintetiza las muestras de la hoja, típicamente su media (equivale a una recta de pendiente 0)."},
{m:"M3",t:"El criterio de partición de un árbol de regresión busca el punto de corte que...",
o:["minimiza la suma de las varianzas de y en los dos subconjuntos resultantes","maximiza la entropía de los subconjuntos","maximiza el número de ejemplos por hoja"],c:0,
e:"argmin (Var(A)+Var(B)): la varianza equivale al MSE respecto a la media del subconjunto. La entropía es el criterio de los árboles de clasificación."},
{m:"M3",t:"En un SVR, los puntos del conjunto de entrenamiento que caen dentro de la banda definida por ε...",
o:["no aportan error y no influyen en el modelo final","son los únicos vectores de soporte","se penalizan con coste C"],c:0,
e:"La función de coste ignora los errores ≤ ε: el modelo depende solo de los puntos fuera o en el borde de la banda (los vectores de soporte)."},
{m:"M3",t:"Cinco clasificadores votan: A, A, B, B, B. Por hard voting la predicción es...",
o:["B, con 3 votos contra 2","A, porque sus votos llegaron primero","empate irresoluble"],c:0,
e:"Hard voting = clase más votada: B gana 3-2. El orden de los votos es irrelevante."},
{m:"M3",t:"Tres clasificadores dan estas probabilidades para las clases (A,B): (0.9,0.1), (0.4,0.6), (0.4,0.6). ¿Qué predicen hard y soft voting?",
o:["Hard: B (2 votos a 1); soft: A (media 0.567 vs 0.433)","Hard: A; soft: B","Ambos predicen B"],c:0,
e:"Hard: cada clasificador vota su máximo → B,B,A... es decir A,B,B → gana B. Soft: medias A=(0.9+0.4+0.4)/3≈0.567, B≈0.433 → gana A. El clasificador muy seguro inclina el soft voting."},
{m:"M3",t:"¿Qué técnica de ensemble es especialmente recomendable cuando el conjunto de entrenamiento contiene muestras mal etiquetadas (outliers)?",
o:["Bagging","Boosting","Stacking"],c:0,
e:"En bagging cada outlier solo aparece en algunos subconjuntos bootstrap y su efecto se diluye en la votación. El boosting, al contrario, le daría cada vez más peso."},
{m:"M3",t:"¿Por qué el boosting puede ser problemático con datos muy ruidosos?",
o:["Porque incrementa exponencialmente el peso de los ejemplos difíciles, que a menudo son ruido","Porque entrena los clasificadores en paralelo sin verlos todos","Porque solo funciona con atributos nominales"],c:0,
e:"AdaBoost se centra en lo que no consigue clasificar; si eso es ruido/outliers, les dedica cada vez más esfuerzo y puede sobreajustar."},
{m:"M3",t:"En AdaBoost, la confianza de cada hipótesis débil αt = ½·ln((1−εt)/εt) implica que...",
o:["cuanto menor es el error εt de la regla, mayor es su peso en la combinación final","todas las reglas pesan igual en la decisión","las reglas con error 0.5 reciben el peso máximo"],c:0,
e:"α crece al disminuir ε: una regla con ε=0.25 tiene α≈0.55; con ε=0.5 (azar), α=0 (no aporta). La decisión final es signo(Σ αt·ht(x))."},
{m:"M3",t:"La diferencia esencial entre bagging y boosting en la construcción de los clasificadores es que...",
o:["bagging los construye en paralelo con muestras aleatorias y boosting secuencialmente centrándose en los ejemplos difíciles","bagging usa árboles y boosting usa SVM","bagging necesita etiquetas y boosting no"],c:0,
e:"Bagging: subconjuntos bootstrap independientes, en paralelo. Boosting: secuencial, con una distribución de pesos que se adapta a la dificultad de cada ejemplo."},
{m:"M3",t:"El método random subspace consiste en entrenar cada clasificador del ensemble con...",
o:["un subconjunto aleatorio de los atributos","un subconjunto aleatorio de las clases","una tasa de aprendizaje diferente"],c:0,
e:"Manipula las características de entrada: cada modelo ve solo algunos atributos. (Bagging manipula los ejemplos.)"},
{m:"M3",t:"En el stacked generalization (stacking), el metaclasificador de nivel 1 se entrena usando como entrada...",
o:["las salidas/predicciones de los clasificadores de nivel 0","los atributos originales sin transformar","los pesos de los clasificadores de nivel 0"],c:0,
e:"Stacking aprende a combinar: las predicciones de los modelos base se convierten en los atributos del metamodelo, en lugar de una votación fija."},
{m:"M3",p:1,t:"(PEC) Para construir un ensemble con bootstrap manual, cada subconjunto de entrenamiento se genera...",
o:["muestreando con reemplazo el conjunto original (mismo tamaño, ejemplos repetidos posibles)","muestreando sin reemplazo exactamente la mitad de los datos","ordenando los datos y partiéndolos en bloques"],c:0,
e:"El bootstrap muestrea CON reemplazo: cada subconjunto suele tener el tamaño del original pero con ejemplos repetidos y otros ausentes (~63 % de ejemplos únicos)."},
{m:"M3",p:1,t:"(PEC) Tu regresor tiene R² = 0.95 en entrenamiento y 0.60 en test. ¿Qué harías primero para controlar el overfitting?",
o:["Reducir la complejidad (p. ej., limitar max_depth) o usar ensembles/regularización y validación cruzada","Aumentar la profundidad del árbol para mejorar el test","Eliminar el conjunto de test y quedarte con el de entrenamiento"],c:0,
e:"La gran brecha train/test indica sobreajuste: limitar la complejidad, regularizar o combinar métodos (bagging/random forest) son las vías correctas, validando con cross-validation."},
/* ---------- M4 ---------- */
{m:"M4",t:"¿Cuál es la diferencia entre normalización (min-max) y estandarización?",
o:["La normalización escala a [0,1]; la estandarización resta la media y divide por la desviación, y resiste mejor los outliers","La estandarización escala a [0,1]; la normalización usa media y desviación","Son exactamente la misma operación"],c:0,
e:"Min-max acota a [0,1] pero es sensible a valores extremos; la estandarización (z-score) no acota el rango pero se ve mucho menos afectada por outliers."},
{m:"M4",t:"Sin función de activación no lineal, una red neuronal de varias capas...",
o:["solo puede representar funciones lineales, por muchas capas que tenga","puede aproximar cualquier función igualmente","no puede entrenarse con descenso de gradiente"],c:0,
e:"La composición de funciones lineales es lineal: la no linealidad (sigmoide, tanh, ReLU) es la que da a la red su capacidad de aproximador universal."},
{m:"M4",t:"La salida de una neurona ReLU está en el rango...",
o:["[0, +∞)","(0, 1)","(−1, 1)"],c:0,
e:"ReLU = max(0,x): anula los negativos y deja pasar los positivos sin acotar. La sigmoide da (0,1) y la tanh (−1,1)."},
{m:"M4",t:"Para un problema de clasificación con clases mutuamente excluyentes, la capa de salida recomendada es...",
o:["softmax","ReLU","lineal"],c:0,
e:"Softmax produce salidas positivas que suman 1 (distribución de probabilidad). Si las clases no son excluyentes o el problema es binario se prefiere la logística; lineal para regresión."},
{m:"M4",t:"Entrenamos con 2.000 ejemplos y batch size de 500. ¿Cuántas iteraciones forman una época?",
o:["4","500","2000"],c:0,
e:"Iteraciones por época = ejemplos / batch = 2000/500 = 4. Una época = pasar una vez por todo el conjunto."},
{m:"M4",t:"Una tasa de aprendizaje (η) demasiado alta provoca típicamente que...",
o:["el entrenamiento se vuelva inestable y no converja (oscila o diverge)","el entrenamiento sea muy lento pero seguro","la red tenga menos parámetros"],c:0,
e:"Pasos demasiado grandes saltan por encima del mínimo: el coste oscila o explota. η demasiado baja converge lentísimo."},
{m:"M4",t:"El optimizador Adam combina las ideas de...",
o:["Momentum y RMSProp (momentos adaptativos)","bagging y boosting","dropout y early stopping"],c:0,
e:"Adam = adaptive moment estimation: acumula media del gradiente (Momentum) y adapta la tasa por parámetro (RMSProp)."},
{m:"M4",t:"¿Qué técnica de regularización añade el término (λ/2n)·Σw² a la función de coste?",
o:["Regularización L2 (weight decay)","Dropout","Early stopping"],c:0,
e:"L2 penaliza pesos grandes empujándolos hacia valores pequeños (modelos más simples). L1 usa |w|; dropout y early stopping actúan de otra forma."},
{m:"M4",t:"El early stopping consiste en...",
o:["detener el entrenamiento cuando el error en el conjunto de validación empieza a aumentar","parar el entrenamiento tras un número fijo de épocas siempre","desactivar neuronas aleatoriamente"],c:0,
e:"Se monitoriza el error de validación durante el entrenamiento: cuando empieza a subir (aunque el de entrenamiento siga bajando), el modelo empieza a sobreajustar y se detiene."},
{m:"M4",t:"Una imagen de entrada de 32×32, un filtro 5×5, stride 1 y sin padding producen un mapa de características de...",
o:["28×28","32×32","27×27"],c:0,
e:"(n+2p−f)/s + 1 = (32+0−5)/1 + 1 = 28. Con 6 filtros, la salida sería 28×28×6."},
{m:"M4",t:"¿Para qué sirve el padding en una capa de convolución?",
o:["Rellenar los bordes para controlar el tamaño de salida y no perder información de los bordes","Reducir el número de canales de la imagen","Aumentar el stride automáticamente"],c:0,
e:"Sin padding la salida encoge y los píxeles del borde participan menos; el padding (p. ej., 'same') mantiene las dimensiones."},
{m:"M4",t:"Una capa de max-pooling 2×2 con stride 2 sobre un volumen de 28×28×6 produce...",
o:["14×14×6","28×28×3","7×7×6"],c:0,
e:"El pooling reduce alto y ancho a la mitad (28/2=14) y no cambia el número de canales: 14×14×6. Tampoco tiene parámetros entrenables."},
{m:"M4",t:"En una CNN típica de clasificación, la mayor parte de los parámetros entrenables está en...",
o:["las capas totalmente conectadas (FC) del final","las capas de convolución","las capas de pooling"],c:0,
e:"Las convoluciones comparten pesos (pocos parámetros); el pooling no tiene ninguno; las FC conectan todo con todo y acumulan la mayoría (p. ej., FC2 de LeNet-5: 48.120)."},
{m:"M4",t:"La propiedad de compartición de parámetros de las CNN implica que...",
o:["un mismo detector de características se aplica en todas las posiciones de la imagen (invariancia a traslación)","cada píxel tiene su propio filtro independiente","la red no puede detectar bordes verticales"],c:0,
e:"El mismo filtro (pesos+sesgo) recorre toda la imagen: si detecta un borde en una zona, lo detecta en cualquier otra. Además reduce drásticamente los parámetros."},
{m:"M4",t:"La innovación principal de las redes residuales (ResNet) es...",
o:["las conexiones skip que suman la entrada de un bloque a su salida, permitiendo redes muy profundas","el uso de filtros de tamaño variable en paralelo","eliminar por completo las capas de convolución"],c:0,
e:"Los atajos residuales dejan fluir el gradiente y la identidad, mitigando la degradación/gradiente desvanecido en redes de cientos de capas. Los módulos paralelos son de Inception."},
{m:"M4",t:"La arquitectura VGG se caracteriza por...",
o:["usar uniformemente convoluciones 3×3 con stride 1 y max-pooling 2×2 con stride 2","usar solo capas totalmente conectadas","introducir las conexiones residuales"],c:0,
e:"VGG simplifica el diseño con bloques homogéneos conv3×3 + pool2×2; es profunda (~138M parámetros) pero muy regular."},
{m:"M4",p:1,t:"(PEC) En transfer learning con una red preentrenada en ImageNet para clasificar tus propias imágenes, lo habitual es...",
o:["congelar las capas convolucionales y reentrenar solo las capas finales de clasificación","reentrenar toda la red desde cero con pesos aleatorios","congelar la capa de salida y reentrenar solo la primera convolución"],c:0,
e:"Las convoluciones preentrenadas extraen características generales (bordes, texturas) reutilizables; se sustituye y entrena la cabeza clasificadora. Con más datos puede hacerse fine-tuning de las últimas capas convolucionales."},
{m:"M4",p:1,t:"(PEC) Entrenas una CNN desde cero con pocas imágenes y sobreajusta. ¿Cuál de estas combinaciones ataca mejor el problema?",
o:["Data augmentation + dropout + early stopping (o transfer learning)","Más épocas y mayor tasa de aprendizaje","Quitar el conjunto de validación para tener más datos"],c:0,
e:"Aumento de datos, dropout y early stopping son las herramientas estándar contra el sobreajuste; con muy pocos datos, el transfer learning suele ser la mejor opción."},
{m:"M4",t:"¿Qué tipo de red es adecuada para predecir el siguiente valor de una serie temporal usando los anteriores?",
o:["Una red recurrente (RNN/LSTM)","Una CNN sin pooling","Un autoencoder"],c:0,
e:"Las RNN mantienen un estado interno (memoria) que hace que la salida dependa de los datos anteriores de la secuencia."},
{m:"M4",t:"En una celda LSTM, la puerta de olvido (forget gate) decide...",
o:["qué parte de la memoria/estado anterior se conserva o se borra","qué neuronas se desactivan durante el entrenamiento","la tasa de aprendizaje de la celda"],c:0,
e:"ft = σ(Wf·[ht−1,xt]+bf) multiplica al estado: valores cercanos a 0 borran memoria y cercanos a 1 la conservan. La que añade información nueva es la puerta de entrada."},
{m:"M4",t:"La ventaja principal de la GRU frente a la LSTM es que...",
o:["es más simple (2 puertas), con menos parámetros y rendimiento similar","elimina por completo el problema del gradiente","procesa las secuencias en ambos sentidos"],c:0,
e:"GRU fusiona puertas (update y reset) y prescinde de la celda de memoria separada: menos parámetros y entrenamiento más ligero. Lo bidireccional es otra arquitectura."},
{m:"M4",t:"El mecanismo de atención en una arquitectura codificador-decodificador permite...",
o:["que el decodificador consulte todas las posiciones de la entrada en cada paso, en vez de solo el vector final","reducir el número de capas del codificador","entrenar sin retropropagación"],c:0,
e:"Sin atención, toda la secuencia debe comprimirse en un único vector (cuello de botella). La atención pondera dinámicamente qué partes de la entrada son relevantes en cada paso de la salida."},
{m:"M4",t:"Clasificar el sentimiento (positivo/negativo) de una frase completa es un problema de tipo...",
o:["many-to-one","one-to-many","one-to-one"],c:0,
e:"Entran muchos elementos (palabras de la frase) y sale un único valor (el sentimiento). Generar un pie de foto sería one-to-many; traducir, many-to-many."},
/* ---------- M5 ---------- */
{m:"M5",t:"«Los clientes que compraron este producto también compraron...» es el ejemplo clásico de...",
o:["filtraje colaborativo","recomendación basada en conocimiento","recomendación basada en restricciones"],c:0,
e:"Usa exclusivamente el comportamiento (compras/valoraciones) de la comunidad de usuarios: filtraje colaborativo."},
{m:"M5",t:"El coeficiente de correlación de Pearson entre dos usuarios vale −1. Esto significa que...",
o:["sus valoraciones siguen tendencias totalmente opuestas","tienen exactamente los mismos gustos","no han valorado ningún ítem en común"],c:0,
e:"−1 = correlación negativa perfecta: cuando uno puntúa alto, el otro puntúa bajo. Sin ítems en común no se puede calcular (≈0 en el ejemplo del módulo)."},
{m:"M5",t:"¿Por qué Pearson resta la media de cada usuario al calcular la similitud?",
o:["Para corregir que unos usuarios tienden a puntuar sistemáticamente más alto o más bajo que otros","Para que la similitud quede siempre entre 0 y 1","Para penalizar a los usuarios con pocas valoraciones"],c:0,
e:"Al centrar las valoraciones, la medida se vuelve independiente de desplazamientos y escalas: importa la tendencia, no el nivel absoluto."},
{m:"M5",t:"En el filtraje colaborativo basado en ítems, la medida de similitud más establecida es...",
o:["la similitud coseno (idealmente ajustada)","la correlación de Pearson entre usuarios","la distancia de Hamming"],c:0,
e:"Para comparar columnas (ítems) se usa el coseno; el coseno ajustado además resta la media de cada usuario, corrigiendo tendencias (rango [−1,1])."},
{m:"M5",t:"La diferencia entre la similitud coseno simple y la ajustada es que la ajustada...",
o:["normaliza antes las valoraciones restando la media de cada usuario","usa solo los ítems no valorados","se calcula sobre los usuarios en lugar de los ítems"],c:0,
e:"El coseno simple (∈[0,1]) ignora que cada usuario tiene su propia media; el ajustado centra las valoraciones por usuario y queda en [−1,1]."},
{m:"M5",t:"En la predicción por ítems pred(a,i) = Σ sim(i,j)·aj / Σ sim(i,j), los ítems j considerados deben ser...",
o:["ítems similares a i que el usuario a YA haya valorado","cualquier ítem del catálogo, valorado o no","solo ítems valorados por otros usuarios pero no por a"],c:0,
e:"La predicción pondera las valoraciones del propio usuario sobre los ítems más parecidos: si a no valoró j, no hay aj que ponderar."},
{m:"M5",t:"La factorización de matrices descompone la matriz de valoraciones en...",
o:["dos matrices de rango bajo (usuarios×factores e ítems×factores) cuyos productos reconstruyen las valoraciones","una matriz diagonal de medias de usuario","una lista de reglas de asociación"],c:0,
e:"R ≈ U·Vᵀ con k factores latentes; se entrena minimizando el error sobre las celdas conocidas y predice con el producto escalar usuario·ítem."},
{m:"M5",t:"Un usuario recién registrado sin ninguna valoración no puede recibir recomendaciones colaborativas. Este problema se llama...",
o:["arranque en frío (cold start)","burbuja de filtros","oveja gris"],c:0,
e:"Cold start: sin valoraciones no hay vecinos ni factores. La oveja gris es el usuario con gustos atípicos; la burbuja de filtros es la falta de diversidad."},
{m:"M5",t:"¿Qué familia de recomendadores puede recomendar un ítem recién añadido al catálogo sin que nadie lo haya valorado?",
o:["Los basados en contenido (usan la descripción del ítem)","El filtraje colaborativo basado en usuarios","El filtraje colaborativo basado en ítems"],c:0,
e:"El contenido (género, autor, características) permite emparejar el ítem nuevo con perfiles de usuario; el colaborativo necesita valoraciones previas del ítem."},
{m:"M5",t:"Para recomendar neveras en una tienda donde cada cliente compra una cada 10 años, lo más adecuado es un sistema...",
o:["basado en conocimiento (restricciones o casos)","de filtraje colaborativo basado en usuarios","de factorización de matrices"],c:0,
e:"Sin historial de compras frecuente no hay datos colaborativos: los sistemas basados en conocimiento usan los requisitos del usuario y datos estructurados del producto."},
{m:"M5",t:"En un recomendador basado en casos, el usuario dice «quiero una cámara como esta pero más barata». Esto es un ejemplo de...",
o:["crítica (critiquing) para refinar iterativamente la búsqueda","valoración implícita","factorización de matrices"],c:0,
e:"Los sistemas basados en casos parten de un ítem de referencia y el usuario lo critica iterativamente hasta llegar al producto deseado."},
{m:"M5",t:"¿Cuál es la motivación principal de los sistemas recomendadores híbridos?",
o:["Combinar varios métodos para compensar las debilidades de cada uno y explotar todos los datos","Reducir el coste computacional respecto a un método único","Eliminar la necesidad de valoraciones de usuarios"],c:0,
e:"Cada familia explora fuentes distintas (valoraciones, contenido, conocimiento); combinándolas se cubren cold start, dispersión, etc."},
{m:"M5",t:"Para evaluar un recomendador con datos históricos, se suele...",
o:["ocultar parte de las valoraciones conocidas y medir el error de predicción (MAE/RMSE) sobre ellas","preguntar al equipo de desarrollo si las recomendaciones parecen buenas","medir solo el tiempo de respuesta del sistema"],c:0,
e:"Es la evaluación offline: train/test sobre la matriz de valoraciones. La alternativa son estudios con usuarios reales (test A/B), más caros."},
{m:"M5",p:1,t:"(PEC) La «burbuja de filtros» en plataformas como las redes sociales se refiere a que...",
o:["los algoritmos muestran solo contenido afín a tus gustos previos, reduciendo la diversidad de información","los servidores agrupan las peticiones en burbujas de tráfico","los usuarios nuevos no reciben recomendaciones"],c:0,
e:"El término (Eli Pariser) describe el aislamiento informativo causado por la personalización: solo ves lo que refuerza tus preferencias/opiniones."},
{m:"M5",p:1,t:"(PEC) Un servicio como Spotify genera recomendaciones personalizadas combinando principalmente...",
o:["filtraje colaborativo sobre el comportamiento de usuarios + análisis del contenido (audio/metadatos)","únicamente las canciones más escuchadas globalmente","solo las listas creadas por editores humanos"],c:0,
e:"Los recomendadores reales son híbridos: colaborativo (usuarios con gustos similares), contenido (características del audio, NLP de metadatos) y contexto. Lo más escuchado global sería la opción impersonal."},
/* ---------- M6 ---------- */
{m:"M6",t:"En el bucle del aprendizaje por refuerzo, tras ejecutar la acción aₜ el agente recibe del entorno...",
o:["el nuevo estado sₜ₊₁ y la recompensa rₜ₊₁","la acción óptima que debería haber hecho","el conjunto de datos de entrenamiento etiquetado"],c:0,
e:"El entorno responde con el estado siguiente y una recompensa escalar; nunca con la acción correcta (eso sería supervisado)."},
{m:"M6",t:"Cuando un robot solo percibe el entorno a través de su cámara (cono de visión limitado), decimos que recibe...",
o:["una observación (estado parcial/incompleto)","el estado completo del entorno","una recompensa densa"],c:0,
e:"La mayoría de sistemas reales no perciben todo el estado: reciben observaciones parciales mediante sensores."},
{m:"M6",t:"Una recompensa que solo se recibe al completar la tarea (cero en todos los pasos intermedios) es una recompensa...",
o:["dispersa y diferida","densa e inmediata","intrínseca y densa"],c:0,
e:"Dispersa: casi siempre cero. Diferida: hay que encadenar muchas acciones correctas antes de cobrarla. Son las más difíciles de aprender."},
{m:"M6",t:"Un agente de un juego de plataformas descubre que puede saltar el mismo barril infinitamente acumulando puntos sin avanzar. Esto ilustra...",
o:["un mal diseño del sistema de recompensas que el agente explota","el problema del gradiente desvanecido","la necesidad de usar una tabla Q más grande"],c:0,
e:"Los agentes RL son especialistas en encontrar «agujeros» en las recompensas: si recompensas algo que no es exactamente la tarea, optimizarán eso."},
{m:"M6",t:"Una política ε-avariciosa con ε=0.1 significa que el agente...",
o:["elige una acción aleatoria el 10 % de las veces y la mejor conocida el 90 %","elige siempre la acción de mayor Q","elige una acción aleatoria el 90 % de las veces"],c:0,
e:"ε es la probabilidad de explorar (acción al azar); el resto del tiempo explota la mejor acción según Q. Suele decrecer durante el entrenamiento."},
{m:"M6",t:"¿Por qué conocer solo V(s) no basta para decidir la acción si no se dispone de un modelo del entorno?",
o:["Porque se sabe qué estados son buenos pero no qué acción conduce a ellos","Porque V(s) solo existe para entornos deterministas","Porque V(s) no puede calcularse con la ecuación de Bellman"],c:0,
e:"Sin modelo de transiciones, saber que s* es valioso no dice cómo llegar: por eso se aprende Q(s,a), que valora directamente cada acción en cada estado."},
{m:"M6",t:"El tamaño de la tabla Q es...",
o:["|S| × |A|: una fila por estado y una columna por acción","|S| + |A|","|S| × |S|"],c:0,
e:"Q asigna un valor a cada par (estado, acción): la tabla tiene tantas filas como estados y tantas columnas como acciones."},
{m:"M6",t:"En la actualización TD V(s) ← V(s) + α·[r + γV(s′) − V(s)], el término entre corchetes representa...",
o:["el error de diferencia temporal: lo observado frente a lo estimado","la recompensa acumulada total del episodio","la probabilidad de transición entre estados"],c:0,
e:"r + γV(s′) es la nueva estimación (objetivo) y V(s) la antigua: su diferencia es el error TD que corrige la estimación, escalado por α."},
{m:"M6",t:"¿Qué método actualiza Q usando la acción que el agente REALMENTE ejecuta en el estado siguiente?",
o:["SARSA","Q-learning","DQN"],c:0,
e:"SARSA (s,a,r,s′,a′) es on-policy: usa Q(s′,a′) con la acción realmente elegida. Q-learning usa maxₐ Q(s′,a), lo mejor posible."},
{m:"M6",t:"La diferencia clave en la fórmula de actualización entre SARSA y Q-learning es que Q-learning...",
o:["usa el máximo de Q sobre las acciones del estado siguiente en lugar de la acción realmente tomada","no usa tasa de aprendizaje","no necesita recompensas"],c:0,
e:"Q-learning: r + γ·maxₐQ(s′,a). SARSA: r + γ·Q(s′,a′). Ese max hace a Q-learning off-policy y más «optimista»."},
{m:"M6",t:"En Q-learning, la política de comportamiento y la política objetivo se relacionan así:",
o:["la de comportamiento interactúa con el entorno y se actualiza periódicamente copiando la objetivo, que es la que aprende","son siempre la misma política","la objetivo explora y la de comportamiento aprende"],c:0,
e:"Q-learning es off-policy: una política explora (comportamiento) y otra acumula el aprendizaje (objetivo, la final); periódicamente se sincronizan."},
{m:"M6",t:"¿Por qué una tabla Q es inviable para juegos como el Go?",
o:["Porque el número de estados (~10¹⁷⁰) hace imposible almacenarla y llenarla en tiempo razonable","Porque el Go tiene acciones continuas","Porque las recompensas del Go son densas"],c:0,
e:"El espacio de estados crece exponencialmente con la complejidad (maldición de la dimensionalidad): ni memoria ni tiempo de entrenamiento alcanzan. Solución: aproximar Q con una red (DQN)."},
{m:"M6",t:"En DQN, la repetición de experiencias (experience replay) consiste en...",
o:["guardar transiciones (s,a,r,s′) en una memoria y entrenar con mini-batches aleatorios de ella","repetir el mismo episodio hasta memorizarlo","copiar la red objetivo en cada paso"],c:0,
e:"Muestrear aleatoriamente experiencias pasadas rompe la correlación temporal de las muestras consecutivas y estabiliza el entrenamiento de la red."},
{m:"M6",t:"La red objetivo (target network) de DQN sirve para...",
o:["calcular el objetivo r+γ·maxQ con una copia congelada de la red, evitando perseguir un objetivo que cambia en cada paso","aumentar la capacidad del modelo con más capas","sustituir la política ε-avariciosa"],c:0,
e:"Si la misma red que se entrena calculara su propio objetivo, este cambiaría constantemente (inestable). La copia congelada se actualiza solo cada cierto tiempo."},
{m:"M6",t:"Con γ=0.9, una recompensa de 10 que se recibirá dentro de 2 pasos contribuye al valor actual con...",
o:["10·0.9² = 8.1","10","10·0.9 = 9"],c:0,
e:"El descuento es exponencial en el tiempo: γᵗ·r = 0.81·10 = 8.1. Por eso las recompensas lejanas pesan menos."},
{m:"M6",p:1,t:"(PEC) En el ejemplo del laberinto con Q-learning, al inicio del entrenamiento la tabla Q contiene...",
o:["ceros (o valores arbitrarios) en todas las celdas; se va llenando con las interacciones","los valores óptimos calculados analíticamente","las distancias euclidianas a la salida"],c:0,
e:"Q se inicializa a cero (o aleatoria) y se actualiza con la regla de Q-learning a medida que el agente explora y recibe recompensas."},
{m:"M6",t:"Tesla registra cómo conducen los humanos para entrenar sus sistemas de conducción. Esta aproximación se parece a...",
o:["el aprendizaje por imitación (imitation learning)","el aprendizaje no supervisado","una política puramente aleatoria"],c:0,
e:"Aprender observando/copiando a un experto es imitación, variante del RL útil cuando diseñar recompensas es muy difícil. El RL inverso deduce las recompensas del comportamiento experto."}
];
</script>
<script>
const QUESTIONS_OLD = [{"m": "M1", "t": "Según la definición de Mitchell (1997), un programa aprende de la experiencia E respecto a una tarea T y una medida de rendimiento P si...", "o": ["su rendimiento en T, medido por P, mejora con la experiencia E", "su código se modifica automáticamente sin intervención humana", "es capaz de almacenar todos los datos de entrenamiento en memoria"], "c": 0, "e": "La definición clásica de Mitchell vincula tres elementos (T, P, E): hay aprendizaje cuando el rendimiento en la tarea, medido por P, mejora al acumular experiencia E. No exige modificar el código ni memorizar los datos."}, {"m": "M1", "t": "¿Cuál de los tres paradigmas se caracteriza porque solo se dispone de una gratificación o penalización según el resultado, sin conocer la salida correcta?", "o": ["Aprendizaje supervisado", "Aprendizaje por refuerzo", "Aprendizaje no supervisado"], "c": 1, "e": "En el aprendizaje por refuerzo el conocimiento sobre la calidad es parcial: el agente recibe recompensas/penalizaciones, no la salida correcta. En el supervisado se conoce la salida; en el no supervisado no hay salida."}, {"m": "M1", "t": "Un problema de aprendizaje supervisado cuyo atributo solución es de tipo numérico continuo es un problema de...", "o": ["clasificación", "regresión", "categorización"], "c": 1, "e": "La regresión corresponde a salida numérica continua; la clasificación a un atributo categórico/binario. La categorización (clustering) es no supervisada."}, {"m": "M1", "t": "La diferencia clave entre selección de características y extracción de características es que...", "o": ["la selección crea atributos nuevos y la extracción elige un subconjunto", "la extracción puede crear atributos nuevos combinando los originales, mientras que la selección solo elige un subconjunto de los existentes", "ambas son idénticas, solo cambia el nombre"], "c": 1, "e": "La selección elige un subconjunto de los atributos originales; la extracción construye un espacio nuevo (posiblemente combinando atributos), como hacen PCA o LDA."}, {"m": "M1", "t": "El Análisis de Componentes Principales (PCA) es una técnica de extracción de características...", "o": ["supervisada, que maximiza la separación entre clases", "no supervisada, que minimiza el error cuadrático de reconstrucción", "supervisada, basada en la ganancia de información"], "c": 1, "e": "PCA es NO supervisado: no usa etiquetas; busca la proyección de menor dimensión que minimiza el error cuadrático de reconstrucción, tomando los vectores propios de mayor valor propio de la matriz de covarianza."}, {"m": "M1", "t": "En PCA, la matriz de proyección se construye con...", "o": ["los vectores propios de mayor valor propio de la matriz de covarianza", "las medias de cada clase", "los puntos más alejados del centroide"], "c": 0, "e": "Tras centrar los datos y calcular la covarianza, PCA toma como matriz de proyección los D vectores propios asociados a los mayores valores propios (las direcciones de máxima varianza)."}, {"m": "M1", "t": "El Análisis Discriminante Lineal (LDA) de Fisher se diferencia de PCA en que LDA...", "o": ["es no supervisado y minimiza el error de reconstrucción", "es supervisado: usa las etiquetas para maximizar la dispersión interclase y minimizar la intraclase", "no reduce la dimensionalidad"], "c": 1, "e": "LDA es supervisado: busca la proyección que maximiza la separación entre clases (dispersión interclase) manteniendo juntos los puntos de la misma clase (dispersión intraclase). PCA ignora las clases."}, {"m": "M1", "t": "En el algoritmo k-means, ¿qué garantiza la versión iterativa básica?", "o": ["Encontrar siempre el mínimo global de la función objetivo", "Convergencia a un mínimo local (la función objetivo no aumenta en cada iteración)", "Que el número de clusters sea óptimo automáticamente"], "c": 1, "e": "k-means solo garantiza convergencia a un mínimo local: en cada iteración reduce (no aumenta) la suma de distancias a los centroides, pero el resultado depende de la inicialización. La k es un hiperparámetro fijado de antemano."}, {"m": "M1", "t": "El número de categorías 'k' en k-means es un ejemplo de...", "o": ["un parámetro que el algoritmo ajusta automáticamente", "un hiperparámetro que se fija manualmente antes de ejecutar el algoritmo", "una métrica de evaluación"], "c": 1, "e": "k es un hiperparámetro: no se ajusta durante el aprendizaje, sino que se decide antes (como el nº máximo de niveles de un árbol). Los parámetros sí se aprenden de los datos."}, {"m": "M1", "t": "¿Por qué es importante que los conjuntos de entrenamiento y de prueba sean disjuntos?", "o": ["Para reducir el coste computacional del entrenamiento", "Para medir la capacidad de generalización con muestras que el modelo no ha visto", "Para que el modelo tenga más datos de entrenamiento"], "c": 1, "e": "El interés es medir generalización: si el test contiene datos vistos en entrenamiento, la medida de calidad queda inflada y deja de ser fiable."}, {"m": "M1", "t": "El conjunto de validación se utiliza para...", "o": ["ajustar los hiperparámetros del modelo sin tocar el conjunto de prueba", "entrenar los parámetros finales del modelo", "sustituir al conjunto de prueba en la evaluación final"], "c": 0, "e": "La validación sirve para ajustar hiperparámetros. No se puede usar el test para ello, porque dejaría de dar una estimación realista de generalización. Tras fijar los hiperparámetros, se reentrena con todos los datos de entrenamiento."}, {"m": "M1", "t": "En una matriz de confusión de clasificación, las filas y columnas representan respectivamente...", "o": ["las predicciones del modelo y los valores reales", "los valores reales de cada clase y las predicciones del modelo", "precisión y sensibilidad"], "c": 1, "e": "Según el material, las filas son los valores reales y las columnas las predicciones del modelo. La celda c(i,j) cuenta ejemplos reales de clase i clasificados como clase j."}, {"m": "M1", "t": "En clasificación binaria, la precisión (precision) se define como...", "o": ["verdaderos positivos / (verdaderos positivos + falsos positivos)", "verdaderos positivos / (verdaderos positivos + falsos negativos)", "aciertos totales / número total de ejemplos"], "c": 0, "e": "Precisión = TP/(TP+FP): de todo lo que el modelo predijo como positivo, qué fracción lo era. La sensibilidad/recall = TP/(TP+FN). La tercera es la exactitud (accuracy)."}, {"m": "M1", "t": "La sensibilidad (recall) de un modelo se define como...", "o": ["el número de positivos correctos dividido por todas las muestras predichas como positivas", "el número de positivos correctos dividido por todas las muestras realmente positivas", "el porcentaje total de aciertos"], "c": 1, "e": "Recall = TP/(TP+FN): de todos los ejemplos realmente positivos, qué fracción detecta el modelo. La primera opción describe la precisión."}, {"m": "M1", "t": "La principal ventaja del RMSE frente al MSE como métrica de regresión es que el RMSE...", "o": ["penaliza más los errores grandes", "tiene las mismas unidades que la variable predicha, siendo más fácil de interpretar", "siempre es menor que el MSE"], "c": 1, "e": "RMSE = raíz del MSE, por lo que recupera las unidades originales (p. ej. euros en vez de euros²), siendo más interpretable. Ambas penalizan el error; la magnitud relativa no es la ventaja destacada."}, {"m": "M1", "t": "En redes neuronales para clasificación, a menudo se minimiza la entropía cruzada en lugar de la tasa de error porque...", "o": ["la entropía cruzada siempre da mejor accuracy", "es derivable, lo que facilita la optimización por descenso de gradientes", "es la única métrica válida para clasificación"], "c": 1, "e": "La función de error que se minimiza no tiene por qué coincidir con la métrica de evaluación. Se usa la entropía cruzada por sus propiedades de derivabilidad, necesarias para el descenso de gradientes."}, {"m": "M1", "t": "El sobreajuste (overfitting) se produce cuando un modelo...", "o": ["no consigue minimizar el error en el conjunto de entrenamiento", "se ajusta muy bien al entrenamiento pero generaliza mal en el conjunto de prueba", "tiene demasiado pocos parámetros"], "c": 1, "e": "Overfitting: error muy bajo en entrenamiento pero mala generalización. El caso opuesto (no minimizar el error de entrenamiento por falta de complejidad) es el underfitting/subajuste."}, {"m": "M1", "t": "¿Qué es el 'sesgo inductivo' de un algoritmo de aprendizaje?", "o": ["El error sistemático en las medidas de los datos", "Todo aquello que restringe el espacio de búsqueda de soluciones (generalizaciones posibles)", "La diferencia entre clases mayoritaria y minoritaria"], "c": 1, "e": "El sesgo inductivo es el conjunto de restricciones que limitan el espacio de hipótesis (p. ej. permitir solo rectas). Permite generalizar, pero puede impedir aprender ciertas soluciones."}, {"m": "M1", "t": "En el compromiso sesgo-varianza, al aumentar la complejidad del modelo...", "o": ["el sesgo aumenta y la varianza disminuye", "el sesgo disminuye y la varianza aumenta", "ambos disminuyen siempre"], "c": 1, "e": "Modelos más complejos se ajustan mejor (menos sesgo) pero son más sensibles a cambios en los datos (más varianza). Entre métodos con igual sesgo, interesa el de menor varianza."}, {"m": "M1", "t": "Se dice que un método de aprendizaje es 'consistente' cuando...", "o": ["al incrementar el tamaño del conjunto de ejemplos, la esperanza del modelo tiende a la función real f", "da exactamente el mismo resultado en cada ejecución", "no tiene sesgo ni varianza"], "c": 0, "e": "Consistencia: al crecer el número de ejemplos, la esperanza del modelo se acerca a f(x). No tener sesgo no implica buena aproximación con pocos datos; por eso importa también la varianza."}, {"m": "M1", "t": "La asunción i.i.d. (independientes e idénticamente distribuidas) sobre las muestras implica que...", "o": ["cada muestra depende de la anterior", "cada muestra es independiente del resto y entrenamiento y prueba siguen la misma distribución", "todas las muestras tienen el mismo valor"], "c": 1, "e": "i.i.d. significa independencia entre muestras e idéntica distribución de probabilidad en entrenamiento y prueba; es la base para que minimizar el error de entrenamiento generalice al test."}, {"m": "M1", "t": "Para representar la información antes de entrenar, los atributos categóricos suelen requerir...", "o": ["transformarse a formato numérico y armonizar los rangos dinámicos", "eliminarse siempre del conjunto de datos", "convertirse en la variable de salida"], "c": 0, "e": "En la fase de representación se transforman los datos a formato numérico, se armonizan rangos y se definen categorías, para que los algoritmos puedan aprender de ellos."}, {"m": "M1", "t": "¿Cuál de estas afirmaciones sobre la selección/extracción de características es correcta según el material?", "o": ["Siempre existe un método universalmente mejor que el resto", "No hay ningún método universalmente mejor; depende de la dimensionalidad, complejidad y naturaleza del problema", "La extracción no lineal está fuera del aprendizaje automático"], "c": 1, "e": "El módulo subraya que no hay un método universalmente superior: la elección depende del problema. PCA y LDA (lineales) son los que se estudian en detalle."}, {"m": "M1", "t": "Una matriz de confusión normalizada por clases es útil sobre todo cuando...", "o": ["todas las clases tienen exactamente el mismo número de ejemplos", "las clases están desbalanceadas y queremos ver el rendimiento por clase independientemente del tamaño", "solo hay dos clases"], "c": 1, "e": "La normalización por clase permite comparar el rendimiento clase a clase sin que el distinto número de ejemplos distorsione la lectura, especialmente útil con clases desbalanceadas."}, {"m": "M2", "t": "El clasificador Naive Bayes asume que...", "o": ["los atributos son condicionalmente independientes dada la clase", "los atributos están fuertemente correlacionados", "no existe ninguna distribución de probabilidad"], "c": 0, "e": "La hipótesis 'naive' (ingenua) es la independencia condicional de los atributos dada la clase, lo que permite factorizar P(x1..xm|k) como producto de P(xi|k). Suele ser irreal pero funciona bien en la práctica."}, {"m": "M2", "t": "Naive Bayes asigna a un nuevo ejemplo la clase que...", "o": ["minimiza la distancia euclidiana a los centroides", "maximiza P(k)·∏ P(xi|k)", "maximiza la entropía del conjunto"], "c": 1, "e": "Por el teorema de Bayes y la hipótesis de independencia, Naive Bayes elige argmax_k P(k)·∏_i P(xi|k), con P(k) y P(xi|k) estimadas por frecuencias relativas (máxima verosimilitud)."}, {"m": "M2", "t": "¿Qué problema resuelve la técnica de suavizado (smoothing) en Naive Bayes?", "o": ["El sobreajuste de los árboles de decisión", "Que una pareja atributo-valor no vista en entrenamiento dé P(xi|k)=0 y anule todo el producto", "La normalización de atributos numéricos"], "c": 1, "e": "Si un valor no apareció en entrenamiento, su probabilidad sería 0 y anularía el producto completo. El suavizado evita los ceros (p. ej. sustituyendo por P(k)/n)."}, {"m": "M2", "t": "Para tratar atributos continuos en Naive Bayes, una opción habitual es...", "o": ["asumir que siguen una distribución gaussiana y aplicar su densidad", "ignorar dichos atributos", "convertirlos en la clase objetivo"], "c": 0, "e": "Con atributos continuos se puede categorizar en intervalos o, más común, asumir distribución gaussiana por clase y usar su función de densidad con la media y desviación de cada clase."}, {"m": "M2", "t": "La regresión logística, a diferencia de Naive Bayes,...", "o": ["asume independencia condicional entre atributos", "no asume independencia entre los datos y modela el logaritmo de la probabilidad (log-odds)", "no puede usarse para clasificación"], "c": 1, "e": "La regresión logística no asume independencia condicional; ajusta una combinación lineal pasada por la sigmoide y modela el log of odds. Pese a su nombre, se usa para clasificación binaria."}, {"m": "M2", "t": "La función logística (sigmoide) σ(x)=1/(1+e^-x) tiene la propiedad de que...", "o": ["devuelve cualquier número real", "restringe la salida al intervalo (0,1), interpretable como probabilidad", "solo devuelve 0 o 1"], "c": 1, "e": "La sigmoide comprime la recta de regresión al intervalo (0,1): para x→+∞ tiende a 1 y para x→−∞ tiende a 0, permitiendo interpretar la salida como probabilidad."}, {"m": "M2", "t": "Una limitación principal de la regresión logística es que...", "o": ["asume linealidad entre la variable dependiente y las independientes (datos pocas veces separables linealmente)", "no puede entrenarse de forma eficiente", "requiere siempre kernels"], "c": 0, "e": "Su principal limitación es la suposición de linealidad: funciona bien con datos separables linealmente, pero en el mundo real esto rara vez ocurre."}, {"m": "M2", "t": "El algoritmo kNN se conoce como 'aprendizaje perezoso' (lazy learning) porque...", "o": ["nunca llega a clasificar correctamente", "pospone toda la generalización hasta el momento de clasificar un nuevo ejemplo (en entrenamiento solo guarda los datos)", "solo funciona con pocos datos"], "c": 1, "e": "kNN no construye un modelo en entrenamiento: simplemente almacena los ejemplos. Todo el cálculo (distancias a los k vecinos) se hace en el momento de la clasificación, de ahí 'perezoso'."}, {"m": "M2", "t": "En kNN se suele escoger un valor de k impar o primo para...", "o": ["acelerar el cálculo de distancias", "minimizar la posibilidad de empates en las votaciones", "poder usar la distancia de Hamming"], "c": 1, "e": "Un k impar/primo reduce los empates en la votación mayoritaria entre clases. La distancia (euclidiana para numéricos, Hamming para nominales) es una decisión independiente."}, {"m": "M2", "t": "La distancia de Hamming es especialmente adecuada para...", "o": ["atributos numéricos continuos", "atributos nominales o binarios (cuenta el número de atributos diferentes)", "reducir la dimensionalidad"], "c": 1, "e": "Hamming cuenta cuántos atributos difieren (0 si iguales, 1 si distintos), ideal para atributos nominales/binarios. La euclidiana se usa mayoritariamente con atributos numéricos."}, {"m": "M2", "t": "El clasificador lineal basado en distancias (centroides) clasifica un nuevo ejemplo...", "o": ["aplicando 1NN sobre los centroides de cada clase (promedio de sus ejemplos)", "construyendo un árbol de decisión", "usando la sigmoide"], "c": 0, "e": "Calcula un centroide por clase (promedio de atributos de sus ejemplos) y clasifica con 1NN respecto a esos centroides. Es eficiente: solo hace tantas comparaciones como clases."}, {"m": "M2", "t": "La técnica de 'clustering dentro de clases' busca un compromiso entre kNN y centroides porque...", "o": ["elimina la necesidad de calcular distancias", "obtiene M representantes (centroides) por clase, reduciendo comparaciones (M×C) sin perder tanta representatividad", "convierte el problema en regresión"], "c": 1, "e": "Aplica un clustering (p. ej. k-means) por clase para obtener M representantes; luego usa kNN sobre M×C centroides. Es más representativo que un único centroide y más eficiente que kNN puro."}, {"m": "M2", "t": "En un árbol de decisión basado en ID3, la 'ganancia de información' se basa en...", "o": ["la distancia euclidiana", "la entropía: penaliza más los conjuntos mezclados", "el margen máximo"], "c": 1, "e": "ID3 usa la ganancia de información, definida a partir de la entropía. La entropía mide el desorden: 0 si una sola clase, máxima (1 en binario) si totalmente mezclado."}, {"m": "M2", "t": "La entropía de un conjunto S es máxima cuando...", "o": ["todos los ejemplos pertenecen a la misma clase", "las clases están totalmente mezcladas (mayor desorden)", "el conjunto está vacío"], "c": 1, "e": "La entropía H(S)=−Σ p(y)log2 p(y) es mínima (0) con una sola clase y máxima cuando las clases están equilibradas/mezcladas. La ganancia de información busca particiones que reduzcan la entropía."}, {"m": "M2", "t": "Para tratar atributos numéricos en árboles de decisión se utiliza...", "o": ["puntos de corte (promedios de valores consecutivos) que generan decisiones binarias", "la distancia de Hamming", "siempre la entropía cruzada"], "c": 0, "e": "Se ordenan los valores y se calculan puntos de corte como promedio de valores consecutivos; se elige el de mejor bondad. Esto genera divisiones binarias, y el atributo numérico puede reutilizarse en niveles posteriores."}, {"m": "M2", "t": "La poda (pruning) de un árbol de decisión tiene como objetivo...", "o": ["aumentar la profundidad del árbol", "evitar el sobreentrenamiento eliminando nodos/hojas que cubren muy pocos ejemplos", "convertir el árbol en una red neuronal"], "c": 1, "e": "La poda combate el overfitting: las hojas con muy pocos ejemplos no dan estimaciones fiables. Lo habitual es construir el árbol completo y luego eliminar nodos superfluos de las hojas hacia la raíz."}, {"m": "M2", "t": "En el truco del kernel (kernel trick), una función kernel κ(x,z) calcula...", "o": ["el producto escalar ⟨φ(x),φ(z)⟩ en un espacio de mayor dimensión sin calcular φ explícitamente", "la distancia de Hamming entre x y z", "la entropía del conjunto"], "c": 0, "e": "El kernel permite trabajar en un espacio proyectado de alta dimensión (donde los datos pueden ser linealmente separables) calculando directamente productos escalares, sin construir φ, con bajo coste extra."}, {"m": "M2", "t": "Una matriz kernel debe ser...", "o": ["antisimétrica", "simétrica y semidefinida positiva (valores propios ≥ 0)", "triangular inferior"], "c": 1, "e": "Las matrices kernel (y sus funciones asociadas) han de ser simétricas y semidefinidas positivas: todos sus valores propios deben ser ≥ 0."}, {"m": "M2", "t": "Las máquinas de vectores de soporte (SVM) escogen el hiperplano que...", "o": ["pasa por el centroide de cada clase", "tiene el margen máximo entre las clases", "minimiza el número de vectores de soporte a uno"], "c": 1, "e": "SVM busca el hiperplano de margen máximo entre positivos y negativos, basándose en la minimización del riesgo estructural. Está definido por los vectores de soporte (los puntos más cercanos al margen)."}, {"m": "M2", "t": "Los vectores de soporte en una SVM son...", "o": ["todos los ejemplos del conjunto de entrenamiento", "los ejemplos más cercanos al hiperplano, que lo definen (αi ≠ 0)", "los ejemplos peor clasificados"], "c": 1, "e": "Solo los puntos sobre el margen (vectores de soporte) tienen αi ≠ 0 y definen el hiperplano; el resto tiene αi = 0. Su número suele ser menor que el total de ejemplos."}, {"m": "M2", "t": "En una SVM de margen flexible (soft margin), el parámetro C controla...", "o": ["el número de clases", "el equilibrio entre maximizar el margen y penalizar los errores de clasificación (variables ξ)", "la profundidad del árbol"], "c": 1, "e": "El margen flexible admite errores a cambio de un mayor margen. El parámetro C equilibra la maximización del margen con la penalización de los errores (variables ξi)."}, {"m": "M2", "t": "Aprender el hiperplano de margen máximo de una SVM es un problema de...", "o": ["optimización cuadrática convexa con una única solución", "categorización no supervisada", "regresión lineal"], "c": 0, "e": "La formulación de la SVM es un problema de optimización cuadrática convexa con solución única, lo que le da buenas propiedades de generalización."}, {"m": "M2", "t": "En una red neuronal, la función de activación más utilizada en las capas ocultas es...", "o": ["la sigmoide", "la ReLU: g(z)=máx(0,z)", "la softmax"], "c": 1, "e": "ReLU (Rectified Linear Unit) g(z)=máx(0,z) es la más usada en entrada y capas ocultas. La sigmoide y la softmax suelen reservarse para la capa de salida (binaria y multiclase respectivamente)."}, {"m": "M2", "t": "En la capa de salida de una red para clasificación multiclase se usa habitualmente...", "o": ["ReLU", "softmax (una unidad por clase, salidas que suman 1)", "activación lineal"], "c": 1, "e": "Softmax produce una salida por clase con valores que suman 1, interpretables como probabilidades. La activación lineal es típica de regresión y la sigmoide de clasificación binaria."}, {"m": "M2", "t": "La técnica de regularización 'dropout' consiste en...", "o": ["detener el entrenamiento cuando el error de validación crece", "desactivar unidades aleatoriamente durante el entrenamiento para evitar el sobreajuste", "aumentar el número de capas"], "c": 1, "e": "Dropout desactiva neuronas al azar durante el entrenamiento, obligando al resto a generalizar y produciendo una red más robusta. La detención temprana (early stopping) es otra técnica distinta."}, {"m": "M2", "t": "La 'detención temprana' (early stopping) detiene el entrenamiento cuando...", "o": ["el error de entrenamiento llega a cero", "el error de validación empieza a crecer aunque el de entrenamiento siga bajando", "se alcanza el número máximo de capas"], "c": 1, "e": "Early stopping detecta el inicio del sobreajuste: cuando el error de validación empieza a subir mientras el de entrenamiento sigue bajando, se detiene el entrenamiento."}, {"m": "M2", "t": "La idea central del aprendizaje profundo (deep learning) es...", "o": ["aumentar mucho la anchura de una única capa oculta", "apilar varias capas ocultas, modelando niveles de abstracción crecientes", "eliminar las funciones de activación"], "c": 1, "e": "El deep learning incrementa el número de capas ocultas (no la anchura de una sola), de modo que cada capa modela un nivel de abstracción superior (bordes → esquinas → objetos). Se considera profunda una red con ~10+ capas."}, {"m": "M2", "t": "En clasificación multiclase con la estrategia 'una contra todas' (one-vs-all), para N clases se generan...", "o": ["N clasificadores binarios", "N·(N−1)/2 clasificadores binarios", "un único clasificador"], "c": 0, "e": "One-vs-all crea N clasificadores binarios (cada clase contra el resto). One-vs-one crea N·(N−1)/2 clasificadores (cada par de clases)."}, {"m": "M2", "t": "La estrategia 'una contra una' (one-vs-one) para N clases requiere...", "o": ["N clasificadores binarios", "N·(N−1)/2 clasificadores binarios", "2N clasificadores binarios"], "c": 1, "e": "One-vs-one entrena un clasificador por cada par de clases: N·(N−1)/2. En general supera en número a one-vs-all (salvo el caso de 3 clases, donde coinciden en 3)."}, {"m": "M2", "t": "La clasificación multietiqueta se diferencia de la multiclase en que...", "o": ["solo admite dos clases", "cada ejemplo puede tener asociadas varias etiquetas a la vez (o ninguna)", "no usa atributos"], "c": 1, "e": "En multietiqueta f(x) devuelve un conjunto de etiquetas (p. ej. [1,0,1] para varias personas en una foto), posiblemente vacío. En multiclase cada ejemplo tiene una única clase entre varias."}, {"m": "M2", "t": "En el dataset de spam (Spambase, PEC2), ¿por qué la normalización (StandardScaler) es importante para SVM o regresión logística pero no para los árboles de decisión?", "o": ["porque los árboles no admiten atributos numéricos", "porque SVM y regresión logística usan distancias/productos escalares sensibles a la escala, mientras que los árboles dividen por umbrales (invariantes a la escala)", "porque la normalización empeora el rendimiento de los árboles"], "c": 1, "e": "SVM y regresión logística dependen de productos escalares/distancias, por lo que atributos con rangos dispares dominarían; necesitan normalización. Los árboles eligen umbrales según entropía/ganancia de información, criterios invariantes a la escala, así que no la requieren (aunque no les perjudica)."}, {"m": "M3", "t": "La función de coste que se minimiza habitualmente en la regresión lineal es...", "o": ["la entropía cruzada", "el error cuadrático medio (MSE)", "la ganancia de información"], "c": 1, "e": "La regresión lineal ajusta los parámetros minimizando el error cuadrático medio entre predicción y valor real. Por convención J(θ)=1/2m·Σ(h(xi)−yi)²."}, {"m": "M3", "t": "En la regresión lineal univariante, la función de coste MSE es...", "o": ["no derivable", "convexa, con un único mínimo absoluto", "cóncava, con múltiples máximos"], "c": 1, "e": "Para la regresión lineal univariante la función de coste MSE es convexa y derivable, con un único mínimo absoluto, lo que permite resolverla con descenso de gradientes sin caer en mínimos locales."}, {"m": "M3", "t": "Una implementación sencilla de regresión kNN predice el valor de salida como...", "o": ["la media del valor y de los k vecinos más próximos", "la clase mayoritaria de los k vecinos", "la mediana de todos los datos"], "c": 0, "e": "En regresión, kNN promedia el valor y de los k vecinos más cercanos (o usa una media ponderada por la inversa de la distancia). En clasificación votaría la clase más frecuente."}, {"m": "M3", "t": "En un árbol de decisión para regresión, el criterio de división busca...", "o": ["minimizar la suma de las varianzas de y en los subconjuntos resultantes", "maximizar la entropía", "maximizar el margen"], "c": 0, "e": "En regresión, la partición que minimiza la suma de varianzas de y (izquierda + derecha) es la mejor; la varianza equivale al MSE de una recta de pendiente 0 que pasa por la media. Las hojas predicen la media de y."}, {"m": "M3", "t": "El Support Vector Regressor (SVR) se diferencia de la SVM de clasificación en que...", "o": ["no admite kernels", "su función de coste ignora los puntos dentro de una banda de anchura ε", "predice clases en lugar de valores"], "c": 1, "e": "SVR usa los mismos principios que SVM pero su función de coste ignora las muestras dentro de la banda ε; solo depende de los vectores de soporte fuera de ella. Admite kernels (lineal, polinómico, RBF)."}, {"m": "M3", "t": "Al usar una red neuronal para regresión, la función de activación de la unidad de salida suele ser...", "o": ["softmax", "lineal (g(z)=z)", "ReLU"], "c": 1, "e": "Para regresión, la salida suele tener activación lineal (un número real). A veces se usa la sigmoide si la salida está acotada. El MSE es la función de coste habitual (aunque no convexa en redes)."}, {"m": "M3", "t": "El objetivo principal de combinar métodos (ensemble learning) es...", "o": ["aumentar el sesgo de los modelos", "reducir el error (sobre todo la varianza) combinando varios modelos", "eliminar la necesidad de datos de entrenamiento"], "c": 1, "e": "Combinar modelos reduce el error asociado a usarlos individualmente, mejorando el compromiso sesgo-varianza (típicamente reduciendo varianza), incluso si todos los modelos usan el mismo algoritmo."}, {"m": "M3", "t": "En la combinación por 'hard voting' (voto mayoritario)...", "o": ["se promedian vectores de probabilidad", "se elige la clase que recibe más votos entre los clasificadores", "se suman los valores numéricos de salida"], "c": 1, "e": "Hard voting / majority voting elige la clase más votada entre los N clasificadores. El soft voting, en cambio, promedia los vectores de probabilidad de cada clasificador."}, {"m": "M3", "t": "En 'soft voting', a diferencia del hard voting...", "o": ["cada clasificador devuelve un vector de probabilidades que se promedian para decidir la clase", "solo se usa con regresión", "no se pueden asignar pesos a los clasificadores"], "c": 0, "e": "Soft voting suma/promedia las probabilidades por clase de cada clasificador y elige el argmax. Permite además ponderar clasificadores según su calidad."}, {"m": "M3", "t": "El bagging (bootstrap aggregating) construye los clasificadores...", "o": ["de manera secuencial, ponderando ejemplos difíciles", "de manera paralela e independiente, sobre subconjuntos muestreados con repetición", "usando un único subconjunto fijo"], "c": 1, "e": "Bagging genera T subconjuntos por muestreo con repetición (bootstrap) y entrena un clasificador en cada uno de forma paralela e independiente. El boosting, en cambio, es secuencial."}, {"m": "M3", "t": "El algoritmo Random Forest es un ejemplo típico de...", "o": ["boosting", "bagging (varios árboles entrenados con subconjuntos bootstrap)", "stacking"], "c": 1, "e": "Random Forest aplica bagging: entrena muchos árboles de decisión sobre subconjuntos bootstrap y agrega sus predicciones (voto o promedio), estimando mejor el valor verdadero."}, {"m": "M3", "t": "El bagging es especialmente recomendable cuando...", "o": ["el conjunto de entrenamiento contiene muestras mal etiquetadas (outliers)", "todos los datos son perfectos", "hay muy pocos atributos"], "c": 0, "e": "Como cada muestra mal etiquetada aparece solo en algunos subconjuntos, afecta a pocos clasificadores y resulta neutra para la mayoría, por lo que el bagging aísla el efecto de los outliers."}, {"m": "M3", "t": "A diferencia del bagging, el boosting (p. ej. AdaBoost) construye los clasificadores...", "o": ["de forma paralela e independiente", "de forma secuencial, asignando más peso a las muestras difíciles de iteraciones anteriores", "sin usar ninguna ponderación"], "c": 1, "e": "Boosting es secuencial: mantiene una distribución de pesos sobre los ejemplos y cada nuevo clasificador débil se centra en los ejemplos mal clasificados (con más peso) por los anteriores."}, {"m": "M3", "t": "En AdaBoost, la predicción final se obtiene como...", "o": ["el promedio simple de todos los clasificadores", "una combinación lineal ponderada de las hipótesis débiles: signo(Σ αt·ht(x))", "la clase del primer clasificador"], "c": 1, "e": "AdaBoost combina las hipótesis débiles ponderadas por αt (que depende del error εt de cada una): f(x)=Σ αt·ht(x), y el signo da la clase. |f(x)| mide la confianza."}, {"m": "M3", "t": "En AdaBoost, ¿qué le ocurre al peso de un ejemplo que ha sido mal clasificado en una iteración?", "o": ["disminuye, para ignorarlo", "aumenta, para que las siguientes reglas se centren en él", "se mantiene constante siempre"], "c": 1, "e": "Los pesos de los ejemplos mal clasificados aumentan exponencialmente, dirigiendo la atención de las siguientes hipótesis débiles hacia los casos más difíciles."}, {"m": "M3", "t": "AdaBoost guarda muchas similitudes con las SVM porque ambos...", "o": ["se basan en la maximización del margen", "usan exclusivamente kernels RBF", "son métodos no supervisados"], "c": 0, "e": "AdaBoost está fundamentado en la maximización del margen, igual que las SVM, lo que le confiere buenas propiedades de generalización y permite acotar el error de generalización."}, {"m": "M3", "t": "Los Random Subspace Methods (RSM) generan diversidad entre clasificadores...", "o": ["muestreando subconjuntos de ejemplos (filas)", "eliminando aleatoriamente atributos (trabajando en subespacios de características)", "ponderando secuencialmente los ejemplos"], "c": 1, "e": "RSM, a diferencia del bagging (que muestrea ejemplos/filas), trabaja en el espacio de los atributos: cada clasificador usa un subconjunto aleatorio de características. Útil en alta dimensionalidad con redundancia."}, {"m": "M3", "t": "En el stacked generalization (stacking), las predicciones de los clasificadores débiles...", "o": ["se descartan", "se concatenan como nuevos atributos (pseudoetiquetas) que alimentan a un metaalgoritmo", "se promedian sin más"], "c": 1, "e": "En stacking, cada clasificador genera una pseudoetiqueta que se apila como atributo adicional; un metaalgoritmo aprende a combinar esas predicciones para mejorar el resultado."}, {"m": "M3", "t": "Según el material, ¿por qué un modelo puede tener mejor RMSE pero peor MAE que otro? (PEC3)", "o": ["porque el RMSE ignora los outliers", "porque el RMSE penaliza mucho más los errores grandes (al elevarlos al cuadrado) que el MAE", "porque el MAE no se puede calcular en regresión"], "c": 1, "e": "El RMSE eleva los errores al cuadrado, penalizando fuertemente los errores grandes; el MAE trata todos los errores por igual. Un modelo muy consistente puede tener mejor RMSE aunque su error medio (MAE) sea algo mayor que el de otro que casi siempre acierta pero comete errores garrafales puntuales."}, {"m": "M3", "t": "En la regresión lineal multivariante, el modelo h(x)=θᵀx se optimiza...", "o": ["también por descenso de gradientes, ya que la función de coste sigue siendo derivable y convexa", "únicamente por fuerza bruta", "con la entropía como criterio"], "c": 0, "e": "Igual que en el caso univariante, la función de coste MSE multivariante es derivable y convexa, por lo que se puede aplicar descenso de gradientes para hallar los θ óptimos."}, {"m": "M3", "t": "Una estrategia para construir clasificadores diferentes en un ensemble usando el MISMO algoritmo es...", "o": ["cambiar el lenguaje de programación", "variar los datos de entrenamiento (distintos subconjuntos de ejemplos o de atributos)", "usar siempre los mismos datos exactos"], "c": 1, "e": "Con el mismo algoritmo se logra diversidad variando los datos: distintos subconjuntos de ejemplos (bagging, boosting) o de atributos (RSM, stacking). Combinar algoritmos distintos es la otra gran estrategia."}, {"m": "M4", "t": "En una red neuronal convolucional (CNN) para clasificar imágenes, las imágenes de entrada deben...", "o": ["tener todas las mismas dimensiones (tamaño uniforme)", "ser todas distintas en tamaño", "estar siempre en blanco y negro"], "c": 0, "e": "Las CNN requieren entradas de tamaño uniforme para realizar las operaciones matemáticas de las capas convolucionales; por eso en el preprocesamiento se redimensionan todas las imágenes a un mismo tamaño."}, {"m": "M4", "t": "En la PEC4, el modelo CNN básico se construye con bloques de...", "o": ["Conv2D + MaxPooling2D, seguidos de una capa densa y una salida softmax", "solo capas densas", "capas recurrentes (LSTM)"], "c": 0, "e": "El modelo secuencial consta de dos bloques Conv2D + MaxPooling2D, una capa densa y una capa de salida con tantas neuronas como clases y activación softmax (3 neuronas para adidas/converse/nike)."}, {"m": "M4", "t": "¿Por qué softmax es adecuada en la capa de salida de una clasificación multiclase?", "o": ["porque devuelve siempre 0 o 1", "porque convierte la salida en un vector de probabilidades que suman 1 (una por clase)", "porque elimina el sobreajuste"], "c": 1, "e": "Softmax produce un vector con una componente por clase cuyos valores suman 1, interpretables como la probabilidad de pertenecer a cada clase; se elige la de mayor probabilidad."}, {"m": "M4", "t": "La técnica de 'aumento de datos' (data augmentation) consiste en...", "o": ["eliminar imágenes del conjunto de entrenamiento", "generar variaciones de las imágenes (giros, recortes, zoom...) para ampliar el conjunto y reducir el sobreajuste", "reducir la resolución de las imágenes"], "c": 1, "e": "El data augmentation crea datos 'falsos' a partir de los disponibles (rotaciones, recortes, ruido, zoom...), ayudando al modelo a generalizar mejor y evitar el overfitting al simular más escenarios."}, {"m": "M4", "t": "El 'Batch Normalization' aplicado tras las capas convolucionales sirve para...", "o": ["estabilizar y acelerar el entrenamiento normalizando las activaciones (media ~0, desviación ~1)", "eliminar capas de la red", "convertir la red en un árbol de decisión"], "c": 0, "e": "Batch Normalization normaliza las activaciones de cada capa, estabilizando y acelerando la convergencia; además introduce algo de ruido que actúa como regularización adicional."}, {"m": "M4", "t": "En la PEC4 se compila el modelo con la función de pérdida 'sparse_categorical_crossentropy'. ¿Para qué tipo de problema es adecuada?", "o": ["regresión con salida continua", "clasificación multiclase con etiquetas enteras", "clustering no supervisado"], "c": 1, "e": "La entropía cruzada categórica es la pérdida estándar para clasificación multiclase; la variante 'sparse' se usa cuando las etiquetas son enteros (0,1,2...) en lugar de vectores one-hot."}, {"m": "M4", "t": "El callback 'EarlyStopping' monitorizando val_loss ayuda a...", "o": ["acelerar la GPU", "evitar el sobreajuste deteniendo el entrenamiento cuando el modelo deja de mejorar en validación", "aumentar el número de clases"], "c": 1, "e": "EarlyStopping interrumpe el entrenamiento cuando la pérdida de validación deja de mejorar durante varias épocas (parámetro patience), evitando que el modelo memorice el entrenamiento y sobreajuste."}, {"m": "M4", "t": "En 'transfer learning' con EfficientNetB0 preentrenado en ImageNet, usar include_top=False significa...", "o": ["eliminar la capa de clasificación original para añadir una cabeza personalizada al nuevo problema", "congelar todas las capas para siempre", "entrenar la red desde cero"], "c": 0, "e": "include_top=False descarta la capa de salida original (de las 1000 clases de ImageNet) y permite añadir una cabeza nueva (p. ej. GlobalAveragePooling + Dropout + softmax) adaptada a las clases del problema actual."}, {"m": "M4", "t": "En la estrategia de transfer learning, ¿qué se hace primero con las capas del modelo base preentrenado?", "o": ["se eliminan todas", "se congelan (no se entrenan) para aprovechar los pesos preentrenados, descongelando solo algunas capas finales", "se reinicializan a valores aleatorios"], "c": 1, "e": "Se congelan las capas base para conservar el conocimiento general aprendido en ImageNet; solo se entrena la cabeza nueva (y opcionalmente se descongelan las últimas capas). El 'fine-tuning' posterior descongela más capas con una tasa de aprendizaje baja."}, {"m": "M4", "t": "En la fase de 'fine-tuning' tras descongelar las capas del modelo base, se recomienda...", "o": ["usar una tasa de aprendizaje baja (p. ej. 0.0001) para no destruir los pesos preentrenados", "usar una tasa de aprendizaje muy alta", "eliminar la función de pérdida"], "c": 0, "e": "Al descongelar capas preentrenadas se usa una tasa de aprendizaje pequeña para ajustarlas suavemente sin destruir el conocimiento útil ya aprendido."}, {"m": "M4", "t": "En la PEC4, el modelo con transfer learning (≈84% test) superó claramente a la CNN entrenada desde cero (≈64% test). La razón principal es que...", "o": ["la CNN desde cero tenía más capas", "EfficientNetB0 fue preentrenado en un conjunto enorme (ImageNet) y transfiere características visuales generales útiles", "el transfer learning no usa datos de entrenamiento"], "c": 1, "e": "El modelo preentrenado ya ha aprendido representaciones visuales generales (bordes, texturas, formas) sobre millones de imágenes de ImageNet, que se transfieren al nuevo problema con pocas imágenes, mejorando la generalización."}, {"m": "M4", "t": "El optimizador utilizado para entrenar las redes en la PEC4 es...", "o": ["Adam", "k-means", "AdaBoost"], "c": 0, "e": "Adam es el optimizador empleado (con learning_rate=0.001 en el modelo desde cero). Es un método de descenso de gradientes adaptativo muy usado en deep learning. k-means y AdaBoost no son optimizadores de redes."}, {"m": "M4", "t": "Usar dropout del 50% tras la capa densa y kernel_regularizer='l2' en las convoluciones son ejemplos de...", "o": ["técnicas de aumento de datos", "técnicas de regularización para reducir el sobreajuste", "funciones de activación"], "c": 1, "e": "Tanto el dropout (apagar neuronas al azar) como la regularización L2 (penalizar pesos grandes) son técnicas de regularización que ayudan a que la red generalice mejor y no sobreajuste."}, {"m": "M4", "t": "Un modelo 'multimodal' como el planteado en la PEC4...", "o": ["solo procesa imágenes", "combina varias fuentes de datos (p. ej. imágenes + datos tabulares) concatenando sus representaciones antes de las capas finales", "solo procesa texto"], "c": 1, "e": "Un modelo multimodal integra distintos tipos de datos: una rama procesa las imágenes y su salida se concatena con los datos tabulares antes de las capas densas de clasificación. La calidad de los datos tabulares afecta a la predicción."}, {"m": "M4", "t": "En una CNN, una capa de MaxPooling2D tiene como función principal...", "o": ["aumentar la resolución de la imagen", "reducir las dimensiones espaciales (submuestreo), quedándose con los valores máximos de cada región", "aplicar la activación softmax"], "c": 1, "e": "El max pooling reduce el tamaño espacial de los mapas de características quedándose con el valor máximo de cada región, disminuyendo el coste y aportando cierta invariancia a pequeñas traslaciones."}, {"m": "M4", "t": "En la PEC4, un accuracy de test del 33,33% en un problema de 3 clases equilibradas equivaldría a...", "o": ["un modelo excelente", "el rendimiento del azar (1/3)", "un modelo con sobreajuste perfecto"], "c": 1, "e": "Con 3 clases equilibradas, acertar al azar da 1/3 ≈ 33,33%. Un modelo útil debe superar ese umbral; el modelo desde cero logró ~64% y el de transfer learning ~84%."}, {"m": "M5", "t": "La idea básica del filtraje colaborativo es que...", "o": ["se recomienda según las características descritas de los productos", "si dos usuarios comparten intereses, lo que le gusta a uno probablemente le gustará al otro", "se usan reglas explícitas definidas por expertos"], "c": 1, "e": "El filtraje colaborativo se basa solo en las valoraciones de los usuarios: si dos usuarios tienen gustos similares, los ítems valorados por uno se recomiendan al otro. No usa características de los ítems (eso es contenido) ni reglas (eso es conocimiento)."}, {"m": "M5", "t": "En el filtraje colaborativo, una valoración 'implícita' es...", "o": ["una puntuación explícita de 1 a 5 estrellas", "la que se deduce de una acción como adquirir/consumir un ítem, sin puntuación explícita", "una descripción textual del producto"], "c": 1, "e": "Las valoraciones implícitas se infieren del comportamiento (p. ej. comprar o ver un ítem), mientras que las explícitas son puntuaciones directas (escala de estrellas)."}, {"m": "M5", "t": "En el filtraje colaborativo basado en usuarios, la medida de similitud habitual entre usuarios es...", "o": ["el coeficiente de correlación de Pearson", "la entropía", "la ganancia de información"], "c": 0, "e": "Se suele usar el coeficiente de correlación de Pearson porque es independiente de desplazamientos y escalas (corrige que unos usuarios puntúen alto y otros b
