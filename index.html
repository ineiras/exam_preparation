<style>

  --grad:linear-gradient(95deg,#8b9aff,#53cdff);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    radial-gradient(1100px 500px at 85% -10%, #232c5a66, transparent 60%),
    radial-gradient(900px 500px at -10% 110%, #1b234a88, transparent 55%),
    linear-gradient(170deg,var(--bg),var(--bg2));

.wrap{max-width:860px;margin:0 auto;padding:14px 16px 100px}
h1{font-size:21px;margin:6px 0 2px;letter-spacing:.2px}
h2{font-size:17px;margin:0 0 12px}
h3{font-size:15px;margin:0 0 8px}
.sub{color:var(--muted);font-size:13.5px;margin:0 0 16px}
.grtxt{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.card{background:linear-gradient(180deg,var(--card),#141a33);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 8px 28px rgba(0,0,0,.32)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.mode{background:linear-gradient(180deg,var(--card2),#1a2240);border:1px solid var(--line);border-radius:16px;padding:15px;cursor:pointer;transition:.18s;text-align:left;color:var(--txt);position:relative;overflow:hidden}
.mode:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.35)}
.mode:active{transform:scale(.985)}
.mode h3{margin:0 0 5px;font-size:14.8px}
.mode p{margin:0;color:var(--muted);font-size:12.6px}
.mode .ico{font-size:22px;margin-bottom:8px}
.btn{background:var(--grad);color:#0a1020;border:none;border-radius:12px;padding:12px 19px;font-size:14.5px;font-weight:700;cursor:pointer;transition:.16s;box-shadow:0 4px 16px #53cdff2e}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--txt);box-shadow:none}
.btn.sm{padding:8px 14px;font-size:13px;border-radius:10px}
.btn.ok{background:var(--ok);color:#04261d}
.btn.bad{background:var(--bad);color:#fff}
.btn.warn{background:var(--warn);color:#3a2300}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-size:12px;color:var(--muted)}
.pill.acc{color:var(--acc2);border-color:var(--acc)}
.pill.hot{color:var(--gold);border-color:var(--gold)}
/* ===== opciones de pregunta ===== */
.opt{display:block;width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:14px;padding:13px 15px;margin:9px 0;cursor:pointer;color:var(--txt);font-size:14.6px;transition:.14s;line-height:1.45}
.opt:hover:not(:disabled){border-color:var(--acc);transform:translateX(3px)}
.opt:disabled{cursor:default}
.opt .lt{display:inline-block;width:25px;height:25px;line-height:25px;text-align:center;background:var(--card);border-radius:8px;margin-right:11px;font-weight:800;font-size:12.5px;flex:none;color:var(--muted)}
.opt.sel{border-color:var(--acc2);background:var(--card3)}
.opt.sel .lt{background:var(--acc2);color:#06283b}
.opt.correct{border-color:var(--ok);background:var(--okbg);animation:pop .35s ease}
.opt.correct .lt{background:var(--ok);color:#04261d}
.opt.wrong{border-color:var(--bad);background:var(--badbg2);animation:shake .4s ease}
.opt.wrong .lt{background:var(--bad);color:#3a0011}
.opt.dim{opacity:.55}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.025)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fall{to{transform:translateY(105vh) rotate(640deg);opacity:.1}}
.view{animation:fadeUp .24s ease}
.qtext{font-size:16.2px;font-weight:650;margin:6px 0 12px;line-height:1.5}
/* ===== feedback de respuesta ===== */
.feed{border-radius:14px;padding:14px 16px;margin-top:12px;font-size:14px;display:none;animation:fadeUp .25s ease}
.feed.show{display:block}
.feed.good{background:var(--okbg);border:1px solid var(--ok)}
.feed.bad{background:var(--badbg2);border:1px solid var(--bad)}
.feed .ttl{font-weight:800;font-size:14.5px;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.feed .why{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line2);color:#ffd9e1}
.feed .why b{color:var(--bad)}
.feed .exp b{color:var(--acc2)}
.srschip{display:inline-block;margin-top:10px;font-size:11.5px;color:var(--muted);background:var(--card2);border:1px solid var(--line);border-radius:99px;padding:3px 10px}
.bar{height:9px;background:var(--card2);border-radius:99px;overflow:hidden;margin:12px 0}
.bar>i{display:block;height:100%;background:var(--grad);width:0;transition:.35s ease}
.timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:15px}
.timer.danger{color:var(--bad);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.55}}
.stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line);font-size:14px;gap:10px}

.ok-t{color:var(--ok)} .bad-t{color:var(--bad)} .warn-t{color:var(--warn)} .acc-t{color:var(--acc2)} .gold-t{color:var(--gold)}

.mini>i{display:block;height:100%;border-radius:99px;transition:.4s}
.mb{margin:10px 0}

/* ===== teoría ===== */

.theory ul,.theory ol{font-size:14.2px;margin:7px 0;padding-left:20px}

.theory table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0;display:block;overflow-x:auto}

<script>
"use strict";
/* ================== CONSTANTES ================== */
const EXAM_DATE = new Date(2026,5,17);
const MODS = {
  M1:"M1 · Introducción al AA",
  M2:"M2 · Clasificación",
  M3:"M3 · Regresión y ensembles",
  M4:"M4 · Deep Learning",
  M5:"M5 · Recomendadores",
  M6:"M6 · Refuerzo"
};
const MODS_SHORT = {M1:"M1",M2:"M2",M3:"M3",M4:"M4",M5:"M5",M6:"M6"};
const MOD_COLORS = {M1:"#8b9aff",M2:"#53cdff",M3:"#34dca4",M4:"#ffc95c",M5:"#ff8cae",M6:"#c89bff"};

/* ================== STORAGE ================== */
const store = {
  get(k,d){ try{ const v = localStorage.getItem("aa2_"+k); return v===null?d:JSON.parse(v);}catch(e){return d;} },
  set(k,v){ try{ localStorage.setItem("aa2_"+k, JSON.stringify(v)); }catch(e){} }
};
function qstats(){ return store.get("qstats",{}); }
function failedIds(){ const s=qstats(); return Object.keys(s).filter(k=>s[k].last===0); }
function examHistory(){ return store.get("examHist",[]); }
function pushExam(r){ const h=examHistory(); h.push(r); store.set("examHist",h); }

/* ================== HELPERS ================== */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2400); }
function daysLeft(){ const now=new Date(); now.setHours(0,0,0,0); return Math.max(0,Math.round((EXAM_DATE-now)/86400000)); }
function todayKey(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function app(){ return document.getElementById("app"); }
function scrollTop(){ window.scrollTo({top:0}); }
function ring(pct,txt,sub,color){
  const r=46, c=2*Math.PI*r, off=c*(1-Math.min(1,Math.max(0,pct)));
  return `<div class="ring"><svg width="100%" height="100%" viewBox="0 0 108 108">
    <circle cx="54" cy="54" r="${r}" fill="none" stroke="var(--card2)" stroke-width="9"/>
    <circle cx="54" cy="54" r="${r}" fill="none" stroke="${color||"url(#g1)"}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b9aff"/><stop offset="1" stop-color="#53cdff"/></linearGradient></defs>
  </svg><div class="rtxt"><b>${txt}</b><span>${sub}</span></div></div>`;
}
function confetti(){
  const E=["🎉","✨","⭐","🎊","💫"];
  for(let i=0;i<26;i++){
    const s=document.createElement("span"); s.className="confetti";
    s.textContent=E[Math.floor(Math.random()*E.length)];
    s.style.left=Math.random()*100+"vw";
    s.style.animationDelay=(Math.random()*0.7)+"s";
    s.style.fontSize=(14+Math.random()*14)+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),3600);
  }
}
</script>

<script>
const THEORY = {};
/* ============================================================ MÓDULO 1 */
THEORY.M1 = `
<h3>1. ¿Qué es el aprendizaje automático?</h3>
<p>El aprendizaje automático (<i>machine learning</i>) es la rama de la IA que estudia algoritmos que <b>mejoran automáticamente con la experiencia</b>, construyendo un modelo matemático a partir de <b>datos de entrenamiento</b> en lugar de estar programados explícitamente.</p>
<div class="form">Mitchell (1997): un programa <b>aprende</b> de la experiencia <b>E</b> respecto a una tarea <b>T</b> y una medida de rendimiento <b>P</b> si su rendimiento en T, medido por P, <b>mejora con E</b>.</div>
<div class="key">Memoriza la definición de Mitchell con sus tres elementos (T, P, E). No exige modificar código ni memorizar datos: solo que el rendimiento mejore con la experiencia.</div>

<h3>2. Los tres paradigmas de aprendizaje</h3>
<table><tr><th>Paradigma</th><th>¿Qué información tiene?</th><th>Tareas típicas</th></tr>
<tr><td><b>Supervisado</b></td><td>Para cada entrada se conoce la <b>salida correcta</b> (etiqueta)</td><td>Clasificación, regresión</td></tr>
<tr><td><b>No supervisado</b></td><td>Solo entradas, <b>sin salida</b></td><td>Clustering (categorización), detección de anomalías</td></tr>
<tr><td><b>Por refuerzo</b></td><td>Conocimiento <b>parcial</b>: solo recompensa/penalización según el resultado, nunca la salida correcta</td><td>Agentes, robots, juegos</td></tr></table>
<p>Dentro del supervisado:</p>
<ul><li><b>Regresión</b>: el atributo solución es <b>numérico continuo</b> (p. ej., precio de una casa).</li>
<li><b>Clasificación</b>: el atributo solución es <b>categórico o binario</b> (p. ej., seta venenosa/comestible, especie de iris).</li></ul>
<div class="warnbox">«Categorización» en los materiales UOC = <b>clustering</b> (no supervisado). No la confundas con clasificación (supervisada).</div>

<h3>3. Preparación de los datos</h3>
<p>Etapas del proceso completo: <b>1)</b> obtención de los datos → <b>2)</b> representación de la información → <b>3)</b> selección/extracción de características → <b>4)</b> aprendizaje → <b>5)</b> evaluación → <b>6)</b> predicción.</p>
<h4>Atributos categóricos → binarios</h4>
<ul><li><b>Nominal</b> con R valores → R atributos binarios (se activa el del valor presente; <i>one-hot</i>).</li>
<li><b>Ordinal</b> con R valores → <b>R−1</b> binarios con <b>codificación aditiva</b> (se activan los de los valores ≤ al observado).</li></ul>
<h4>Distancias y similitudes</h4>
<ul><li><b>Euclidiana</b>: atributos numéricos. d(x,z)=√Σ(xⱼ−zⱼ)².</li>
<li><b>Hamming</b>: atributos binarios/categóricos; cuenta cuántos atributos difieren.</li>
<li>Si la distancia d ∈ [0,1], la similitud es s = 1 − d.</li>
<li>Atributos con rangos muy distintos dominan la distancia → conviene <b>normalizar</b>; se pueden añadir <b>pesos</b> por atributo.</li></ul>

<h3>4. Selección vs. extracción de características</h3>
<table><tr><th></th><th>Selección</th><th>Extracción</th></tr>
<tr><td>¿Qué hace?</td><td><b>Elige un subconjunto</b> de los atributos originales</td><td><b>Crea atributos nuevos</b> combinando los originales</td></tr>
<tr><td>Ejemplos</td><td>filtros, wrappers, algoritmos genéticos</td><td><b>PCA, LDA</b></td></tr></table>
<p>Motivaciones: reducir redundancia y ruido, reducir coste computacional y combatir la <b>maldición de la dimensionalidad</b> (Bellman): el número de muestras necesario crece <b>exponencialmente</b> con la dimensión del espacio.</p>
<h4>PCA (Análisis de Componentes Principales)</h4>
<ul><li><b>No supervisado</b> (no usa etiquetas).</li>
<li>Busca la proyección lineal de menor dimensión que <b>minimiza el error cuadrático de reconstrucción</b> (equivale a quedarse con las direcciones de <b>máxima varianza</b>).</li>
<li>Procedimiento: centrar datos → matriz de covarianza → tomar los <b>vectores propios de mayores valores propios</b> como matriz de proyección.</li></ul>
<h4>LDA (Análisis Discriminante Lineal, Fisher)</h4>
<ul><li><b>Supervisado</b>: usa las etiquetas de clase.</li>
<li>Busca la proyección que <b>maximiza la dispersión interclase</b> (separar clases) y <b>minimiza la intraclase</b> (compactar cada clase).</li></ul>
<div class="key">PCA = no supervisado + error de reconstrucción/varianza. LDA = supervisado + separación entre clases. Es una de las comparaciones favoritas en los test.</div>

<h3>5. Aprendizaje no supervisado: k-means</h3>
<p>Construye una partición en <b>k categorías disjuntas</b>, cada una representada por un <b>centroide</b> (prototipo). Minimiza la suma de distancias al cuadrado de cada punto a su centroide.</p>
<ol><li>Inicializar k centroides (p. ej., al azar).</li>
<li><b>Asignación</b>: cada punto a su centroide más cercano.</li>
<li><b>Actualización</b>: recalcular cada centroide como la <b>media</b> de sus puntos.</li>
<li>Repetir 2–3 hasta converger (los centroides no cambian).</li></ol>
<ul><li>k es un <b>hiperparámetro</b> (hay que fijarlo a priori).</li>
<li>Converge a un <b>mínimo local</b>: el resultado depende de la inicialización.</li>
<li>Variantes de estructura: categorías disjuntas (k-means), difusas (<i>fuzzy</i> k-means), jerárquicas (dendrograma).</li></ul>

<h3>6. Partición de datos e hiperparámetros</h3>
<ul><li><b>Entrenamiento</b>: ajustar los parámetros del modelo.</li>
<li><b>Validación</b>: subconjunto del entrenamiento usado para <b>ajustar hiperparámetros</b> (k de kNN, profundidad del árbol…).</li>
<li><b>Prueba (test)</b>: medir la generalización. <b>Nunca</b> puede usarse para entrenar ni para elegir hiperparámetros.</li></ul>
<h4>Validación cruzada (k-fold cross validation)</h4>
<p>Se divide el conjunto en <b>k particiones</b>; se entrena con k−1 y se evalúa con la restante, repitiendo <b>k veces</b> y <b>promediando</b> el error. Valores habituales: k = 5 o 10. Útil cuando hay pocos datos.</p>
<div class="warnbox">Usar el conjunto de test para elegir hiperparámetros invalida la medida de generalización. Para eso está el conjunto de <b>validación</b>.</div>

<h3>7. Métricas de evaluación</h3>
<h4>Clasificación</h4>
<div class="form">Exactitud (accuracy) = aciertos / total &nbsp;&nbsp;·&nbsp;&nbsp; Tasa de error = fallos / total = 1 − accuracy</div>
<p>La <b>matriz de confusión</b> (filas = clase real, columnas = predicción) detalla los errores por clase. En binario: TP, TN, FP, FN (la diagonal son los aciertos).</p>
<div class="form">Precisión P = TP / (TP+FP) &nbsp;&nbsp;·&nbsp;&nbsp; Sensibilidad/Recall R = TP / (TP+FN)</div>
<ul><li><b>Precisión</b>: de lo que predije como positivo, ¿cuánto era realmente positivo?</li>
<li><b>Recall</b>: de todos los positivos reales, ¿cuántos detecté?</li>
<li>La accuracy puede engañar con <b>clases desbalanceadas</b> → mirar métricas por clase o la matriz de confusión.</li></ul>
<h4>Regresión</h4>
<div class="form">residuo = y′ − y &nbsp;·&nbsp; MSE = (1/N)·Σ(y′−y)² &nbsp;·&nbsp; RMSE = √MSE</div>
<p>El <b>RMSE</b> es más interpretable porque está en las <b>mismas unidades</b> que la variable (euros, no euros²).</p>

<h3>8. Minimización del error, sesgo y varianza</h3>
<p>Aprender = <b>minimizar el error</b> en el entrenamiento (minimización empírica del riesgo), confiando en generalizar si train y test son i.i.d. (misma distribución). A veces se minimiza una función distinta de la métrica final: p. ej., en clasificación con redes se minimiza la <b>entropía cruzada</b> (derivable), no la tasa de error.</p>
<ul><li><b>Sesgo (bias)</b>: error por suposiciones del modelo (espacio de hipótesis restringido). Modelo demasiado simple → <b>subajuste (underfitting)</b>: ni siquiera va bien en entrenamiento.</li>
<li><b>Varianza</b>: sensibilidad al conjunto de entrenamiento concreto. Modelo demasiado complejo → <b>sobreajuste (overfitting)</b>: clava el entrenamiento, falla en test.</li></ul>
<div class="key">Compromiso sesgo–varianza: ↑complejidad ⇒ ↓sesgo y ↑varianza. Los <b>ensembles</b> (M3) consiguen bajar la varianza manteniendo modelos complejos. El sesgo inductivo no es «malo»: sin él no se puede generalizar.</div>
<div class="ej">Ajustar 4 puntos con una recta (mucho sesgo, poca varianza) vs. un polinomio de grado 9 (poco sesgo, mucha varianza, oscila). El término medio generaliza mejor.</div>
`;

/* ============================================================ MÓDULO 2 */
THEORY.M2 = `
<h3>1. El problema de clasificación</h3>
<p>Inducir una aproximación (hipótesis <b>h</b>) de una función desconocida <b>f : X → Y</b> con Y <b>discreto y desordenado</b>, a partir de un conjunto de entrenamiento S = {(x₁,y₁),…,(xₙ,yₙ)}. Tres fases: definición de clases, representación de la información (¡tan importante como el algoritmo!) y aprendizaje.</p>
<p><b>Error de generalización</b>: error sobre ejemplos no vistos. Como no se conoce f, se minimiza el <b>error empírico</b> (sobre el entrenamiento). Con pocos datos, forzar error empírico ≈ 0 produce <b>sobreentrenamiento</b>; la complejidad del modelo se mide con la dimensión de <b>Vapnik-Chervonenkis</b>.</p>
<p>Tipología de métodos según el principio de inducción: <b>probabilísticos · distancias · reglas · kernels</b> (+ redes neuronales).</p>

<h3>2. Naive Bayes (probabilístico)</h3>
<div class="form">ŷ = argmax<sub>k</sub> P(k) · Π<sub>i</sub> P(x<sub>i</sub>|k)</div>
<p>P(k) y P(xᵢ|k) se estiman con <b>frecuencias relativas</b> (máxima verosimilitud) sobre el entrenamiento.</p>
<ul><li>Asume <b>independencia condicional</b> entre atributos (de ahí «naive»): casi nunca es cierta, pero funciona bien si el entrenamiento representa bien las distribuciones.</li>
<li>Si una pareja atributo-valor no aparece en entrenamiento → P = 0 anula todo el producto → se aplica <b>suavizado</b> (p. ej., sustituir por P(k)/n).</li>
<li>Atributos continuos: <b>discretizar</b> o asumir distribución <b>gaussiana</b> por clase.</li>
<li>Con clases desbalanceadas tiende a predecir la clase mayoritaria.</li>
<li>Ventajas: <b>simple y eficiente</b>.</li></ul>

<h3>3. Regresión logística (probabilístico)</h3>
<p>Modelo de <b>clasificación binaria</b> que pasa una combinación lineal por la <b>función sigmoide</b> para obtener una probabilidad en (0,1):</p>
<div class="form">σ(x) = 1/(1+e<sup>−x</sup>) &nbsp;&nbsp;·&nbsp;&nbsp; P(Y=1|x) = e<sup>β₀+β₁x</sup>/(1+e<sup>β₀+β₁x</sup>)</div>
<ul><li>Aunque «clasifica», es un modelo de <b>regresión</b> sobre el logaritmo de los odds: ln[P/(1−P)] = β₀+β₁X (<i>log odds</i>).</li>
<li>Los β se estiman por <b>máxima verosimilitud</b>; la clase se asigna con un umbral (p. ej., 0.5).</li>
<li><b>No asume independencia</b> entre atributos (a diferencia de Naive Bayes).</li>
<li>Funciona bien si los datos son <b>separables linealmente</b>; es poco propensa al sobreajuste, fácil de interpretar y entrenar.</li></ul>

<h3>4. kNN, centroides y clustering dentro de clases (distancias)</h3>
<h4>kNN (k vecinos más cercanos)</h4>
<ul><li>Entrenar = <b>guardar los ejemplos</b>; todo el cálculo se pospone a la clasificación → <b>aprendizaje perezoso (lazy)</b>, basado en memoria/instancias.</li>
<li>Para clasificar: calcular distancia a <b>todos</b> los ejemplos, tomar los k más cercanos y votar la <b>clase más frecuente</b>.</li>
<li>k <b>impar o primo</b> para minimizar empates; distancia euclidiana (numéricos) o Hamming (nominales); MVDM para PLN (costosa).</li>
<li>Variantes: votos <b>ponderados por cercanía</b>; pesos por atributo (p. ej., distancia RLM); selección de atributos previa.</li>
<li>Ventaja: conserva las <b>excepciones</b>. Inconvenientes: clasificación <b>lenta</b> (malo para tiempo real) y sensible a atributos irrelevantes.</li></ul>
<h4>Clasificador lineal basado en distancias (centroides)</h4>
<p>Un <b>centroide por clase</b> = media de sus ejemplos; se clasifica con 1NN sobre los centroides. Solo C comparaciones, pero un único prototipo puede representar mal la clase. Equivale a un hiperplano: w = p − n, con b = −½(⟨p,p⟩−⟨n,n⟩).</p>
<h4>Clustering dentro de clases</h4>
<p>Punto intermedio: aplicar k-means <b>dentro de cada clase</b> para obtener M centroides por clase y clasificar con kNN sobre los M×C centroides. Equilibra coste (kNN puro = n comparaciones) y representatividad (centroides = C).</p>

<h3>5. Árboles de decisión (reglas)</h3>
<p>Estructura en árbol que particiona los datos recursivamente: nodos internos = pregunta sobre un atributo; hojas = predicción. Cada rama es una regla interpretable.</p>
<ol><li>Para cada atributo, medir la <b>bondad</b> de su partición (básica: % de ejemplos bien clasificados asignando a cada hijo su clase mayoritaria).</li>
<li>Elegir el mejor atributo; los hijos puros → hojas; los impuros → iterar <b>eliminando ese atributo</b> (si es nominal).</li>
<li>Sin atributos restantes → hoja con clase mayoritaria.</li></ol>
<h4>ID3: entropía y ganancia de información</h4>
<div class="form">H(S) = −Σ p(y)·log₂ p(y) &nbsp;&nbsp;·&nbsp;&nbsp; G(S,a) = H(S) − Σ<sub>v</sub> p(v)·H(S<sub>v</sub>)</div>
<p>Entropía: 0 si el conjunto es puro, 1 (máxima) si es totalmente aleatorio (binario 50/50). ID3 elige el atributo con <b>mayor ganancia</b>. Penaliza más los conjuntos mezclados que la bondad básica.</p>
<h4>Atributos numéricos</h4>
<p><b>Puntos de corte</b>: ordenar valores, quitar repetidos, candidatos = promedio de cada par consecutivo, elegir el de mejor bondad. Genera decisiones <b>binarias</b> y el atributo <b>puede reutilizarse</b> en niveles inferiores (a diferencia de los nominales).</p>
<h4>Poda (pruning)</h4>
<p>Las hojas con pocos ejemplos no son fiables → sobreajuste. Lo habitual: construir todo el árbol y <b>podar de abajo arriba</b> los nodos que no aportan (umbral de entropía). Parar pronto por umbral tiene el problema de que la mejora puede llegar un paso después.</p>
<ul><li>Ventajas: <b>interpretabilidad</b> (información clara de la decisión y de la importancia de atributos).</li>
<li>Inconvenientes: fragmentación con atributos de muchos valores, coste, sobreajuste, inestabilidad (pequeños cambios en datos → árbol distinto).</li></ul>

<h3>6. Clasificadores lineales y kernels</h3>
<p>Un clasificador lineal binario es un <b>hiperplano</b> definido por un vector de pesos <b>w</b> y un umbral/sesgo <b>b</b>:</p>
<div class="form">h(x) = signo(⟨w,x⟩ + b)</div>
<p>La magnitud de ⟨w,x⟩+b mide la <b>confianza</b> (distancia al hiperplano).</p>
<h4>El truco del kernel</h4>
<ul><li>Para conjuntos <b>no separables linealmente</b>: proyectar los datos con una función φ a otro espacio donde sí sean separables, y aplicar allí el algoritmo lineal.</li>
<li>No se trabaja con φ sino con la <b>función kernel</b> κ(x,z) = ⟨φ(x),φ(z)⟩: nunca se calcula φ explícitamente (<b>formulación dual</b>: los ejemplos solo aparecen en productos escalares).</li>
<li>La <b>matriz kernel</b> (proyecciones dos a dos de los ejemplos) debe ser <b>simétrica y semidefinida positiva</b>.</li>
<li>Kernels habituales: <b>polinómico</b> (γ·u′v + coef)<sup>grado</sup> y <b>gaussiano/RBF</b> κ(x,z)=exp(−γ‖x−z‖²).</li>
<li>No existe un kernel «mejor»: depende del problema. El kernel se puede usar también en clustering o PCA (kernel PCA, kernel k-means).</li></ul>

<h3>7. Máquinas de vectores de soporte (SVM)</h3>
<ul><li>Eligen el hiperplano de <b>margen máximo</b>: el que pasa más lejos de los puntos de ambas clases.</li>
<li><b>Vectores de soporte</b>: los puntos que rozan el margen; son los que definen el hiperplano (α≠0 en la formulación dual; el resto α=0).</li>
<li>Se entrena resolviendo una <b>optimización cuadrática convexa</b> (solución única). Principio: minimización del riesgo estructural (Vapnik).</li>
<li><b>Margen flexible (soft margin)</b>: permite errores ξᵢ a cambio de más margen, controlado por el parámetro <b>C</b> (rigidez): C grande = margen rígido (menos errores permitidos, más riesgo de sobreajuste); C pequeño = margen flexible (más generalización, menos varianza). Se suele explorar en potencias de 10.</li>
<li>Con <b>kernels</b> (polinómico, RBF…) construye fronteras no lineales. En RBF, γ grande = frontera muy ajustada (sobreajuste); γ pequeño = más suave.</li>
<li>Pistas prácticas: muchos vectores de soporte o entrenamiento muy lento ⇒ el kernel no encaja bien / mala solución.</li></ul>
<div class="key">SVM básica = binaria y lineal; la no linealidad viene del kernel y el multiclase de estrategias de binarización (OvA / OvO).</div>

<h3>8. Multiclase y multietiqueta</h3>
<ul><li><b>Una contra todas (OvA / one-vs-all)</b>: C clasificadores, cada uno separa una clase del resto; gana el de mayor confianza.</li>
<li><b>Una contra una (OvO / one-vs-one)</b>: C·(C−1)/2 clasificadores, uno por par de clases; se decide por votación.</li>
<li><b>Multietiqueta</b>: cada instancia puede tener <b>varias etiquetas a la vez</b> (p. ej., una película es comedia Y romántica). No confundir con multiclase (una sola etiqueta entre &gt;2 posibles).</li></ul>

THEORY.M3 = `
<h3>1. Modelos de regresión</h3>
<p>Regresión = «clasificación con salida continua»: aprender una función escalar h(x) con y ∈ ℝ (precio de una casa, nota de un examen…).</p>
<h4>Regresión lineal</h4>
<div class="form">Univariante: h(x) = θ₁x + θ₀ &nbsp;·&nbsp; Multivariante: h(x) = θᵀx (añadiendo x₀=1)</div>
<p>Se ajusta minimizando la función de coste basada en el <b>error cuadrático medio</b>:</p>
<div class="form">J(θ) = (1/2m)·Σ (h(xᵢ) − yᵢ)²</div>
<ul><li>Se optimiza con <b>descenso de gradiente</b>.</li>
<li>Para regresión lineal, J es <b>convexa y derivable</b> → un único mínimo global. (En redes neuronales el MSE <b>no</b> es convexo.)</li>
<li>θ₁ = pendiente; θ₀ = punto de corte con el eje vertical.</li></ul>
<h4>kNN para regresión</h4>
<p>Predicción = <b>media</b> de los valores y de los k vecinos más cercanos (o <b>media ponderada</b> por la inversa de la distancia: los cercanos pesan más). Se adapta de forma natural a datos no lineales. Mismas consideraciones que en clasificación (k, distancia, coste).</p>
<h4>Árboles de decisión para regresión</h4>
<ul><li>Hojas: en lugar de una clase, un <b>número real</b> = <b>media</b> de las y de los ejemplos que llegan.</li>
<li>Criterio de partición: minimizar <b>Var(A) + Var(B)</b> (la varianza equivale al MSE de una recta horizontal en la media).</li>
<li><b>max_depth</b> alto → memoriza detalles → sobreajuste. Además son <b>inestables</b> → se mitiga con ensembles.</li></ul>
<h4>SVR (Support Vector Regressor)</h4>
<ul><li>Misma idea que SVM: minimizar ‖w‖, pero la restricción pasa a ser que el <b>error absoluto ≤ ε</b> (banda/tubo de anchura ε alrededor de la función).</li>
<li>Los puntos <b>dentro de la banda ε no cuentan error</b>; el modelo depende solo de los vectores de soporte (fuera/en el borde de la banda).</li>
<li><b>Margen flexible</b> con variables ξ y parámetro <b>C</b> (tolerancia a errores). Admite <b>kernels</b> (lineal, polinómico, RBF) para regresión no lineal.</li></ul>
<h4>Redes neuronales para regresión</h4>
<p>Igual que en clasificación pero con <b>activación lineal</b> en la salida (g(z)=z; o sigmoide reescalada si la salida está acotada) y coste <b>MSE</b>.</p>

<h3>2. Combinación de métodos (ensembles)</h3>
<p>Motivación (sesgo–varianza): los ensembles consiguen <b>reducir la varianza</b> usando modelos complejos → mejor compromiso que un modelo único.</p>
<h4>Decisión final</h4>
<ul><li><b>Hard voting (majority voting)</b>: cada clasificador vota una clase; gana la más votada.</li>
<li><b>Soft voting</b>: se <b>suman/promedian las probabilidades</b> por clase y gana la de mayor suma. Se pueden ponderar los clasificadores.</li>
<li>En <b>regresión</b>: promedio de las predicciones.</li></ul>
<div class="ej">10 clasificadores dan probabilidades por 3 clases; sumando: p₁=2.4, p₂=4.5, p₃=3.1 → soft voting predice la clase 2, aunque por hard voting pudiera ganar otra.</div>
<h4>Cómo crear los clasificadores</h4>
<ul><li><b>Algoritmos distintos</b> sobre los mismos datos (combinación ad hoc).</li>
<li><b>Mismo algoritmo con datos distintos</b>: diferentes subconjuntos de <b>ejemplos</b> (bagging, boosting) o de <b>atributos</b> (random subspaces, stacking).</li></ul>
<h4>Bagging (bootstrap aggregating)</h4>
<ul><li>T subconjuntos de muestras <b>aleatorios (bootstrap)</b> → un clasificador por subconjunto, entrenados <b>en paralelo e independientes</b>.</li>
<li>Decisión por votación (o promedio en regresión).</li>
<li>Especialmente recomendable con <b>outliers / muestras mal etiquetadas</b>: el outlier solo afecta a algunos subconjuntos.</li>
<li><b>Random forest</b> = bagging de árboles de decisión (+ aleatoriedad en atributos).</li></ul>
<h4>Boosting (AdaBoost)</h4>
<ul><li>Clasificadores débiles entrenados <b>secuencialmente</b>; se mantiene una <b>distribución de pesos D</b> sobre los ejemplos.</li>
<li>Cada iteración: elegir la regla débil con <b>menor error ponderado</b> ε<sub>t</sub>; calcular α<sub>t</sub> = ½·ln((1−ε<sub>t</sub>)/ε<sub>t</sub>); <b>subir el peso de los ejemplos mal clasificados</b> (exponencialmente) y bajar el de los bien clasificados.</li>
<li>Predicción final: f(x) = signo(Σ α<sub>t</sub>·h<sub>t</sub>(x)) — votación ponderada por la fiabilidad de cada regla. |f(x)| = confianza.</li>
<li>Reglas débiles típicas: atributo=valor, atributo≠valor, o umbrales sobre atributos continuos (<i>decision stumps</i>); su combinación crea fronteras <b>no lineales</b>.</li>
<li>Ventajas: pocos parámetros, interpretable, los pesos finales <b>delatan outliers</b>. Inconveniente: <b>coste computacional</b> (variante LazyBoosting).</li></ul>
<table><tr><th></th><th>Bagging</th><th>Boosting</th></tr>
<tr><td>Construcción</td><td>Paralela, independiente</td><td>Secuencial, adaptativa</td></tr>
<tr><td>Muestras</td><td>Bootstrap aleatorio</td><td>Pesos según dificultad</td></tr>
<tr><td>Fuerte contra</td><td>Outliers, varianza</td><td>Sesgo (clasificadores débiles → fuerte)</td></tr>
<tr><td>Ejemplo</td><td>Random forest</td><td>AdaBoost</td></tr></table>
<h4>Random subspace methods</h4>
<p>Cada clasificador se entrena con un <b>subconjunto aleatorio de atributos</b> (en lugar de ejemplos). Útil con muchos atributos; combinado con bagging da lugar a los <i>random patches</i>/random forest.</p>
<h4>Stacked generalization (stacking)</h4>
<p>Las <b>salidas</b> de los clasificadores de nivel 0 se usan como <b>atributos de entrada</b> de un metaclasificador de nivel 1 que aprende a combinarlas (en vez de votar).</p>
<div class="key">Bagging = paralelo + bootstrap + robusto a outliers. Boosting = secuencial + pesos en ejemplos difíciles. Stacking = un modelo aprende a combinar. Soft voting usa probabilidades; hard voting, votos.</div>
`;

<h3>1. Conceptos básicos para redes neuronales</h3>
<h4>Preprocesamiento</h4>
<ul><li>Las redes requieren entradas <b>numéricas</b>, idealmente en escalas similares (recomendado [0,1]).</li>
<li><b>Normalización (min-max)</b>: escala a [0,1]. <b>Estandarización</b>: restar media y dividir por la desviación; no acota el rango pero <b>resiste mejor los outliers</b>.</li>
<li>Imágenes: mismo tamaño y relación de aspecto, escalado, normalización de píxeles, opcionalmente escala de grises, y <b>aumento de datos (data augmentation)</b>: rotaciones, escalas, transformaciones afines → más generalización, menos sobreajuste.</li></ul>
<h4>Evaluación (repaso clave)</h4>
<div class="form">ACC = (TP+TN)/total · ERR = 1−ACC · P = TP/(TP+FP) · R(=TPR) = TP/(TP+FN) · F1 = 2PR/(P+R)</div>
<p>Multiclase: matriz k×k; evaluación <b>1-vs-1</b> (por pares) o <b>1-vs-All</b>. <b>k-fold cross validation</b>: k particiones, k entrenamientos, error promedio (k=5 o 10).</p>

<h3>2. La neurona artificial</h3>
<ul><li><b>Función de entrada/combinación</b>: combina entradas y pesos; la habitual es la <b>suma ponderada</b> z = Σ xⱼwⱼ (también max, min, AND/OR).</li>
<li><b>Función de activación</b>: introduce <b>no linealidad</b> (sin ella, la red solo haría aproximaciones lineales):</li></ul>
<table><tr><th>Función</th><th>Salida</th><th>Notas</th></tr>
<tr><td>Escalón</td><td>{0,1} o {−1,1}</td><td>Perceptrón (Rosenblatt); no derivable</td></tr>
<tr><td>Lineal</td><td>ℝ</td><td>Salida de regresión</td></tr>
<tr><td>Sigmoide</td><td>(0,1)</td><td>Suave y derivable; cambios pequeños de pesos → cambios pequeños de salida; se satura</td></tr>
<tr><td>Tanh</td><td>(−1,1)</td><td>Similar, centrada en 0</td></tr>
<tr><td><b>ReLU</b> max(0,x)</td><td>[0,∞)</td><td><b>La más usada en redes profundas</b>; entrena más rápido, mitiga el gradiente desvanecido</td></tr>
<tr><td>Softmax</td><td>(0,1), suma 1</td><td>Capa de salida en clasificación: <b>distribución de probabilidades</b> (clases excluyentes)</td></tr></table>
<p><b>Perceptrón</b> = suma ponderada + escalón → es un <b>separador lineal</b> (frontera wx−α=0). El sesgo (bias) puede verse como un peso más con entrada fija 1 (notación extendida).</p>

<h3>3. Arquitectura y entrenamiento</h3>
<ul><li>Capas: entrada (nº de atributos) → ocultas → salida (nº de clases en clasificación; softmax si excluyentes, logística si no o si binaria; lineal en regresión).</li>
<li><b>Feedforward (FNN)</b>: la información solo avanza. <b>Recurrentes (RNN)</b>: hay bucles de retroalimentación.</li>
<li>Más neuronas/capas ocultas: ↑capacidad y ↓mínimos locales, pero ↑sobreajuste y ↑coste. Regla práctica: entre 1 y 2 veces el nº de entradas; si sobreajusta, reducir.</li></ul>
<h4>Descenso de gradiente y retropropagación</h4>
<ul><li>Se minimiza una función de coste moviendo los pesos en dirección <b>opuesta al gradiente</b>, con paso = <b>tasa de aprendizaje η</b>: muy alta → inestable/diverge; muy baja → lentísimo.</li>
<li><b>Backpropagation</b>: calcula el gradiente propagando el error de la salida hacia atrás (regla de la cadena).</li>
<li><b>Gradiente desvanecido (vanishing gradient)</b>: en redes profundas con sigmoides, el gradiente se hace diminuto en las primeras capas y dejan de aprender. Soluciones: ReLU, mejor inicialización, arquitecturas residuales…</li></ul>
<h4>Épocas, lotes e iteraciones</h4>
<ul><li><b>Época</b>: una pasada completa por todo el conjunto de entrenamiento.</li>
<li><b>SGD</b> (estocástico): actualiza con <b>cada ejemplo</b>. <b>BGD</b> (por lotes): una actualización tras ver <b>todo</b> el conjunto. <b>Mini-batch (MBGD)</b>: equilibrio, lo habitual (batch ≈ 32).</li>
<li><b>Iteraciones</b> = lotes por época. Ej.: 2000 ejemplos, batch 500 → <b>4 iteraciones/época</b>.</li></ul>
<h4>Optimizadores</h4>
<ul><li><b>Momentum</b>: acumula «inercia» del gradiente para acelerar y amortiguar oscilaciones.</li>
<li><b>AdaGrad / RMSProp</b>: tasas de aprendizaje adaptativas por parámetro (RMSProp con ventana).</li>
<li><b>Adam</b> = Momentum + RMSProp (estimación adaptativa de momentos). Muy popular, aunque a veces generaliza peor que Momentum.</li></ul>
<h4>Trucos de velocidad</h4>
<ul><li><b>Inicialización de pesos</b>: gaussiana con media 0 y desviación 1/√n<sub>in</sub> → evita saturación inicial (acelera, no mejora el rendimiento final).</li>
<li><b>Entropía cruzada</b> como coste: C = −(1/n)Σ[c·ln y + (1−c)·ln(1−y)]. Con coste cuadrático, una neurona sigmoide <b>saturada aprende lento</b> aunque esté muy equivocada; con entropía cruzada aprende <b>más rápido cuanto mayor es el error</b>. Recomendado con salidas sigmoides.</li></ul>

<h3>4. Contra el sobreentrenamiento (regularización)</h3>
<ul><li><b>L2 (weight decay)</b>: añade (λ/2n)·Σw² al coste → pesos pequeños, modelo más simple. (L1 análoga con |w|.)</li>
<li><b>Early stopping</b>: parar cuando el error de <b>validación</b> empieza a subir aunque el de entrenamiento siga bajando.</li>
<li><b>Dropout</b>: desactivar aleatoriamente neuronas <b>durante el entrenamiento</b> (no en test) → fuerza redundancia, previene co-adaptación.</li>
<li><b>Aumento de datos</b>: versiones perturbadas de las muestras (rotaciones, escalas…).</li></ul>
<div class="key">Señal de sobreajuste: error de entrenamiento baja, precisión de test se estanca o empeora. Soluciones = más datos (augmentation), L1/L2, early stopping, dropout, red más pequeña.</div>

<h3>5. Autoencoders</h3>
<ul><li><b>Encoder</b> (entrada → representación interna de <b>menor dimensión</b>) + <b>decoder</b> (reconstruir la entrada). Se entrena para que salida ≈ entrada.</li>
<li>Usos: <b>reducción de dimensionalidad</b> (alternativa no lineal a PCA), <b>preentrenamiento</b> de redes, detección de anomalías.</li>
<li><b>Stacked</b>: varias capas ocultas simétricas. <b>Denoising</b>: se añade ruido a la entrada y se aprende a reconstruir la versión limpia. <b>Variational (VAE)</b>: aprende una distribución latente; es <b>generativo</b>.</li></ul>

<h3>6. Redes convolucionales (CNN)</h3>
<p>Especializadas en datos con estructura de rejilla (imágenes). Sustituyen la multiplicación de matrices por la <b>convolución</b>: un <b>filtro/kernel</b> pequeño de pesos se desliza por la imagen produciendo un <b>mapa de características</b>. (Técnicamente las librerías implementan cross-correlation, sin voltear el kernel.)</p>
<h4>Dos ventajas clave</h4>
<ul><li><b>Conexiones dispersas</b>: cada neurona ve solo su <b>campo receptivo local</b> (p. ej., 3×3), no toda la imagen.</li>
<li><b>Compartición de parámetros</b>: el mismo filtro (pesos y sesgo) recorre toda la imagen → detecta la característica <b>en cualquier posición</b> (invariancia a traslación) y reduce muchísimo los parámetros (menos sobreajuste y menos datos necesarios).</li></ul>
<h4>Capas de una CNN</h4>
<ul><li><b>Convolución</b>: parámetros = tamaño de filtro f, <b>stride</b> s (paso), <b>padding</b> p (relleno de borde para no perder tamaño). Dimensión de salida: <b>(n + 2p − f)/s + 1</b>. Con varios filtros, la salida tiene un canal por filtro.</li>
<li><b>Pooling (agrupamiento)</b>: reduce alto×ancho; <b>max-pooling</b> es el más usado (toma el máximo de cada ventana). <b>No tiene parámetros entrenables</b>.</li>
<li><b>ReLU</b> tras cada convolución (no linealidad).</li>
<li><b>Dropout</b> (solo en entrenamiento).</li>
<li><b>Fully connected (FC)</b> al final + <b>softmax</b> para clasificar.</li></ul>
<p>Patrón típico: [CONV→RELU→POOL]×N → FC → softmax. Al profundizar, alto/ancho ↓ y nº de canales ↑. La mayor parte de los <b>parámetros</b> está en las capas <b>FC</b>; las convoluciones tienen pocos.</p>
<div class="ej">Entrada 32×32, filtro 5×5, s=1, p=0 → salida (32−5)/1+1 = 28×28. Con 6 filtros: 28×28×6. Un max-pool 2×2 s=2 la deja en 14×14×6.</div>
<h4>Arquitecturas célebres</h4>
<table><tr><th>Red</th><th>Idea clave</th></tr>
<tr><td><b>LeNet-5</b> (1998)</td><td>OCR/dígitos; pequeña (~60K parámetros)</td></tr>
<tr><td><b>AlexNet</b> (2012)</td><td>Como LeNet pero enorme (~60M); <b>ReLU</b>; ganó ImageNet y popularizó el deep learning</td></tr>
<tr><td><b>VGG</b> (2014)</td><td>Uniforme y simple: solo conv <b>3×3</b> s=1 y max-pool 2×2 s=2; ~138M parámetros</td></tr>
<tr><td><b>ResNet</b> (2015)</td><td><b>Conexiones residuales (skip connections)</b>: permiten redes muy profundas combatiendo el gradiente desvanecido</td></tr>
<tr><td><b>Inception/GoogLeNet</b></td><td>Módulos con convoluciones paralelas de varios tamaños y <b>conv 1×1</b> para reducir canales/coste</td></tr></table>
<h4>Transfer learning (PEC4)</h4>
<p>Reutilizar una red <b>preentrenada</b> (p. ej., en ImageNet): congelar las capas convolucionales (extractoras de características generales) y <b>reentrenar solo las capas finales</b> para el problema propio. Ideal con pocos datos. (<i>Fine-tuning</i>: descongelar también algunas capas altas con tasa de aprendizaje baja.)</p>

<h3>7. Redes recurrentes (RNN)</h3>
<ul><li>Para <b>secuencias</b> (texto, series temporales): la celda recibe la entrada x<sub>t</sub> y el <b>estado</b> s<sub>t−1</sub> (memoria) y produce salida h<sub>t</sub> y nuevo estado s<sub>t</sub>.</li>
<li>Tipos según entradas/salidas: <b>many-to-one</b> (sentimiento de una frase), <b>one-to-many</b> (pie de foto), <b>many-to-many</b> (traducción).</li>
<li>Entrenamiento: <b>BPTT</b> (backpropagation through time), desplegando la red en el tiempo → sufre <b>desaparición/explosión del gradiente</b> con secuencias largas.</li></ul>
<h4>LSTM</h4>
<ul><li>Solución a la desaparición del gradiente: un <b>canal de memoria</b> (estado de celda) con conexión directa sin no-linealidades, regulado por <b>puertas</b> (sigmoides):</li>
<li><b>Puerta de olvido</b>: qué parte de la memoria se conserva/borra.</li>
<li><b>Puerta de entrada</b>: qué información nueva se añade a la memoria.</li>
<li><b>Puerta de salida</b>: qué parte de la memoria se emite como respuesta.</li>
<li>Aprende dependencias <b>a corto y largo plazo</b>.</li></ul>
<h4>GRU y arquitecturas</h4>
<ul><li><b>GRU</b>: variante simplificada de LSTM con <b>2 puertas</b> (update y reset), menos parámetros, rendimiento similar.</li>
<li><b>Bidireccionales</b>: procesan la secuencia en ambos sentidos. <b>Profundas</b>: varias capas recurrentes apiladas.</li>
<li><b>Encoder–decoder (seq2seq)</b>: un codificador comprime la secuencia de entrada en un vector y un decodificador genera la salida (traducción). El <b>mecanismo de atención</b> permite al decodificador mirar todas las posiciones de la entrada, no solo el vector final.</li></ul>

<h3>1. ¿Qué es un sistema recomendador?</h3>
<p>Software que decide <b>qué productos/servicios mostrar a cada usuario</b>. Dos objetivos: combatir la <b>sobrecarga de información</b> (YouTube, Netflix) y <b>estimular acciones</b> (Amazon: comprar). Las recomendaciones son <b>personalizadas</b> (la alternativa impersonal sería recomendar a todos lo más vendido).</p>
<p>Las preferencias se adquieren de forma <b>explícita</b> (valoraciones, p. ej. estrellas 1–5) o <b>implícita</b> (compras, reproducciones, clics).</p>
<table><tr><th>Familia</th><th>Usa</th><th>Idea</th></tr>
<tr><td><b>Filtraje colaborativo</b></td><td>Solo valoraciones usuario–ítem</td><td>Usuarios con gustos similares en el pasado los tendrán en el futuro</td></tr>
<tr><td><b>Basado en contenido</b></td><td>Descripciones de los ítems + perfil del usuario</td><td>Recomendar ítems parecidos a los que le gustaron</td></tr>
<tr><td><b>Basado en conocimiento</b></td><td>Requisitos del usuario + datos estructurados</td><td>Para compras infrecuentes sin historial (neveras, coches)</td></tr>
<tr><td><b>Híbridos</b></td><td>Combinación</td><td>Explotar todas las fuentes de datos</td></tr></table>

<h3>2. Filtraje colaborativo basado en USUARIOS</h3>
<ol><li>Buscar los usuarios más similares al usuario objetivo (filas parecidas de la matriz de valoraciones).</li>
<li>Predecir la valoración de un ítem no visto a partir de las valoraciones de esos vecinos.</li></ol>
<ul><li>La distancia euclídea es problemática: <b>depende del nº de ítems en común</b>. Se usa el <b>coeficiente de correlación de Pearson</b> (∈[−1,1]): 1 = misma tendencia, 0 = sin relación, −1 = gustos opuestos.</li>
<li>Pearson <b>resta la media de cada usuario</b> → corrige a los usuarios que puntúan sistemáticamente alto o bajo (independiente de desplazamientos y escala).</li>
<li>Vecinos: por <b>número fijo N</b> o por <b>umbral de similitud</b>.</li></ul>
<div class="form">pred(a,i) = ā + Σ<sub>b∈N</sub> sim(a,b)·(b<sub>i</sub> − b̄) / Σ sim(a,b)</div>
<p>Es decir: la media del usuario + desviaciones de los vecinos <b>ponderadas por su similitud</b>.</p>

<h3>3. Filtraje colaborativo basado en ÍTEMS</h3>
<ul><li>Cuando hay <b>muchos más usuarios que ítems</b> (millones vs. miles), comparar usuarios es muy costoso → se buscan <b>ítems con valoraciones parecidas</b> (columnas similares).</li>
<li>Medida estándar: <b>similitud coseno</b> ∈[0,1]: sim(x,y) = x·y/(|x|·|y|).</li>
<li>Problema del coseno: ignora que cada usuario tiene su media → <b>coseno ajustado</b>: normalizar restando la media de cada usuario antes (∈[−1,1], como Pearson).</li>
<li>Predicción: media de las valoraciones <b>del propio usuario</b> sobre los N ítems más similares, ponderada por similitud: pred(a,i) = Σ sim(i,j)·a<sub>j</sub> / Σ sim(i,j). Solo cuentan ítems que el usuario haya valorado.</li></ul>
<div class="key">Usuarios → Pearson. Ítems → coseno (ajustado). Pearson y coseno ajustado corrigen la «tendencia personal» de puntuación; el coseno simple no.</div>

<h3>4. Factorización de matrices</h3>
<ul><li>Descompone la matriz de valoraciones R (usuarios×ítems, muy <b>dispersa</b>) en el producto de dos matrices de rango bajo: R ≈ U·Vᵀ, con <b>k factores latentes</b> (dimensiones ocultas de gusto: «acción», «romanticismo»…).</li>
<li>Se aprenden U y V minimizando el error de reconstrucción <b>sobre las valoraciones conocidas</b> (descenso de gradiente, a menudo con regularización). Relacionada con SVD.</li>
<li>Predicción de valoración = producto escalar del vector del usuario por el del ítem.</li>
<li>Ganadora del Netflix Prize; escala bien y captura patrones globales.</li></ul>

<h3>5. Dificultades del filtraje colaborativo</h3>
<ul><li><b>Arranque en frío (cold start)</b>: usuarios o ítems nuevos sin valoraciones → no se puede recomendar.</li>
<li><b>Dispersidad (sparsity)</b>: la matriz tiene poquísimas celdas rellenas.</li>
<li><b>Escalabilidad</b>: millones de usuarios×ítems.</li>
<li><b>Oveja gris</b>: usuarios con gustos atípicos sin vecinos claros.</li></ul>

<h3>6. Basados en contenido y en conocimiento</h3>
<h4>Contenido</h4>
<ul><li>Usa <b>características de los ítems</b> (género, autor, palabras clave — manuales o extraídas automáticamente, p. ej. TF-IDF) y un <b>perfil del usuario</b> con esas mismas características.</li>
<li>Recomienda ítems <b>similares en contenido</b> a los que gustaron. No necesita otros usuarios → no sufre el cold start de ítem (un ítem nuevo se puede recomendar por su descripción).</li>
<li>Riesgo: <b>sobreespecialización</b> → siempre lo mismo (burbuja).</li></ul>
<h4>Conocimiento</h4>
<ul><li>Para dominios <b>sin historial</b> (compras esporádicas: electrodomésticos, viajes). El usuario expresa <b>requisitos</b>.</li>
<li><b>Basados en restricciones</b>: reglas explícitas (precio ≤ X, marca…), el sistema filtra el catálogo.</li>
<li><b>Basados en casos</b>: similitud con un ítem de referencia y <b>crítica iterativa</b> («como este pero más barato»).</li></ul>

<h3>7. Híbridos y evaluación</h3>
<ul><li><b>Híbridos</b>: combinan métodos (ponderación de puntuaciones, conmutación según situación, cascada, mezcla de presentación…) para cubrir las debilidades de cada uno (p. ej., conocimiento/contenido al principio + colaborativo cuando hay historial).</li>
<li><b>Evaluación con datos históricos</b> (offline): ocultar parte de las valoraciones (train/test) y medir el error de predicción con <b>MAE / RMSE</b>, o precisión/recall sobre el top-N recomendado.</li>
<li><b>Estudios con usuarios reales</b> (online, test A/B): miden satisfacción y efecto real, pero son caros.</li></ul>
<div class="key">De la PEC5: la <b>burbuja de filtros</b> es el efecto de los recomendadores que solo muestran contenido afín, reduciendo la diversidad informativa. Spotify combina filtraje colaborativo + análisis de contenido (audio) + datos contextuales.</div>

THEORY.M6 = `
<h3>1. Qué es el aprendizaje por refuerzo (RL)</h3>
<p>Entrenar a un <b>agente</b> para que resuelva una tarea interactuando con un <b>entorno</b>, sin datos etiquetados: aprende por <b>ensayo y error</b>, con muchas repeticiones, guiado solo por <b>recompensas</b>. Útil cuando es imposible/caro etiquetar, el entorno es dinámico y hay incertidumbre.</p>
<h4>Elementos del bucle</h4>
<ul><li><b>Entorno</b>: lugar (físico o virtual) y todos sus elementos.</li>
<li><b>Agente</b>: quien actúa y aprende.</li>
<li><b>Acción a</b> (discretas o continuas; la mayoría de métodos usan discretas).</li>
<li><b>Estado s</b>: variables relevantes en el instante t. Si el agente solo percibe una parte (cámara, sensores) recibe una <b>observación</b> (estado incompleto).</li>
<li><b>Recompensa r</b>: valor escalar (positivo o negativo) que orienta el aprendizaje; única señal de calidad.</li>
<li><b>Política π</b>: criterios para elegir la acción en cada estado. El objetivo del RL es la política que <b>maximiza la recompensa acumulada G</b>.</li>
<li><b>Episodio/trayectoria τ</b>: secuencia completa de acciones y estados hasta acabar la tarea.</li></ul>
<h4>Tipos de recompensas</h4>
<ul><li><b>Origen</b>: intrínsecas/implícitas (el entorno ya las da: puntos de un juego) vs. extrínsecas (hay que diseñarlas: conducción autónoma).</li>
<li><b>Frecuencia</b>: densas (en casi cada paso) vs. <b>dispersas</b> (solo al lograr objetivos) — las dispersas dificultan el aprendizaje.</li>
<li><b>Momento</b>: inmediatas vs. <b>diferidas</b> (hay que hacer muchas acciones correctas antes de cobrar).</li></ul>
<div class="warnbox">Diseñar mal las recompensas es el fallo clásico: el agente encuentra «agujeros» (bucles que acumulan puntos sin resolver la tarea). Conviene recompensar exactamente lo que se quiere y añadir recompensas intermedias. Alternativas si es muy difícil: <b>aprendizaje por imitación</b> (copiar a un experto) y <b>RL inverso</b> (deducir las recompensas de lo que hace el experto).</div>

<h3>2. Tipología de métodos</h3>
<ul><li><b>Basados en modelo</b> vs. <b>sin modelo (model-free)</b>: si se conoce/aprende cómo responde el entorno (transiciones) o solo se interactúa. Q-learning, SARSA y DQN son <b>sin modelo</b>.</li>
<li><b>On-policy</b> (política actual: la misma política interactúa y aprende, p. ej. <b>SARSA</b>) vs. <b>off-policy</b> (política óptima: una política de comportamiento explora y otra objetivo aprende, p. ej. <b>Q-learning</b>).</li>
<li><b>Gradiente de política</b> (aprenden π directamente) vs. <b>basados en valores</b>: V(s) (valor de estado) o <b>Q(s,a)</b> (valor estado–acción).</li>
<li><b>Exploración vs. explotación</b>: política <b>ε-avariciosa</b> = con probabilidad ε acción al azar (explorar), si no la mejor conocida (explotar). ε suele decrecer durante el entrenamiento.</li></ul>
<p>V(s) no basta para actuar si no se conoce el modelo (sabes qué estado es bueno, pero no qué acción te lleva a él) → por eso se usa la <b>tabla Q</b> de |S|×|A| valores: Q(s,a) = recompensa acumulada esperada eligiendo a en s. Acción óptima: a* = argmax<sub>a</sub> Q*(s,a).</p>

<h3>3. Recompensa acumulada, descuento y Bellman</h3>
<div class="form">G = Σ γ<sup>t</sup>·r<sub>t</sub> &nbsp;&nbsp; (factor de descuento 0 ≤ γ ≤ 1, típicamente 0.95–0.99)</div>
<p>El descuento resta peso a las recompensas lejanas (γ próximo a 1 para tareas largas). La <b>ecuación de Bellman</b> define el valor recursivamente:</p>
<div class="form">V<sub>π</sub>(s) = E[r<sub>t</sub> + γ·V<sub>π</sub>(s<sub>t+1</sub>)]</div>
<p>Estimar el valor a partir de los estados sucesores = <b>bootstrapping</b>: permite aprender en <b>cada paso</b>, sin esperar al final del episodio (a diferencia de Montecarlo, que recorre trayectorias completas).</p>
<h4>Aprendizaje por diferencia temporal (TD)</h4>
<div class="form">V(s<sub>t</sub>) ← V(s<sub>t</sub>) + α·[r<sub>t</sub> + γ·V(s<sub>t+1</sub>) − V(s<sub>t</sub>)]</div>
<p><b>α = tasa de aprendizaje</b> (0.001–0.5): 0 = no aprende nada; 1 = olvida todo lo anterior.</p>

<h3>4. SARSA y Q-learning</h3>
<h4>SARSA (on-policy)</h4>
<div class="form">Q(s<sub>t</sub>,a<sub>t</sub>) ← Q(s<sub>t</sub>,a<sub>t</sub>) + α·[r<sub>t</sub> + γ·Q(s<sub>t+1</sub>,<b>a<sub>t+1</sub></b>) − Q(s<sub>t</sub>,a<sub>t</sub>)]</div>
<ul><li>Usa la acción <b>realmente elegida</b> a<sub>t+1</sub> (de ahí el nombre: s,a,r,s,a). <b>Una sola política</b> (ε-avariciosa) para actuar y aprender.</li>
<li>Converge a la política óptima solo en teoría (visitar cada (s,a) infinitas veces); on-policy = aprendizaje poco estable.</li></ul>
<h4>Q-learning (off-policy)</h4>
<div class="form">Q(s<sub>t</sub>,a<sub>t</sub>) ← Q(s<sub>t</sub>,a<sub>t</sub>) + α·[r<sub>t</sub> + γ·<b>max<sub>a</sub></b> Q(s<sub>t+1</sub>,a) − Q(s<sub>t</sub>,a<sub>t</sub>)]</div>
<ul><li>Usa el <b>máximo</b> sobre las acciones del estado siguiente (lo mejor posible, no lo que se hizo).</li>
<li><b>Dos políticas</b>: la de <b>comportamiento</b> (interactúa, explora) y la <b>objetivo</b> (aprende y será la final); la de comportamiento se actualiza periódicamente copiando la objetivo.</li></ul>
<table><tr><th></th><th>SARSA</th><th>Q-learning</th></tr>
<tr><td>Políticas</td><td>1 (on-policy)</td><td>2 (off-policy)</td></tr>

<h3>5. Deep Q-Network (DQN)</h3>
<ul><li>Problema de la tabla Q: con espacios de estados enormes (ajedrez 10<sup>120</sup>, Go 10<sup>170</sup>) es <b>inviable</b> en memoria y tiempo → se sustituye por una <b>red neuronal</b> que aproxima la función Q: f(s,a) → valor (o que dado s devuelve los Q de todas las acciones).</li>
<li><b>DQN</b> (DeepMind, juegos Atari desde píxeles) añade dos estabilizadores clave:</li>
<li><b>Repetición de experiencias (experience replay)</b>: guardar transiciones (s,a,r,s′) en una memoria y entrenar con <b>mini-batches aleatorios</b> → rompe la correlación temporal de las muestras.</li>
<li><b>Red objetivo (target network)</b>: copia congelada de la red que se usa para calcular el objetivo r+γ·maxQ, actualizada cada cierto tiempo → evita perseguir un objetivo que cambia constantemente.</li></ul>
<div class="key">Cadena histórica que les gusta preguntar: Bellman (recursión) → TD (aprender en cada paso con α) → SARSA (on-policy) → Q-learning (off-policy, max) → DQN (red neuronal + experience replay + target network).</div>

{m:"M1",q:"Definición de aprendizaje de Mitchell (1997)",a:"Un programa aprende de la experiencia E respecto a una tarea T y una medida P si su rendimiento en T, medido por P, mejora con E."},
{m:"M1",q:"¿Qué diferencia el aprendizaje supervisado, el no supervisado y el por refuerzo?",a:"Supervisado: se conoce la salida correcta de cada ejemplo. No supervisado: solo entradas, sin salida. Refuerzo: solo recompensa/penalización según el resultado (conocimiento parcial)."},
{m:"M1",q:"¿Clasificación o regresión?",a:"Clasificación: salida categórica/binaria. Regresión: salida numérica continua."},
{m:"M1",q:"Selección vs. extracción de características",a:"Selección: elige un SUBCONJUNTO de los atributos originales. Extracción: CREA atributos nuevos combinando los originales (PCA, LDA)."},
{m:"M1",q:"PCA: ¿supervisado? ¿qué optimiza? ¿cómo se construye la proyección?",a:"NO supervisado. Minimiza el error cuadrático de reconstrucción (máxima varianza). Proyección = vectores propios de mayor valor propio de la matriz de covarianza (tras centrar los datos)."},
{m:"M1",q:"LDA (Fisher): ¿supervisado? ¿qué optimiza?",a:"SÍ, usa etiquetas. Maximiza la dispersión interclase y minimiza la intraclase: busca la proyección que mejor separa las clases."},
{m:"M1",q:"¿Qué es la maldición de la dimensionalidad?",a:"Al crecer la dimensión del espacio, el número de muestras necesario para cubrirlo crece exponencialmente (Bellman)."},
{m:"M1",q:"Pasos del algoritmo k-means",a:"1) Inicializar k centroides. 2) Asignar cada punto al centroide más cercano. 3) Recalcular centroides como media de sus puntos. 4) Repetir hasta converger. Converge a un mínimo LOCAL; k es hiperparámetro."},
{m:"M1",q:"¿Para qué sirve el conjunto de validación?",a:"Para ajustar HIPERPARÁMETROS. El test no puede usarse nunca para entrenar ni elegir hiperparámetros (invalidaría la medida de generalización)."},
{m:"M1",q:"¿En qué consiste k-fold cross validation?",a:"Partir los datos en k subconjuntos; entrenar con k−1 y evaluar con el restante, k veces; promediar el error. k típico: 5 o 10. Útil con pocos datos."},
{m:"M1",q:"Precisión y recall: fórmulas e interpretación",a:"P = TP/(TP+FP): de lo predicho positivo, cuánto era positivo. R = TP/(TP+FN): de los positivos reales, cuántos detecté."},
{m:"M1",q:"¿Por qué RMSE en vez de MSE?",a:"RMSE = √MSE está en las MISMAS UNIDADES que la variable (euros, no euros²) → más interpretable."},
{m:"M1",q:"Sesgo y varianza: definición y compromiso",a:"Sesgo: error por restricciones del modelo (subajuste). Varianza: sensibilidad al conjunto de entrenamiento (sobreajuste). ↑complejidad ⇒ ↓sesgo, ↑varianza."},
{m:"M1",q:"¿Qué es el sobreajuste (overfitting)?",a:"El modelo se ajusta tanto al entrenamiento que no generaliza: error de entrenamiento muy bajo, error de test alto."},
{m:"M1",q:"Atributo ordinal con R valores → ¿cuántos binarios con codificación aditiva?",a:"R−1 atributos binarios (se activan los de valores ≤ al observado). Un nominal usa R binarios (one-hot)."},
{m:"M1",q:"Matriz de confusión: ¿qué hay en filas, columnas y diagonal?",a:"Filas: clase real. Columnas: predicción. Diagonal: aciertos. Permite ver qué clases se confunden entre sí."},
/* ===== M2 ===== */
{m:"M2",q:"Fórmula de clasificación de Naive Bayes",a:"ŷ = argmax_k P(k)·Π P(xᵢ|k). Probabilidades estimadas por frecuencias relativas (máxima verosimilitud)."},
{m:"M2",q:"Suposición «naive» de Naive Bayes y su problema del cero",a:"Asume independencia condicional entre atributos. Si un par atributo-valor no aparece en entrenamiento, P=0 anula el producto → suavizado (p. ej., sustituir por P(k)/n)."},
{m:"M2",q:"¿Cómo trata Naive Bayes los atributos continuos?",a:"Discretizándolos en intervalos o asumiendo una distribución gaussiana por clase (media y desviación de la clase)."},
{m:"M2",q:"Regresión logística: ¿qué modela realmente?",a:"El logaritmo de los odds: ln[P/(1−P)] = β₀+β₁X. Aplica la sigmoide σ(x)=1/(1+e⁻ˣ) a una combinación lineal; clasifica con un umbral (0.5). β por máxima verosimilitud."},
{m:"M2",q:"¿Por qué kNN es un método de «aprendizaje perezoso»?",a:"Entrenar = guardar los ejemplos; todo el cálculo (distancias, votación) se pospone a la clasificación → clasificación lenta, mala para tiempo real."},
{m:"M2",q:"¿Qué distancia usar en kNN según el tipo de atributo?",a:"Euclidiana para numéricos; Hamming para nominales/binarios; MVDM en PLN (costosa). k impar o primo para evitar empates."},
{m:"M2",q:"Clasificador lineal basado en centroides: entrenamiento y clasificación",a:"Centroide por clase = media de sus ejemplos; se clasifica con 1NN sobre centroides. Equivale a un hiperplano con w = p−n."},
{m:"M2",q:"¿Qué es el clustering dentro de clases?",a:"Aplicar k-means dentro de cada clase para obtener M centroides por clase y clasificar con kNN sobre los M×C centroides: equilibrio entre coste y representatividad."},
{m:"M2",q:"Entropía: fórmula y valores extremos",a:"H(S) = −Σ p(y)·log₂p(y). Mínima (0) si una sola clase (puro); máxima (1, binario) si 50/50 (aleatorio)."},
{m:"M2",q:"Ganancia de información (ID3)",a:"G(S,a) = H(S) − Σᵥ p(v)·H(Sᵥ): cuánto reduce la entropía particionar por el atributo a. ID3 elige el de mayor ganancia."},
{m:"M2",q:"Atributos numéricos en árboles: puntos de corte",a:"Ordenar valores, quitar repetidos, candidatos = promedio de cada par consecutivo, elegir el de mejor bondad. Decisiones binarias; el atributo puede reutilizarse en niveles inferiores."},
{m:"M2",q:"¿Para qué se podan los árboles de decisión?",a:"Las hojas con pocos ejemplos no son fiables (sobreajuste). Se construye el árbol completo y se poda de hojas a raíz juntando nodos que no aportan."},
{m:"M2",q:"Ventaja estrella de los árboles de decisión",a:"Interpretabilidad: cada rama es una regla legible y muestran la importancia de los atributos."},
{m:"M2",q:"¿Qué es el truco del kernel?",a:"Atacar problemas no lineales con algoritmos lineales proyectando los datos a otro espacio mediante κ(x,z)=⟨φ(x),φ(z)⟩, sin calcular φ explícitamente (formulación dual)."},
{m:"M2",q:"Propiedades que debe cumplir una matriz kernel",a:"Simétrica y semidefinida positiva (valores propios ≥ 0)."},
{m:"M2",q:"Los dos kernels no lineales de uso general",a:"Polinómico: (γ·u′v+coef)^grado. Gaussiano/RBF: exp(−γ‖x−z‖²). No hay un kernel «mejor»: depende del problema."},
{m:"M2",q:"¿Qué hiperplano eligen las SVM y qué son los vectores de soporte?",a:"El de MARGEN MÁXIMO (más lejos de los puntos de ambas clases). Vectores de soporte = puntos que rozan el margen y definen el hiperplano (α≠0)."},
{m:"M2",q:"Parámetro C de las SVM",a:"Rigidez del margen flexible: C grande = margen rígido (pocos errores permitidos, riesgo de sobreajuste); C pequeño = margen flexible (más generalización). Se explora en potencias de 10."},
{m:"M2",q:"OvA vs. OvO para multiclase",a:"One-vs-All: C clasificadores (clase contra el resto). One-vs-One: C(C−1)/2 clasificadores (por pares) y votación."},
{m:"M2",q:"Multiclase vs. multietiqueta",a:"Multiclase: UNA etiqueta entre >2 posibles. Multietiqueta: VARIAS etiquetas simultáneas por instancia."},
/* ===== M3 ===== */
{m:"M3",q:"Función de coste de la regresión lineal y cómo se optimiza",a:"J(θ) = (1/2m)Σ(h(xᵢ)−yᵢ)² (MSE). Se minimiza con descenso de gradiente; en regresión lineal J es convexa → único mínimo global."},
{m:"M3",q:"kNN para regresión",a:"Predicción = media (o media ponderada por inversa de la distancia) de las y de los k vecinos más cercanos."},
{m:"M3",q:"Árboles de regresión: hoja y criterio de partición",a:"Hoja = media de las y que llegan. Partición que minimiza Var(A)+Var(B) (varianza ≡ MSE de una recta horizontal en la media)."},
{m:"M3",q:"SVR: ¿qué papel juega ε?",a:"Define una banda/tubo alrededor de la función: los errores ≤ ε no cuentan. El modelo depende solo de los puntos fuera o en el borde (vectores de soporte). C controla la tolerancia a errores."},
{m:"M3",q:"Hard voting vs. soft voting",a:"Hard: cada clasificador vota una clase, gana la más votada. Soft: se suman/promedian las PROBABILIDADES por clase y gana la mayor. Ambos admiten pesos."},
{m:"M3",q:"Bagging: definición y por qué es robusto a outliers",a:"Bootstrap aggregating: T subconjuntos aleatorios → T clasificadores en PARALELO e independientes + votación. Un outlier solo cae en algunos subconjuntos → su efecto se diluye."},
{m:"M3",q:"¿Qué es un random forest?",a:"Ensemble de árboles de decisión entrenados con bagging (bootstrap de muestras, + aleatoriedad en atributos); la predicción agrega la de todos los árboles."},
{m:"M3",q:"AdaBoost: ¿cómo evolucionan los pesos de los ejemplos?",a:"Empiezan uniformes (1/N). En cada iteración suben EXPONENCIALMENTE los de los ejemplos mal clasificados y bajan los de los bien clasificados → la siguiente regla se centra en los difíciles."},
{m:"M3",q:"AdaBoost: fórmulas de error y confianza de cada regla",a:"εt = suma de pesos de los ejemplos mal clasificados; αt = ½·ln((1−εt)/εt). Predicción final: signo(Σ αt·ht(x))."},
{m:"M3",q:"Bagging vs. boosting en una frase",a:"Bagging: paralelo, muestras aleatorias, reduce varianza, robusto a outliers. Boosting: secuencial, pesos en los ejemplos difíciles, convierte débiles en fuerte."},
{m:"M3",q:"Random subspace methods",a:"Cada clasificador se entrena con un subconjunto aleatorio de ATRIBUTOS (no de ejemplos)."},
{m:"M3",q:"Stacked generalization (stacking)",a:"Las salidas de los clasificadores de nivel 0 son los atributos de entrada de un metaclasificador de nivel 1 que aprende a combinarlas."},
{m:"M3",q:"¿Qué información útil dan los pesos finales de AdaBoost?",a:"Los ejemplos que acaban con peso alto no se pudieron clasificar bien → posibles outliers o errores de etiquetado."},
/* ===== M4 ===== */
{m:"M4",q:"Normalización vs. estandarización",a:"Normalización (min-max): escala a [0,1]. Estandarización: resta media y divide por desviación; sin rango fijo pero resiste mejor los outliers."},
{m:"M4",q:"¿Qué es el data augmentation y para qué sirve?",a:"Crear versiones perturbadas de las muestras (rotaciones, escalas, transformaciones afines) para ampliar el conjunto → mejor generalización, menos sobreajuste."},
{m:"M4",q:"Partes de una neurona artificial",a:"Función de entrada/combinación (habitual: suma ponderada Σxⱼwⱼ) + función de activación (sigmoide, ReLU…) que introduce la no linealidad."},
{m:"M4",q:"ReLU: fórmula y por qué se usa",a:"max(0,x). La más usada en redes profundas: entrenamiento más rápido y mitiga el gradiente desvanecido."},
{m:"M4",q:"Softmax: dónde se usa y propiedades",a:"Capa de salida en clasificación con clases mutuamente excluyentes. Salidas positivas que suman 1 → interpretables como distribución de probabilidad."},
{m:"M4",q:"Época, batch e iteración",a:"Época: una pasada por todo el entrenamiento. Batch: subconjunto con el que se hace una actualización. Iteraciones por época = nº ejemplos / batch size."},
{m:"M4",q:"SGD vs. BGD vs. mini-batch",a:"SGD: actualiza con cada ejemplo. BGD: una actualización tras todo el conjunto. Mini-batch: equilibrio entre ambos; lo estándar (batch≈32)."},
{m:"M4",q:"¿Qué es Adam?",a:"Optimizador que combina Momentum (inercia del gradiente) y RMSProp (tasas adaptativas por parámetro): estimación adaptativa de momentos."},
{m:"M4",q:"¿Qué es el gradiente desvanecido?",a:"En redes profundas (sigmoides), el gradiente se hace diminuto al retropropagarse → las primeras capas no aprenden. Soluciones: ReLU, buena inicialización, conexiones residuales."},
{m:"M4",q:"¿Por qué la entropía cruzada acelera el aprendizaje frente al coste cuadrático?",a:"Con coste cuadrático una neurona sigmoide saturada aprende lento aunque esté muy equivocada; con entropía cruzada el aprendizaje es más rápido cuanto mayor es el error."},
{m:"M4",q:"Cuatro técnicas contra el sobreentrenamiento en redes",a:"Regularización L2/L1 (penalizar pesos grandes), early stopping (parar cuando sube el error de validación), dropout (desactivar neuronas al azar en entrenamiento) y aumento de datos."},
{m:"M4",q:"Dropout: ¿cuándo se aplica y por qué funciona?",a:"Solo durante el ENTRENAMIENTO (no en test). Fuerza redundancia: la red debe acertar aunque falten neuronas → previene el sobreajuste."},
{m:"M4",q:"Autoencoder: estructura y usos",a:"Encoder (entrada → código de menor dimensión) + decoder (reconstruir la entrada). Usos: reducción de dimensionalidad no lineal, preentrenamiento, detección de anomalías. Variantes: denoising, variational."},
{m:"M4",q:"Las dos grandes ventajas de la convolución en CNN",a:"1) Conexiones dispersas: cada neurona solo ve su campo receptivo local. 2) Compartición de parámetros: el mismo filtro recorre toda la imagen → invariancia a traslación y muchos menos parámetros."},
{m:"M4",q:"Dimensión de salida de una convolución",a:"(n + 2p − f)/s + 1, con n entrada, p padding, f tamaño de filtro, s stride. Ej.: 32×32, f=5, s=1, p=0 → 28×28."},
{m:"M4",q:"Max-pooling: qué hace y qué parámetros aprende",a:"Reduce alto×ancho tomando el máximo de cada ventana (típico 2×2, s=2). NO tiene parámetros entrenables."},
{m:"M4",q:"Estructura típica de una CNN de clasificación",a:"[CONV→ReLU→POOL]×N → FC → softmax. Al profundizar: alto/ancho ↓, canales ↑. La mayoría de parámetros están en las FC."},
{m:"M4",q:"LeNet-5, AlexNet, VGG: rasgo distintivo de cada una",a:"LeNet-5: pionera, dígitos, ~60K parámetros. AlexNet: enorme (~60M), ReLU, ganó ImageNet 2012. VGG: uniforme, solo conv 3×3 y pool 2×2, ~138M."},
{m:"M4",q:"ResNet e Inception: idea clave",a:"ResNet: conexiones residuales (skip) que permiten redes muy profundas. Inception: convoluciones paralelas de varios tamaños + conv 1×1 para reducir canales/coste."},
{m:"M4",q:"¿Qué es el transfer learning?",a:"Reutilizar una red preentrenada: congelar las capas convolucionales (características generales) y reentrenar solo las capas finales para el nuevo problema. Ideal con pocos datos."},
{m:"M4",q:"¿Qué problema resuelven las RNN y cómo?",a:"Modelar secuencias: la celda recibe la entrada actual y el estado anterior (memoria) → la respuesta depende del contexto. Se entrenan con BPTT."},
{m:"M4",q:"Las tres puertas de una LSTM",a:"Olvido: qué memoria se borra. Entrada: qué se añade a la memoria. Salida: qué parte de la memoria se emite. El canal de memoria sin no-linealidades evita el gradiente desvanecido."},
{m:"M4",q:"GRU vs. LSTM",a:"GRU es una simplificación con 2 puertas (update, reset), menos parámetros y rendimiento similar."},
{m:"M4",q:"Encoder-decoder y atención",a:"El encoder comprime la secuencia en un vector y el decoder genera la salida (traducción). La atención deja al decoder mirar todas las posiciones de la entrada, no solo el vector final."},
/* ===== M5 ===== */
{m:"M5",q:"Los dos objetivos de un sistema recomendador",a:"Combatir la sobrecarga de información (seleccionar lo interesante) y estimular acciones del usuario (comprar, ver…)."},
{m:"M5",q:"Valoraciones explícitas vs. implícitas",a:"Explícitas: el usuario puntúa (estrellas 1–5). Implícitas: se infieren de acciones (comprar, reproducir, clic)."},
{m:"M5",q:"Las 4 familias de sistemas recomendadores",a:"Filtraje colaborativo (solo valoraciones), basados en contenido (descripciones + perfil), basados en conocimiento (requisitos, sin historial) e híbridos."},
{m:"M5",q:"¿Por qué Pearson y no distancia euclídea para comparar usuarios?",a:"La euclídea crece con el nº de ítems en común. Pearson resta la media de cada usuario → independiente de desplazamientos y escala (corrige a quien puntúa siempre alto/bajo). Rango [−1,1]."},
{m:"M5",q:"Predicción en filtraje colaborativo basado en usuarios",a:"pred(a,i) = media de a + Σ sim(a,b)·(bᵢ−media de b) / Σ sim(a,b), sobre los N vecinos (número fijo o umbral)."},
{m:"M5",q:"¿Cuándo conviene el filtraje colaborativo basado en ítems?",a:"Cuando hay muchos más usuarios que ítems: comparar usuarios es muy costoso; las similitudes ítem-ítem son más estables y precomputables."},
{m:"M5",q:"Similitud coseno y coseno ajustado",a:"cos(x,y)=x·y/(|x||y|) ∈[0,1]. El ajustado resta antes la media de cada usuario (∈[−1,1]) corrigiendo tendencias de puntuación. Es la medida estándar en filtraje por ítems."},
{m:"M5",q:"Factorización de matrices en recomendadores",a:"R ≈ U·Vᵀ con k factores latentes; se aprende minimizando el error sobre las valoraciones conocidas (descenso de gradiente). Predicción = producto escalar usuario·ítem."},
{m:"M5",q:"Problema del arranque en frío (cold start)",a:"Usuarios o ítems nuevos sin valoraciones no se pueden recomendar con filtraje colaborativo. Lo mitigan los métodos basados en contenido/conocimiento y los híbridos."},
{m:"M5",q:"Recomendadores basados en contenido: idea y riesgo",a:"Recomiendan ítems similares en características a los que gustaron (perfil de usuario con atributos de los ítems). Riesgo: sobreespecialización → burbuja de filtros."},
{m:"M5",q:"Basados en conocimiento: ¿cuándo y qué dos tipos hay?",a:"Compras infrecuentes sin historial (nevera, coche). Basados en restricciones (reglas: precio ≤ X) y basados en casos (similitud + crítica iterativa: «como este pero más barato»)."},
{m:"M5",q:"¿Cómo se evalúa offline un recomendador?",a:"Ocultando parte de las valoraciones (train/test) y midiendo el error de predicción (MAE, RMSE) o precisión/recall del top-N. Online: estudios con usuarios reales (test A/B)."},
{m:"M5",q:"¿Qué es la burbuja de filtros? (PEC5)",a:"Efecto por el que los recomendadores solo muestran contenido afín a tus gustos previos, reduciendo la diversidad y reforzando opiniones."},
/* ===== M6 ===== */
{m:"M6",q:"Elementos del bucle de RL",a:"Agente, entorno, acción aₜ, estado sₜ (u observación si es parcial), recompensa rₜ y política π. El agente actúa, el entorno cambia de estado y devuelve recompensa."},
{m:"M6",q:"¿Qué es la política π y cuál es el objetivo del RL?",a:"Los criterios con los que el agente elige acción en cada estado. Objetivo: encontrar la π que maximiza la recompensa acumulada G."},
{m:"M6",q:"Tipos de recompensas (3 ejes)",a:"Origen: intrínsecas (el entorno las da) vs. extrínsecas (se diseñan). Frecuencia: densas vs. dispersas. Momento: inmediatas vs. diferidas."},
{m:"M6",q:"Exploración vs. explotación y política ε-avariciosa",a:"Explorar = probar acciones nuevas; explotar = usar lo aprendido. ε-greedy: con probabilidad ε acción aleatoria, si no la mejor conocida; ε suele decrecer."},
{m:"M6",q:"Métodos con modelo vs. sin modelo",a:"Con modelo: se conoce/aprende cómo transiciona el entorno. Sin modelo: solo interacción (SARSA, Q-learning, DQN son sin modelo)."},
{m:"M6",q:"On-policy vs. off-policy",a:"On-policy: la misma política actúa y aprende (SARSA). Off-policy: una política de comportamiento explora y otra objetivo aprende (Q-learning)."},
{m:"M6",q:"Factor de descuento γ",a:"Resta peso a recompensas lejanas: G = Σ γᵗ·rₜ, 0≤γ≤1 (típico 0.95–0.99). γ→1 para tareas largas con recompensas diferidas."},
{m:"M6",q:"Ecuación de Bellman y bootstrapping",a:"V(s) = E[r + γ·V(s′)]: el valor de un estado se define recursivamente por sus sucesores. Bootstrapping: estimar con estimaciones → se aprende en cada paso, sin esperar el final del episodio."},
{m:"M6",q:"Actualización TD y tasa de aprendizaje α",a:"V(s) ← V(s) + α·[r + γV(s′) − V(s)]. α∈[0.001,0.5]: 0 = no aprende; 1 = olvida lo anterior."},
{m:"M6",q:"¿Qué es la tabla Q y cómo se elige la acción óptima?",a:"Tabla |S|×|A| con la recompensa acumulada esperada de cada par (estado, acción). a* = argmaxₐ Q(s,a)."},
{m:"M6",q:"Regla de actualización de SARSA",a:"Q(s,a) ← Q(s,a) + α·[r + γ·Q(s′,a′) − Q(s,a)], usando la acción a′ realmente elegida. On-policy, ε-greedy."},
{m:"M6",q:"Regla de actualización de Q-learning y sus dos políticas",a:"Q(s,a) ← Q(s,a) + α·[r + γ·maxₐQ(s′,a) − Q(s,a)]. Política de comportamiento (interactúa) + política objetivo (aprende); la primera copia periódicamente la segunda."},
{m:"M6",q:"¿Por qué DQN sustituye la tabla Q por una red?",a:"En problemas reales |S| es enorme (Go ≈ 10¹⁷⁰): la tabla no cabe en memoria ni da tiempo a llenarla. La red aproxima la función Q(s,a)."},
{m:"M6",q:"Los dos estabilizadores clave de DQN",a:"Experience replay: memoria de transiciones (s,a,r,s′) muestreada en mini-batches aleatorios (rompe correlación temporal). Target network: copia congelada para calcular el objetivo, actualizada periódicamente."},
{m:"M6",q:"¿Qué es un episodio/trayectoria?",a:"La secuencia completa de acciones y estados desde el inicio hasta completar (o fallar) la tarea."},
{m:"M6",q:"Aprendizaje por imitación y RL inverso",a:"Imitación: aprender copiando a un experto (Tesla). RL inverso: deducir el sistema de recompensas observando al experto. Útiles cuando diseñar recompensas es muy difícil."}
];
</script>
<script>
/* Preguntas nuevas (ampliación 2026). p:1 = orientada a PECs */
const QUESTIONS_NEW = [
/* ---------- M1 ---------- */
{m:"M1",t:"Un modelo acierta 85 de 100 ejemplos de test. ¿Cuáles son su exactitud (accuracy) y su tasa de error?",
o:["Accuracy 0.85 y tasa de error 0.15","Accuracy 0.15 y tasa de error 0.85","No puede calcularse sin la matriz de confusión completa"],c:0,
e:"Accuracy = aciertos/total = 85/100 = 0.85; la tasa de error es su complementario: 1 − 0.85 = 0.15. Para accuracy global no hace falta la matriz de confusión."},
{m:"M1",t:"Con TP=40, FP=10, FN=20 y TN=30, la precisión y el recall del modelo son...",
o:["P = 0.8 y R = 0.67","P = 0.67 y R = 0.8","P = 0.57 y R = 0.4"],c:0,
e:"P = TP/(TP+FP) = 40/50 = 0.8. R = TP/(TP+FN) = 40/60 ≈ 0.67. Precisión mira las predicciones positivas; recall, los positivos reales."},
{m:"M1",t:"En un detector de tumores malignos, ¿qué métrica interesa priorizar para no dejar tumores sin detectar?",
o:["La sensibilidad (recall): minimizar los falsos negativos","La precisión: minimizar los falsos positivos","La exactitud global del modelo"],c:0,
e:"Un falso negativo (tumor maligno clasificado como benigno) es el error más grave: se prioriza el recall, TP/(TP+FN), que mide cuántos positivos reales detectamos."},
{m:"M1",t:"¿Cuál es la diferencia entre parámetros e hiperparámetros de un modelo?",
o:["Los parámetros se ajustan automáticamente en el entrenamiento; los hiperparámetros se fijan antes (manualmente o con validación)","Los hiperparámetros se aprenden con descenso de gradiente y los parámetros no","Son sinónimos en aprendizaje automático"],c:0,
e:"Los parámetros (pesos, β, centroides…) los ajusta el algoritmo. Los hiperparámetros (k de kNN o k-means, profundidad del árbol, C de la SVM…) se eligen antes, típicamente con un conjunto de validación."},
{m:"M1",t:"Si un modelo tiene error de entrenamiento muy bajo pero error de test alto, sufre...",
o:["sobreajuste (alta varianza)","subajuste (alto sesgo)","maldición de la dimensionalidad"],c:0,
e:"Clavar el entrenamiento y fallar en test es la firma del sobreajuste: el modelo es demasiado complejo/específico (alta varianza). El subajuste falla ya en entrenamiento."},
{m:"M1",t:"Si un modelo es incapaz de obtener un error bajo ni siquiera en el conjunto de entrenamiento, decimos que sufre...",
o:["subajuste: el modelo es demasiado simple (alto sesgo)","sobreajuste: el modelo es demasiado complejo","fuga de datos entre entrenamiento y test"],c:0,
e:"No poder ajustar ni el entrenamiento indica un espacio de hipótesis demasiado restringido: subajuste / alto sesgo (p. ej., una recta para datos claramente no lineales)."},
{m:"M1",t:"En k-means, el valor de cada centroide se actualiza en cada iteración como...",
o:["la media de los puntos asignados a su categoría","el punto más alejado del resto de centroides","la mediana de todos los puntos del conjunto"],c:0,
e:"k-means alterna asignación (cada punto a su centroide más cercano) y actualización (centroide = media de los puntos asignados), minimizando la suma de distancias al cuadrado."},
{m:"M1",t:"¿Por qué el resultado de k-means puede variar entre ejecuciones?",
o:["Porque converge a un mínimo local que depende de la inicialización de los centroides","Porque el valor de k cambia automáticamente en cada ejecución","Porque usa las etiquetas de clase de forma aleatoria"],c:0,
e:"La función objetivo no es convexa: según dónde caigan los centroides iniciales, el algoritmo converge a particiones distintas (mínimos locales). Por eso se suele ejecutar varias veces."},
{m:"M1",t:"¿Cuál de estas estructuras de categorías construye un algoritmo de clustering jerárquico?",
o:["Un dendrograma (árbol de categorías en varios niveles)","Una partición disjunta plana","Una partición difusa con grados de pertenencia"],c:0,
e:"El clustering jerárquico organiza las categorías en un árbol (dendrograma): los conceptos que comparten padre son más similares. k-means construye particiones disjuntas; fuzzy k-means, difusas."},
{m:"M1",t:"Trabajamos con 10.000 ejemplos y queremos estimar de forma robusta la calidad del modelo con pocos datos disponibles. ¿Qué técnica es más adecuada?",
o:["Validación cruzada k-fold, promediando el error de las k iteraciones","Usar todo el conjunto para entrenar y para evaluar","Evaluar solo con los ejemplos mal clasificados"],c:0,
e:"k-fold reparte el conjunto en k particiones y rota cuál se usa para evaluar, promediando el error: aprovecha todos los datos y da una estimación más fiable. Evaluar con los datos de entrenamiento infla la calidad."},
{m:"M1",t:"Al normalizar los atributos antes de calcular distancias se pretende...",
o:["evitar que los atributos con rangos grandes dominen el cálculo de la distancia","aumentar la dimensionalidad del problema","convertir los atributos numéricos en categóricos"],c:0,
e:"Sin normalizar, un atributo como el salario (miles) pesa mucho más que el número de hijos (unidades) en la distancia euclidiana, sesgando el resultado."},
{m:"M1",p:1,t:"(PEC) En scikit-learn, ¿por qué se ajusta el escalador (scaler) solo con los datos de entrenamiento y luego se aplica al test?",
