ajo). Vale 1 con tendencias idénticas, −1 con opuestas y ~0 sin relación."}, {"m": "M5", "t": "¿Por qué no se suele usar la distancia euclídea simple para medir similitud entre usuarios?", "o": ["porque no se puede calcular", "porque depende del número de ítems en común: cuantos más, mayor tiende a ser la distancia", "porque siempre da cero"], "c": 1, "e": "La distancia euclídea crece con el número de ítems valorados en común (más términos en el sumatorio), lo cual no es deseable para comparar similitud. Por eso se prefiere Pearson, independiente de escala."}, {"m": "M5", "t": "En el filtraje colaborativo basado en ítems, la medida de similitud más establecida es...", "o": ["la correlación de Pearson", "la similitud coseno (o coseno ajustada)", "la distancia de Hamming"], "c": 1, "e": "En el enfoque basado en ítems la similitud coseno es la métrica estándar. La coseno ajustada resta la media de cada usuario (corrigiendo sesgos de puntuación) y, como Pearson, toma valores entre −1 y 1."}, {"m": "M5", "t": "El filtraje colaborativo basado en ítems se prefiere al basado en usuarios cuando...", "o": ["hay muchos más usuarios que ítems (comparar usuarios sería muy costoso)", "hay muchos más ítems que usuarios", "no hay ninguna valoración"], "c": 0, "e": "En escenarios realistas suele haber millones de usuarios y miles de ítems; comparar todos los usuarios es costoso. El enfoque basado en ítems (más estable y eficiente) calcula similitudes entre ítems."}, {"m": "M5", "t": "El filtraje colaborativo basado en factorización de matrices (p. ej. SVD)...", "o": ["descompone la matriz de valoraciones en factores que representan características latentes de usuarios e ítems", "usa reglas de restricciones explícitas", "no necesita ninguna valoración"], "c": 0, "e": "La factorización (SVD: M=UΣVᵀ) descubre características latentes (a veces interpretables como género de película). Un ítem se recomienda si su vector latente es parecido al del usuario. La matriz de valoraciones es dispersa, y U,V se hallan minimizando el error."}, {"m": "M5", "t": "El problema del 'arranque en frío' (usuarios o ítems nuevos sin valoraciones) afecta especialmente a...", "o": ["el filtraje colaborativo", "los sistemas basados en conocimiento", "los sistemas basados en restricciones"], "c": 0, "e": "El filtraje colaborativo necesita valoraciones previas, por lo que falla con usuarios o ítems nuevos. Los basados en contenido (con características del ítem) o en conocimiento sortean este problema."}, {"m": "M5", "t": "Los sistemas recomendadores basados en contenido...", "o": ["usan solo la matriz de valoraciones", "usan características de los ítems y un perfil de usuario que pondera esas características", "necesitan muchos usuarios para funcionar"], "c": 1, "e": "El enfoque basado en contenido recomienda comparando las características de los ítems con el perfil de preferencias del usuario. Ventaja: no necesita gran volumen de usuarios ni sufre el problema de ítems nuevos sin valoración."}, {"m": "M5", "t": "En recomendadores basados en contenido textual, la función tf-idf da más importancia a...", "o": ["las palabras muy frecuentes en todos los documentos", "las palabras frecuentes en un documento pero poco frecuentes en el conjunto de documentos", "las palabras más cortas"], "c": 1, "e": "tf-idf combina la frecuencia del término en el documento (tf) con la rareza del término en la colección (idf): una palabra relevante aparece mucho en un documento pero poco en los demás."}, {"m": "M5", "t": "Los sistemas recomendadores basados en conocimiento son útiles cuando...", "o": ["hay muchísimas valoraciones disponibles", "se compran productos con poca frecuencia (coches, electrodomésticos) y no hay historial fiable", "se quiere ignorar las preferencias del usuario"], "c": 1, "e": "Para productos comprados raramente (sin historial) o que cambian rápido, el filtraje colaborativo falla. Los basados en conocimiento usan requisitos explícitos del usuario y datos estructurados del producto."}, {"m": "M5", "t": "En un recomendador basado en restricciones, la consulta '[capacidad ≥ 8 AND precio < 400]' es un ejemplo de...", "o": ["consulta conjuntiva (varias condiciones que deben cumplirse a la vez)", "filtraje colaborativo", "factorización de matrices"], "c": 0, "e": "Los recomendadores basados en restricciones formulan consultas conjuntivas (condiciones unidas por AND) sobre el catálogo, recuperando los ítems que cumplen todos los requisitos del usuario."}, {"m": "M5", "t": "En recomendadores basados en casos, la técnica de 'criticar' (critiquing) permite que el usuario...", "o": ["valore con estrellas un producto", "indique cambios sobre un ítem recomendado (p. ej. 'más barato', 'más capacidad') para refinar la búsqueda", "entrene la red neuronal"], "c": 1, "e": "El critiquing apoya la navegación: a partir de un ítem recomendado al que le falta algo, el usuario expresa una crítica (más barato, más grande...) y el sistema busca alternativas que la satisfagan."}, {"m": "M5", "t": "Los sistemas recomendadores híbridos...", "o": ["combinan varios paradigmas (colaborativo, contenido, conocimiento) para aprovechar sus ventajas", "usan un único algoritmo siempre", "no pueden combinar fuentes de información"], "c": 0, "e": "Los híbridos combinan varios enfoques básicos para explotar más fuentes de información y superar las carencias de cada uno. Sus diseños pueden ser monolítico, paralelizado o canalizado (pipeline)."}, {"m": "M5", "t": "Un diseño híbrido 'canalizado' (pipeline) se caracteriza por...", "o": ["combinar las salidas de recomendadores que funcionan en paralelo", "encadenar recomendadores, donde la salida de uno es la entrada del siguiente", "integrar todo en un único algoritmo monolítico"], "c": 1, "e": "En el diseño canalizado los recomendadores se construyen secuencialmente: la salida de una etapa alimenta a la siguiente. El paralelizado combina salidas independientes; el monolítico integra todo en un solo algoritmo."}, {"m": "M5", "t": "La evaluación de sistemas recomendadores basada en datos históricos...", "o": ["pide a usuarios reales que valoren las recomendaciones en tiempo real", "divide las valoraciones en entrenamiento y test, usando métricas de clasificación o de regresión según el caso", "no usa ninguna métrica"], "c": 1, "e": "La evaluación con datos históricos es análoga al aprendizaje supervisado: se reservan valoraciones para test y se usan métricas de clasificación (precisión, recall, exactitud) o de regresión (MSE, RMSE, MAE), o de ranking (MAP, MRR). La basada en usuarios reales evalúa en tiempo real."}, {"m": "M5", "t": "La similitud coseno ajustada se diferencia de la coseno simple en que...", "o": ["resta a cada valoración la media del usuario antes de calcularla (rango −1 a 1)", "solo funciona con datos binarios", "no tiene en cuenta el producto escalar"], "c": 0, "e": "La coseno ajustada normaliza restando la media de valoraciones de cada usuario, corrigiendo que unos puntúen alto y otros bajo. Sus valores van de −1 a 1, como Pearson; la coseno simple va de 0 a 1."}, {"m": "M6", "t": "¿Qué caracteriza al aprendizaje por refuerzo frente al supervisado y no supervisado?", "o": ["dispone de un gran conjunto de datos etiquetados", "no hay datos de entrenamiento: un agente interactúa con un entorno y aprende de las recompensas", "solo busca grupos o clusters en los datos"], "c": 1, "e": "En RL no hay un dataset fijo: el agente aprende por ensayo y error interactuando con el entorno, guiado únicamente por las recompensas que recibe tras cada acción."}, {"m": "M6", "t": "En el bucle del aprendizaje por refuerzo, tras ejecutar una acción at en el estado st, el entorno devuelve...", "o": ["la acción óptima correcta", "un nuevo estado st+1 y una recompensa rt+1", "la política completa"], "c": 1, "e": "El bucle es: el agente ejecuta at en st, y el entorno responde con un nuevo estado st+1 y una recompensa rt+1. Nunca se le da la acción correcta (eso sería supervisado)."}, {"m": "M6", "t": "Cuando el agente solo percibe parte del estado del entorno (p. ej. con sensores), se dice que recibe...", "o": ["una observación (en lugar del estado completo), convirtiendo el problema en un POMDP", "la recompensa acumulada", "la política objetivo"], "c": 0, "e": "Si el agente no percibe el estado completo recibe una observación parcial; el problema deja de ser un MDP totalmente observable y se convierte en un POMDP, frecuente en sistemas robóticos reales."}, {"m": "M6", "t": "El objetivo de cualquier problema de aprendizaje por refuerzo es...", "o": ["minimizar el número de estados", "crear un agente que maximice la recompensa acumulada G", "memorizar todas las trayectorias"], "c": 1, "e": "Todo problema de RL se formula como maximizar la recompensa acumulada G(k)=Σ ri hasta completar la tarea. El agente busca la secuencia de acciones que maximiza esa suma."}, {"m": "M6", "t": "Una recompensa 'dispersa' (sparse) es aquella que...", "o": ["se recibe en cada iteración", "solo se recibe (distinta de cero) al lograr objetivos principales o completar la tarea", "siempre es negativa"], "c": 1, "e": "Las recompensas dispersas solo aparecen al alcanzar objetivos importantes (p. ej. soldar una pieza), a diferencia de las densas, que se reciben en casi cada iteración (p. ej. cada paso sin caer)."}, {"m": "M6", "t": "La política (π) de un agente de RL es...", "o": ["el conjunto de criterios para decidir qué acción ejecutar dado el estado actual", "la lista de todas las recompensas posibles", "el modelo del entorno"], "c": 0, "e": "La política define cómo actúa el agente: dado el estado, qué acción elige. El objetivo del entrenamiento es encontrar la política que maximiza la recompensa acumulada."}, {"m": "M6", "t": "En una política ε-avariciosa (ε-greedy), el parámetro ε regula...", "o": ["la tasa de aprendizaje", "el equilibrio entre exploración (acción aleatoria con probabilidad ε) y explotación (mejor acción con probabilidad 1−ε)", "el factor de descuento"], "c": 1, "e": "La política ε-greedy elige una acción al azar con probabilidad ε (exploración) o la mejor acción conocida con probabilidad 1−ε (explotación). Suele aplicarse una atenuación (decay) que reduce ε con el tiempo."}, {"m": "M6", "t": "La atenuación (decay) de ε durante el entrenamiento busca que el agente...", "o": ["explore mucho al principio y explote más a medida que aprende", "explote siempre desde el inicio", "nunca explore"], "c": 0, "e": "Al inicio interesa explorar (ε alto, próximo a 1) porque el agente no conoce las consecuencias; al avanzar conviene explotar lo aprendido (ε bajo). El decay reduce ε progresivamente."}, {"m": "M6", "t": "Un método de RL es 'sin modelo' (model-free) cuando...", "o": ["conoce perfectamente las transiciones estado-acción del entorno", "aprende solo mediante las interacciones con el entorno, sin una descripción completa de su funcionamiento", "no usa recompensas"], "c": 1, "e": "Los métodos sin modelo aprenden por interacción, sin conocer a priori las transiciones del entorno. Los basados en modelo sí disponen de una descripción completa (transiciones), pero suelen ser inviables salvo en entornos pequeños."}, {"m": "M6", "t": "La diferencia entre métodos 'on-policy' (política actual) y 'off-policy' (política óptima) es que los off-policy...", "o": ["usan una sola política para actuar y aprender", "usan dos políticas: una de comportamiento (para actuar) y una objetivo (que aprende), lo que da más estabilidad", "no aprenden nada"], "c": 1, "e": "Los off-policy mantienen una política de comportamiento (interactúa, se actualiza de vez en cuando) y una política objetivo (aprende constantemente), lo que estabiliza el aprendizaje. Q-learning es off-policy; SARSA es on-policy."}, {"m": "M6", "t": "La tabla Q(s,a) almacena...", "o": ["la recompensa acumulada estimada de tomar la acción a en el estado s", "la probabilidad de cada estado", "el número de episodios ejecutados"], "c": 0, "e": "La tabla Q (valores-acciones) tiene una fila por estado y una columna por acción, y guarda la recompensa acumulada estimada (calidad, quality) de ejecutar la acción a en el estado s. El agente elige argmax_a Q(s,a)."}, {"m": "M6", "t": "El factor de descuento λ (gamma), entre 0 y 1, sirve para...", "o": ["restar peso a las recompensas más lejanas en el tiempo", "aumentar el número de estados", "eliminar la exploración"], "c": 0, "e": "El factor de descuento (λ^t, típicamente 0.95–0.99) hace que las recompensas futuras pesen menos que las inmediatas, facilitando el aprendizaje. Cuanto mayor λ, más se valoran las recompensas lejanas."}, {"m": "M6", "t": "La ecuación de Bellman permite calcular el valor de un estado...", "o": ["recorriendo siempre la trayectoria completa hasta el final", "de forma recursiva, como la recompensa inmediata más el valor descontado del estado siguiente", "sin usar ninguna recompensa"], "c": 1, "e": "Bellman define V(s)=E[rt + γ·V(st+1)]: el valor de un estado en función del valor del siguiente. Esta estrategia (bootstrapping) permite aprender con cada acción, sin recorrer trayectorias enteras como el método de Montecarlo."}, {"m": "M6", "t": "El 'bootstrapping' en el aprendizaje por diferencia temporal (TD) consiste en...", "o": ["esperar al final del episodio para actualizar valores", "estimar el valor de un estado a partir de los valores estimados de los estados sucesores", "muestrear datos con repetición"], "c": 1, "e": "En TD se aplica la idea de Bellman: se actualiza el valor de un estado usando la estimación del estado siguiente, permitiendo aprender en cada acción sin esperar al final de la trayectoria (a diferencia de Montecarlo)."}, {"m": "M6", "t": "La diferencia principal entre SARSA y Q-learning es que...", "o": ["SARSA usa una política (on-policy) y Q-learning usa la acción de valor máximo del estado siguiente (off-policy)", "son exactamente iguales", "Q-learning no usa tabla Q"], "c": 0, "e": "SARSA actualiza con Q(st+1, at+1) siguiendo la política actual (on-policy); Q-learning actualiza con max_a Q(st+1, a) —la mejor acción— y usa dos políticas (off-policy), siendo más eficiente."}, {"m": "M6", "t": "En la actualización de Q-learning, el término 'max_a Q(st+1, a)' refleja que el método...", "o": ["elige la acción siguiente al azar", "asume que en el estado siguiente se tomará la mejor acción posible", "ignora el estado siguiente"], "c": 1, "e": "Q-learning usa el valor de la mejor acción del estado siguiente (max), aprendiendo hacia la política óptima independientemente de la acción que realmente ejecute la política de comportamiento (off-policy)."}, {"m": "M6", "t": "La principal limitación de Q-learning tabular es que...", "o": ["no converge nunca", "la tabla Q crece demasiado cuando el número de estados es grande (memoria y tiempo de entrenamiento)", "solo funciona con recompensas negativas"], "c": 1, "e": "La tabla Q tiene tamaño |S|×|A|; en problemas complejos el número de estados es enorme y la tabla se vuelve inabarcable. La solución es aproximar Q con una función (p. ej. una red neuronal)."}, {"m": "M6", "t": "En las redes Q profundas (DQN), el 'replay buffer' (memoria de experiencia) sirve para...", "o": ["almacenar el modelo del entorno", "extraer ejemplos pasados al azar de modo que sean independientes e idénticamente distribuidos (IID) y estabilizar el descenso de gradientes", "eliminar la exploración"], "c": 1, "e": "Usar las últimas N iteraciones (muy correlacionadas) desestabiliza el entrenamiento. El replay buffer guarda muchas experiencias pasadas y muestrea N al azar, logrando ejemplos más IID y reutilizándolos."}, {"m": "M6", "t": "La segunda gran mejora de DQN, usar una 'red objetivo' que se actualiza solo cada cierto número de iteraciones, resuelve el problema...", "o": ["del objetivo móvil (los parámetros y el valor que se aproxima cambiaban a la vez)", "de la falta de recompensas", "del exceso de estados"], "c": 0, "e": "Si la red ajusta θ para producir yi mientras yi también cambia, hay un 'objetivo móvil' e inestabilidad. La red objetivo mantiene yi fijo durante N iteraciones, estabilizando el aprendizaje."}, {"m": "M6", "t": "En el DQN original para juegos de Atari, ¿por qué la red recibe como entrada las 4 últimas imágenes del juego?", "o": ["para reducir el coste computacional", "porque con una sola imagen no se puede deducir el movimiento (velocidad y dirección de los objetos)", "para aumentar el número de clases"], "c": 1, "e": "Una sola imagen no informa de la dirección/velocidad (p. ej. hacia dónde va la pelota). Apilar las 4 últimas imágenes permite a la red deducir el movimiento. La red tiene capas convolucionales seguidas de capas densas."}, {"m": "M6", "t": "En la PEC6 (navegación de un dron), una política reactiva basada en 'campos de fuerza' (atracción al objetivo + repulsión de obstáculos)...", "o": ["es siempre óptima", "funciona razonablemente pero presenta oscilaciones y no planifica ni se adapta bien, lo que motiva usar RL", "no necesita ningún sensor"], "c": 1, "e": "Las políticas puramente reactivas (campos potenciales) logran comportamientos básicos pero oscilan y no planifican ni generalizan a situaciones nuevas, especialmente con percepción parcial y entornos dinámicos; por eso se recurre al aprendizaje por refuerzo."}];

 2:"Revisa los denominadores: P=TP/(TP+FP) y R=TP/(TP+FN). Ni 0.57 ni 0.4 salen de estas fórmulas con esos valores."}},
{t:"En un detector de tumores malignos", w:{

<script>
/* ===================================================================
   MOTOR v2 — SRS sobre preguntas, sesión diaria, gamificación
   =================================================================== */

/* ---------- SRS de preguntas ---------- */
const INT_DAYS = [0,1,2,3,5];          // días por caja (0 = 10 min)
function qsrs(){ return store.get("qsrs",{}); }
function srsInterval(box){
  const cap = Math.max(1, daysLeft()-1); // nunca programar más allá del examen
  return Math.min(INT_DAYS[box], cap);
}
function srsLabel(box, wrong){
  if(wrong) return "🔁 La verás de nuevo en esta sesión";
  const d = srsInterval(box);
  if(d<=0) return "⏳ Volverá en unos minutos";
  if(d===1) return "📆 Volverá mañana";
  return "📆 Volverá en "+d+" días";
}
function answerSRS(qid, ok){
  const s = qsrs(); const e = s[qid]||{b:0,lapses:0};
  if(ok){ e.b = Math.min(INT_DAYS.length-1,(e.b||0)+1); const d=srsInterval(e.b); e.due = Date.now() + (d===0? 10*60*1000 : d*86400000); }
  else { e.lapses=(e.lapses||0)+1; e.b=0; e.due = Date.now()+10*60*1000; }
  s[qid]=e; store.set("qsrs",s);
  return e;
}
/* migración desde la v1: siembra el SRS con el historial previo */
(function(){
  if(Object.keys(qsrs()).length) return;
  const st = qstats(); if(!Object.keys(st).length) return;
  const s={};
  for(const id in st){ s[id] = st[id].last===0 ? {b:0,due:Date.now(),lapses:st[id].bad||1} : {b:1,due:Date.now(),lapses:st[id].bad||0}; }
  store.set("qsrs",s);
})();

/* ---------- gamificación ---------- */
function daily(){ const d=store.get("daily",{}); return d.date===todayKey()? d : {date:todayKey(),n:0}; }
function streak(){ return store.get("streak",{last:null,n:0}); }
function touchStreak(){
  const s = streak(); const t = todayKey();
  if(s.last===t) return s;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yk = y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
  s.n = (s.last===yk)? s.n+1 : 1; s.last=t; store.set("streak",s);
  updateTop(); return s;
}
const DAILY_GOAL = 30;
function recordAnswer(qid, ok, firstTry){
  const s = qstats(); const e = s[qid]||{ok:0,bad:0};
  if(ok) e.ok++; else e.bad++;
  e.last = ok?1:0; s[qid]=e; store.set("qstats",s);
  const srsState = answerSRS(qid, ok);
  const d = daily(); d.n++; store.set("daily",d);
  store.set("xp",(store.get("xp",0)) + (ok? (firstTry?10:5) : 2));
  touchStreak();
  return srsState;
}
function masteredCount(){ const s=qsrs(); return QUESTIONS.filter(q=>s[q.id]&&s[q.id].b>=3).length; }
function dueQuestions(){ const s=qsrs(); const now=Date.now(); return QUESTIONS.filter(q=>s[q.id]&&s[q.id].due<=now).sort((a,b)=>s[a.id].due-s[b.id].due); }
function newQuestions(){ const s=qsrs(); return QUESTIONS.filter(q=>!s[q.id]); }

/* ---------- top bar ---------- */
function updateTop(){
  const sp=document.getElementById("streakpill"), dp=document.getElementById("dayspill");
  if(sp) sp.innerHTML = "🔥 "+streak().n;
  if(dp){ const d=daysLeft(); dp.innerHTML = d===0?"📅 ¡HOY!":"📅 "+d+" día"+(d===1?"":"s"); }
}

/* ================== NAVEGACIÓN ================== */
const TABS = [
  {id:"home", ico:"🏠", lbl:"Inicio"},
  {id:"study", ico:"🎯", lbl:"Estudiar"},
  {id:"exam", ico:"⏱️", lbl:"Simulacro"},
  {id:"theory", ico:"📖", lbl:"Teoría"},
  {id:"progress", ico:"📈", lbl:"Progreso"}
];
let currentTab="home", examTimer=null;
function renderNav(){
  document.getElementById("nav").innerHTML = TABS.map(t=>
    '<button class="'+(currentTab===t.id?"active":"")+'" onclick="go(\''+t.id+'\')"><span class="nico">'+t.ico+'</span>'+t.lbl+'</button>').join("");
}
function go(tab){
  if(examTimer && tab!=="exam"){ if(!confirm("Hay un simulacro en curso. ¿Salir y abandonarlo?")) return; stopTimer(); }
  currentTab=tab; renderNav(); scrollTop();
  ({home, study, exam, theory, progress})[tab]();
}

/* ================== INICIO ================== */
function moduleProgress(){
  const s = qstats(); const per = {};
  for(const m of Object.keys(MODS)) per[m]={ok:0,bad:0,total:QUESTIONS.filter(q=>q.m===m).length};
  QUESTIONS.forEach(q=>{ const e=s[q.id]; if(e){ per[q.m].ok+=e.ok; per[q.m].bad+=e.bad; } });
  return per;
}
function weakModule(){
  const per=moduleProgress(); let weak=null, acc=2;
  for(const m in per){ const p=per[m]; const n=p.ok+p.bad; if(n>=5){ const a=p.ok/n; if(a<acc){acc=a;weak=m;} } }
  return weak?{m:weak,acc:acc}:null;
}

const SESSION_SIZE = 16;
function startSession(){
  currentTab="study"; renderNav();
  const due = dueQuestions();
  const fresh = shuffle(newQuestions());
  let pool = due.slice(0, SESSION_SIZE);
  if(pool.length < SESSION_SIZE) pool = pool.concat(fresh.slice(0, SESSION_SIZE - pool.length));
  if(!pool.length){ pool = shuffle(QUESTIONS).slice(0,SESSION_SIZE); toast("Sin pendientes: ronda de refuerzo aleatoria"); }
  startQuiz(pool, "Sesión de estudio", true);
}

/* ---------- motor de quiz (sesión y práctica) ---------- */
let Q={queue:[],idx:0,first:{},ok1:0,seen:new Set(),title:"",isSession:false,answered:false,failedList:[]};
function startQuiz(pool, title, isSession){
  currentTab="study"; renderNav();
  if(!pool.length){ toast("No hay preguntas en esta selección 🎉"); study(); return; }
  Q={queue:shuffle(pool).slice(0,30),idx:0,first:{},ok1:0,seen:new Set(),title:title||"Práctica",isSession:!!isSession,answered:false,failedList:[]};
  scrollTop(); renderQ();
}
function renderQ(){
  if(Q.idx>=Q.queue.length) return quizSummary();
  const q=Q.queue[Q.idx];
  const order=shuffle(q.o.map((_,i)=>i));
  const isRetry = Q.first[q.id]!==undefined;
  Q.answered=false;
  app().innerHTML = `<div class="view">
  <div class="qmeta"><button class="btn sm ghost" onclick="quizExit()">✕</button>
    <span class="pill" style="color:${MOD_COLORS[q.m]}">${MODS_SHORT[q.m]}${q.p?" · PEC":""}</span>
    ${isRetry?'<span class="pill hot">🔁 reintento</span>':(qsrs()[q.id]?'<span class="pill">repaso</span>':'<span class="pill acc">nueva</span>')}
    <div class="spacer"></div><span class="pill">${Q.seen.size + 1 > Q.queue.length ? Q.queue.length : Q.seen.size+ (Q.first[q.id]===undefined?1:0)}/${qTotal()}</span></div>
  <div class="bar"><i style="width:${100*Q.idx/Q.queue.length}%"></i></div>
  <div class="card">
    <div class="qtext">${esc(q.t)}</div>
    ${order.map((oi,k)=>'<button class="opt" id="opt'+oi+'" data-k="'+k+'" onclick="qAnswer('+oi+')"><span style="display:flex;align-items:flex-start"><span class="lt">'+(k+1)+'</span><span>'+esc(q.o[oi])+'</span></span></button>').join("")}
    <div class="feed" id="feed"></div>
    <div class="row hide" id="nextrow" style="margin-top:12px">
      <button class="btn sm ghost" onclick="openTheory('${q.m}')">📖 Teoría ${MODS_SHORT[q.m]}</button>
      <div class="spacer"></div><button class="btn" id="nextbtn" onclick="qNext()">Continuar →</button>
    </div>
  </div>
  <p class="muted" style="font-size:11.5px;text-align:center">Teclas: 1-3 responder · Enter continuar</p></div>`;
}
function qTotal(){ return new Set(Q.queue.map(q=>q.id)).size; }
function qAnswer(oi){
  if(Q.answered) return; Q.answered=true;
  const q=Q.queue[Q.idx]; const ok=oi===q.c;
  const firstTry = Q.first[q.id]===undefined;
  if(firstTry){ Q.first[q.id]=ok; if(ok) Q.ok1++; else Q.failedList.push(q); Q.seen.add(q.id); }
  const srsState = recordAnswer(q.id, ok, firstTry);
  document.querySelectorAll(".opt").forEach(b=>{ b.disabled=true; if(b.id!=="opt"+q.c && b.id!=="opt"+oi) b.classList.add("dim"); });
  document.getElementById("opt"+q.c).classList.add("correct");
  if(!ok) document.getElementById("opt"+oi).classList.add("wrong");
  const f=document.getElementById("feed");
  f.className="feed show "+(ok?"good":"bad");
  let html = '<div class="ttl">'+(ok? '<span style="color:var(--ok)">✓ ¡Correcto!</span>' : '<span style="color:var(--bad)">✗ Incorrecto</span>')+'</div>';
  html += '<div class="exp"><b>Por qué:</b> '+esc(q.e)+'</div>';
  if(!ok && WHY[q.id] && WHY[q.id][oi]) html += '<div class="why"><b>Tu respuesta:</b> '+esc(WHY[q.id][oi])+'</div>';
  if(Q.isSession || true) html += '<span class="srschip">'+srsLabel(srsState.b, !ok)+'</span>';
  f.innerHTML = html;
  if(!ok){ const clone=q; Q.queue.splice(Math.min(Q.queue.length, Q.idx+3), 0, clone); }
  document.getElementById("nextrow").classList.remove("hide");
  setTimeout(()=>{ const el=document.getElementById("feed"); if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"}); },80);
}
function qNext(){ Q.idx++; scrollTop(); renderQ(); }
function quizExit(){ if(Q.seen.size===0 || confirm("¿Salir de la sesión?")) study(); }
function quizSummary(){
  const total=qTotal(); const pct=total?Math.round(100*Q.ok1/total):0;
  if(pct>=80) confetti();
  app().innerHTML = `<div class="view"><div class="card" style="text-align:center">
    <div class="big ${pct>=70?"ok-t":pct>=50?"warn-t":"bad-t"}">${pct} %</div>
    <p class="muted">${Q.ok1} de ${total} a la primera · ${Q.title}</p>
    <div class="row" style="justify-content:center">
      <button class="btn" onclick="startSession()">▶ Otra sesión</button>

  ${Q.failedList.length?'<div class="card"><h3>Para consolidar (las has fallado hoy)</h3>'+Q.failedList.map(q=>'<div class="stat"><span style="color:'+MOD_COLORS[q.m]+';flex:none">'+MODS_SHORT[q.m]+'</span><span style="font-size:13px">'+esc(q.t.slice(0,90))+(q.t.length>90?"…":"")+'</span></div>').join("")+'<p class="muted" style="font-size:12.5px;margin:10px 0 0">Ya están programadas: volverán a aparecer hasta que las domines.</p></div>':""}
  </div>`;
  updateTop();
}

const FBOX_DAYS=[0,1,2,4,7];
function fsrs(){ return store.get("srs",{}); }
function dueFlash(mod){
  const s=fsrs(); const now=Date.now();
  return FLASH.map((f,i)=>({f,i})).filter(x=>{ if(mod&&x.f.m!==mod) return false; const e=s[x.i]; return !e||e.due<=now; });
}
let fQueue=[],fIdx=0,fShown=false;
function flashHome(){
  currentTab="study"; renderNav(); scrollTop();
  const dueAll=dueFlash().length;
  app().innerHTML = `<div class="view">
  <div class="row"><button class="btn sm ghost" onclick="study()">← Estudiar</button><h2 style="margin:0">🃏 Tarjetas</h2></div>
  <div class="card" style="margin-top:12px"><div class="row">
    <div><div class="big ${dueAll?"warn-t":"ok-t"}">${dueAll}</div><div class="muted" style="font-size:13px">pendientes hoy</div></div>
    <div class="spacer"></div>
    <button class="btn" ${dueAll?"":"disabled"} onclick="flashStart(null)">Repasar</button>
    <button class="btn ghost" onclick="flashStart(null,true)">Todas</button>
  </div></div>
  <div class="grid">${Object.keys(MODS).map(m=>{
    const tot=FLASH.filter(f=>f.m===m).length, due=dueFlash(m).length;
    return '<button class="mode" onclick="flashStart(\''+m+'\',false,true)"><h3 style="color:'+MOD_COLORS[m]+';font-size:14px">'+MODS_SHORT[m]+'</h3><p>'+due+' / '+tot+' pendientes</p></button>';
  }).join("")}</div></div>`;
}
function flashStart(mod,all,fallbackAll){
  let q = all? FLASH.map((f,i)=>({f,i})).filter(x=>!mod||x.f.m===mod) : dueFlash(mod);
  if(!q.length&&fallbackAll) q=FLASH.map((f,i)=>({f,i})).filter(x=>!mod||x.f.m===mod);
  if(!q.length){ toast("No hay tarjetas pendientes 🎉"); flashHome(); return; }
  fQueue=shuffle(q); fIdx=0; fShown=false; scrollTop(); renderFlash();
}
function renderFlash(){
  if(fIdx>=fQueue.length){
    confetti();
    app().innerHTML='<div class="view"><div class="card" style="text-align:center"><div class="big ok-t">🎉</div><h2>Sesión completada</h2><p class="muted">Has repasado '+fQueue.length+' tarjetas.</p><div class="row" style="justify-content:center"><button class="btn" onclick="flashHome()">Volver</button></div></div></div>';
    return;
  }
  const x=fQueue[fIdx]; const f=x.f;
  app().innerHTML = `<div class="view">
  <div class="row"><button class="btn sm ghost" onclick="flashHome()">✕</button>
    <span class="pill" style="color:${MOD_COLORS[f.m]}">${MODS[f.m]}</span><div class="spacer"></div>
    <span class="pill">${fIdx+1}/${fQueue.length}</span></div>
  <div class="bar"><i style="width:${100*fIdx/fQueue.length}%"></i></div>
  <div class="fcard" onclick="fFlip()">
    ${fShown? '<div class="face back"><div class="muted" style="font-size:12px;margin-bottom:8px">'+esc(f.q)+'</div>'+esc(f.a)+'</div>'
            : '<div class="face"><b>'+esc(f.q)+'</b></div>'}
  </div>
  ${fShown? '<div class="srsbtns"><button class="btn bad" onclick="fGrade(0)">✗ No</button><button class="btn warn" onclick="fGrade(1)">~ A medias</button><button class="btn ok" onclick="fGrade(2)">✓ Sí</button></div>'
          : '<button class="btn" style="width:100%" onclick="fFlip()">Mostrar respuesta</button>'}
  <p class="muted" style="font-size:11.5px;text-align:center;margin-top:10px">Toca la tarjeta para girarla · Espacio girar · 1/2/3 valorar</p></div>`;
}
function fFlip(){ fShown=!fShown; renderFlash(); }
function fGrade(g){
  const x=fQueue[fIdx]; const s=fsrs(); const e=s[x.i]||{box:0};
  if(g===0) e.box=0; else if(g===1) e.box=Math.max(0,Math.min(1,e.box||0)); else e.box=Math.min(FBOX_DAYS.length-1,(e.box||0)+1);
  const days=Math.min(FBOX_DAYS[e.box], Math.max(1,daysLeft()-1));
  e.due=Date.now()+(g===0? 5*60*1000 : (days*86400000||12*3600*1000));
  s[x.i]=e; store.set("srs",s);
  if(g===0) fQueue.push(x);
  fIdx++; fShown=false; renderFlash();
}

function startExam(){
  eQs=[];

function renderEQ(){

      ${eIdx<eQs.length-1?'<button class="btn sm" onclick="eNav(1)">Siguiente →</button>':""}

function eSelect(oi){ eAns[eIdx]=(eAns[eIdx]===oi?null:oi); if(eAns[eIdx]!==null&&eIdx<eQs.length-1){ setTimeout(()=>eNav(1),200);} else renderEQ(); }
function eBlank(){ if(eAns[eIdx]===null&&eIdx<eQs.length-1) eNav(1); else { eAns[eIdx]=null; renderEQ(); } }
function eNav(d){ eIdx=Math.max(0,Math.min(eQs.length-1,eIdx+d)); scrollTop(); renderEQ(); }
function eGoto(i){ eIdx=i; scrollTop(); renderEQ(); }
function confirmFinish(){
  const blank=eAns.filter(a=>a===null).length;
  if(confirm("Vas a finalizar"+(blank?" con "+blank+" en blanco":"")+". ¿Seguro?")) finishExam();
}
function finishExam(){
  stopTimer();
  let ok=0,bad=0,blank=0;
  eQs.forEach((q,i)=>{ if(eAns[i]===null){blank++;return;} const hit=eAns[i]===q.c; recordAnswer(q.id,hit,true); if(hit)ok++; else bad++; });
  const pts=ok-0.5*bad; const nota=Math.max(0,pts/eQs.length*10);
  if(nota>=5) confetti();
  const perMod={};
  eQs.forEach((q,i)=>{ perMod[q.m]=perMod[q.m]||{ok:0,n:0}; perMod[q.m].n++; if(eAns[i]===q.c)perMod[q.m].ok++; });
  pushExam({date:new Date().toLocaleDateString("es-ES",{day:"numeric",month:"short"})+" "+new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}),ok,bad,blank,nota});
  app().innerHTML = `<div class="view">
  <div class="card" style="text-align:center">
    <div class="big ${nota>=5?"ok-t":"bad-t"}">${nota.toFixed(2)} / 10</div>

    ${bad+blank>0?'<p class="muted" style="font-size:12.5px">Las falladas ya están en tu plan de repaso 🎯</p>':""}
  </div>
  <div class="card"><h3>Por módulo</h3>${Object.keys(MODS).filter(m=>perMod[m]).map(m=>{
    const p=perMod[m]; const pct=Math.round(100*p.ok/p.n);
    return '<div class="mb"><div class="lbl"><span style="color:'+MOD_COLORS[m]+'">'+MODS[m]+'</span><span>'+p.ok+'/'+p.n+'</span></div><div class="mini"><i style="width:'+pct+'%;background:'+(pct>=60?"var(--ok)":pct>=40?"var(--warn)":"var(--bad)")+'"></i></div></div>';
  }).join("")}</div>
  <div class="row" style="margin-bottom:14px"><button class="btn" onclick="reviewExam()">Revisar respuestas</button><button class="btn ghost" onclick="go('exam')">Nuevo</button><button class="btn ghost" onclick="go('home')">Inicio</button></div></div>`;
  scrollTop(); updateTop();
}
function reviewExam(){
  app().innerHTML = '<div class="view"><div class="row"><button class="btn sm ghost" onclick="go(\'exam\')">← Salir</button><h2 style="margin:0">Revisión</h2></div>'+
  eQs.map((q,i)=>{
    const a=eAns[i]; const hit=a===q.c;
    let fb = a===null? "<b>En blanco (0 pts).</b> " : (hit? "<b>✓ +1.</b> ":"<b>✗ −0,5.</b> ");
    fb += esc(q.e);
    if(a!==null&&!hit&&WHY[q.id]&&WHY[q.id][a]) fb += '<div class="why" style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--line2)"><b>Tu respuesta:</b> '+esc(WHY[q.id][a])+'</div>';
    return '<div class="card"><div class="muted" style="font-size:12px">'+(i+1)+' · '+MODS[q.m]+'</div><div class="qtext" style="font-size:14.5px">'+esc(q.t)+'</div>'+
      q.o.map((o,oi)=>'<div class="opt '+(oi===q.c?"correct":(a===oi?"wrong":"dim"))+'" style="cursor:default;font-size:13.5px;animation:none">'+esc(o)+'</div>').join("")+
      '<div class="feed show '+(hit?"good":(a===null?"":"bad"))+'" style="'+(a===null?"background:var(--card2);border:1px solid var(--line);":"")+'">'+fb+'</div></div>';
  }).join("")+'</div>';
  scrollTop();
}

/* ================== TEORÍA ================== */
function stripTags(h){ return h.replace(/<[^>]*>/g," ").replace(/\s+/g," "); }
function theory(){
  app().innerHTML = `<div class="view"><h1>📖 Teoría</h1><p class="sub">Para consultas puntuales: busca un concepto o entra al módulo</p>
  <input class="search" id="tsearch" placeholder="🔍 Buscar concepto (p. ej. «dropout», «Pearson», «entropía»)..." oninput="tSearch(this.value)">
  <div id="tres"></div>
  <div id="tmods">${Object.keys(MODS).map(m=>
    '<button class="mode" style="width:100%;margin-bottom:10px" onclick="openTheory(\''+m+'\')"><h3 style="color:'+MOD_COLORS[m]+'">'+MODS[m]+'</h3><p>'+QUESTIONS.filter(q=>q.m===m).length+' preguntas asociadas</p></button>').join("")}</div></div>`;
}
function tSearch(v){
  const res=document.getElementById("tres"), mods=document.getElementById("tmods");
  v=v.trim().toLowerCase();
  if(v.length<3){ res.innerHTML=""; mods.style.display=""; return; }
  mods.style.display="none";
  let out="";
  for(const m of Object.keys(MODS)){
    const txt=stripTags(THEORY[m]); const low=txt.toLowerCase();
    let pos=low.indexOf(v), hits=0, snips="";
    while(pos>=0 && hits<2){
      const s=Math.max(0,pos-55), e=Math.min(txt.length,pos+v.length+75);
      snips += '<div class="snip">…'+esc(txt.slice(s,pos))+'<mark>'+esc(txt.slice(pos,pos+v.length))+'</mark>'+esc(txt.slice(pos+v.length,e))+'…</div>';
      hits++; pos=low.indexOf(v,pos+1);
    }
    if(hits) out += '<button class="mode" style="width:100%;margin-bottom:10px" onclick="openTheory(\''+m+'\',\''+esc(v).replace(/'/g,"")+'\')"><h3 style="color:'+MOD_COLORS[m]+'">'+MODS[m]+'</h3>'+snips+'</button>';
  }
  res.innerHTML = out || '<div class="card muted">Sin resultados para «'+esc(v)+'». Prueba con otra palabra.</div>';
}
function openTheory(m, hl){
  currentTab="theory"; renderNav(); scrollTop();
  let html=THEORY[m]; let i=0; const tocs=[];
  html = html.replace(/<h3>([\s\S]*?)<\/h3>/g, (mm,txt)=>{ const id="th"+(i++); tocs.push({id,txt:stripTags(txt)}); return '<h3 id="'+id+'">'+txt+'</h3>'; });
  if(hl && hl.length>=3){
    try{ const re=new RegExp("(?![^<]*>)("+hl.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"); html=html.replace(re,"<mark>$1</mark>"); }catch(e){}
  }
  app().innerHTML = `<div class="view">
  <div class="row"><button class="btn sm ghost" onclick="theory()">← Teoría</button><span class="pill acc">${MODS[m]}</span></div>
  <div class="toc">${tocs.map(t=>'<button onclick="document.getElementById(\''+t.id+'\').scrollIntoView({behavior:\'smooth\'})">'+esc(t.txt.length>34?t.txt.slice(0,34)+"…":t.txt)+'</button>').join("")}</div>
  <div class="card theory">${html}</div>
  <div class="row" style="margin-bottom:20px">
    <button class="btn" onclick="startQuiz(QUESTIONS.filter(q=>q.m==='${m}'),'${MODS[m]}')">✏️ Practicar ${MODS_SHORT[m]}</button>
    <button class="btn ghost" onclick="flashStart('${m}',false,true)">🃏 Tarjetas</button>
  </div></div>`;
}

/* ================== PROGRESO ================== */
function progress(){
  const per=moduleProgress(); const hist=examHistory(); const s=qstats(); const sr=qsrs();
  const totOk=Object.values(s).reduce((a,e)=>a+e.ok,0);
  const totBad=Object.values(s).reduce((a,e)=>a+e.bad,0);
  const mast=masteredCount();
  const xp=store.get("xp",0);
  const modMastery = Object.keys(MODS).map(m=>{
    const qs=QUESTIONS.filter(q=>q.m===m);
    const sum=qs.reduce((a,q)=>a+((sr[q.id]&&sr[q.id].b)||0),0);
    return {m, pct: Math.round(100*sum/(qs.length*4))};
  });
  app().innerHTML = `<div class="view"><h1>📈 Progreso</h1><p class="sub">Tu mapa hacia el 17 de junio</p>
  <div class="card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    ${ring(mast/QUESTIONS.length, Math.round(100*mast/QUESTIONS.length)+"%", "dominado")}
    <div style="flex:1;min-width:160px">
      <div class="stat"><span class="muted">🔥 Racha</span><b>${streak().n} día${streak().n===1?"":"s"}</b></div>
      <div class="stat"><span class="muted">⭐ XP total</span><b>${xp}</b></div>
      <div class="stat"><span class="muted">🎯 Acierto global</span><b class="${totOk+totBad&&totOk/(totOk+totBad)>=0.7?"ok-t":"warn-t"}">${totOk+totBad?Math.round(100*totOk/(totOk+totBad)):0} %</b></div>
      <div class="stat"><span class="muted">🔁 Fallos pendientes</span><b class="${failedIds().length?"bad-t":"ok-t"}">${failedIds().length}</b></div>
    </div>
  </div>
  <div class="card"><h3>Dominio por módulo</h3><p class="muted" style="font-size:12px;margin:2px 0 8px">Basado en las cajas de repetición espaciada (no solo aciertos)</p>
  ${modMastery.map(x=>'<div class="mb"><div class="lbl"><span style="color:'+MOD_COLORS[x.m]+'">'+MODS[x.m]+'</span><span>'+x.pct+' %</span></div><div class="mini"><i style="width:'+x.pct+'%;background:'+MOD_COLORS[x.m]+'"></i></div></div>').join("")}</div>
  <div class="card"><h3>Acierto por módulo</h3>${Object.keys(MODS).map(m=>{
    const p=per[m]; const n=p.ok+p.bad; const pct=n?Math.round(100*p.ok/n):0;
    return '<div class="mb"><div class="lbl"><span style="color:'+MOD_COLORS[m]+'">'+MODS[m]+'</span><span>'+(n?pct+' % ('+n+')':"sin datos")+'</span></div><div class="mini"><i style="width:'+pct+'%;background:'+(pct>=70?"var(--ok)":pct>=50?"var(--warn)":"var(--bad)")+'"></i></div></div>';
  }).join("")}</div>
  ${hist.length?'<div class="card"><h3>Evolución en simulacros</h3><div style="display:flex;align-items:flex-end;gap:8px;height:90px;padding:6px 0">'+hist.slice(-10).map(h=>'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;max-width:38px;height:'+Math.max(4,h.nota*8)+'px;background:'+(h.nota>=5?"var(--ok)":"var(--bad)")+';border-radius:6px 6px 0 0;opacity:.9"></div><span style="font-size:10px" class="muted">'+h.nota.toFixed(1)+'</span></div>').join("")+'</div></div>':""}
  <div class="card"><h3>Mantenimiento</h3><div class="row">
    <button class="btn sm warn" onclick="if(confirm('¿Reiniciar fallos pendientes?')){const s=qstats();for(const k in s)s[k].last=1;store.set('qstats',s);toast('Fallos reiniciados');progress();}">Reiniciar fallos</button>
    <button class="btn sm bad" onclick="if(confirm('¿Borrar TODO el progreso?')){localStorage.clear();toast('Progreso borrado');location.reload();}">Borrar todo</button>
  </div></div></div>`;
  updateTop();
}

/* ================== TECLADO ================== */
document.addEventListener("keydown",function(ev){
  if(ev.target.tagName==="INPUT") return;
  const k=ev.key;
  // quiz / sesión
  if(document.getElementById("feed")){
    if(!Q.answered && ["1","2","3"].includes(k)){
      const btn=document.querySelector('.opt[data-k="'+(parseInt(k)-1)+'"]'); if(btn&&!btn.disabled){btn.click();ev.preventDefault();return;}
    }
    if(Q.answered && (k==="Enter"||k===" ")){ const nb=document.getElementById("nextbtn"); if(nb){nb.click();ev.preventDefault();return;} }
  }
  // simulacro
  if(examTimer){
    if(["1","2","3"].includes(k)){ const q=eQs[eIdx]; if(q){ eSelect(q._ord[parseInt(k)-1]); ev.preventDefault(); } }
    else if(k==="ArrowRight"||k==="Enter"){ eNav(1); ev.preventDefault(); }
    else if(k==="ArrowLeft"){ eNav(-1); ev.preventDefault(); }
  }
  // flashcards
  if(fQueue.length&&fIdx<fQueue.length&&document.querySelector(".fcard")){
    if(k===" "){ fFlip(); ev.preventDefault(); }
    else if(fShown&&["1","2","3"].includes(k)){ fGrade(parseInt(k)-1); ev.preventDefault(); }
  }
});

/* ================== ARRANQUE ================== */
renderNav();
updateTop();
home();

</script>
</body>
