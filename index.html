q128:{c:1,o:[
 "para promediar el ruido visual de los fotogramas y estabilizar la entrada que recibe la red",
 "porque un solo fotograma no permite deducir el movimiento: velocidad y dirección de los objetos",
 "para procesar en paralelo cuatro partidas distintas y así acelerar el entrenamiento del agente"],
e:"Un fotograma congelado de Pong no dice hacia dónde va la pelota ni a qué velocidad: el estado real del juego incluye el MOVIMIENTO, que solo emerge comparando imágenes consecutivas. Apilar los 4 últimos frames como canales de entrada da a la red la información temporal mínima para inferirlo. Es además un parche a la observabilidad parcial: convierte una observación incompleta en algo más parecido a un estado completo.",
w:{0:"No se promedian (perdería el movimiento, justo lo que se busca): se apilan como canales separados para que la red COMPARE fotogramas.",
   2:"Las 4 imágenes son consecutivas de la MISMA partida; no hay paralelismo de partidas en la entrada de DQN."}},
q29:{c:1,o:[
 "transforma cualquier entrada real en un valor del intervalo (−1,1) centrado en el cero",
 "restringe la salida al intervalo (0,1), lo que permite interpretarla como una probabilidad",
 "anula las entradas negativas y deja pasar las positivas sin acotarlas superiormente"],
e:"La sigmoide comprime toda la recta real al intervalo (0,1): x→+∞ da valores que tienden a 1, x→−∞ tiende a 0, y σ(0)=0.5. Por eso es el puente entre una combinación lineal (β₀+β₁x, que da cualquier real) y una probabilidad: es el corazón de la regresión logística. Además es suave y derivable, lo que la hace entrenable por gradiente (aunque se satura en los extremos).",
w:{0:"El rango (−1,1) centrado en cero es la TANGENTE HIPERBÓLICA (tanh), su prima; la sigmoide vive en (0,1).",
   2:"Anular negativos y no acotar positivos es ReLU = max(0,x), la activación estrella de las capas ocultas profundas."}},
q86:{c:1,o:[
 "la CNN desde cero empleaba una arquitectura más profunda y resultó más difícil de optimizar",
 "EfficientNetB0 llegó preentrenado con un conjunto enorme (ImageNet) y transfiere características visuales generales",
 "el modelo con transfer learning ya había visto las imágenes del test durante su preentrenamiento"],
e:"Con pocas imágenes propias, una CNN desde cero tiene que aprenderlo TODO (qué es un borde, una textura, una forma) a partir de casi nada, y sobreajusta. EfficientNetB0 ya aprendió esas representaciones visuales generales sobre millones de imágenes de ImageNet; el nuevo problema solo necesita reaprender la capa final. Es la receta estándar con datasets pequeños: +20 puntos de test en la PEC4 (≈64%→≈84%).",
w:{0:"Era al revés (la red preentrenada es mucho más profunda que la CNN básica) y aun así ganó: la profundidad no fue el problema, sino la falta de datos para entrenar desde cero.",
   2:"ImageNet no contiene las imágenes del test del problema (sería data leakage); lo que se transfiere son representaciones generales, no ejemplos memorizados."}},
q14:{c:1,o:[
 "penaliza los errores grandes con mucha más dureza que el MSE al elevarlos al cuadrado",
 "se expresa en las mismas unidades que la variable predicha, siendo más fácil de interpretar",
 "resulta menos sensible que el MSE a los valores atípicos presentes en el conjunto de prueba"],
e:"RMSE = √MSE: deshace el cuadrado y devuelve el error a las unidades originales — si predices precios, un RMSE de 12.000 € se entiende al instante; un MSE de 144.000.000 €² no. Ojo: como es una transformación monótona del MSE, AMBOS ordenan los modelos igual y comparten la misma sensibilidad a errores grandes; la ventaja del RMSE es puramente de interpretabilidad.",
w:{0:"El cuadrado lo aplican LOS DOS (el RMSE es la raíz del MSE): penalizan los errores grandes exactamente igual en términos relativos.",
   2:"Misma base cuadrática = misma sensibilidad a outliers. El insensible a outliers de la familia es el MAE (valor absoluto)."}},
q66:{c:0,o:[
 "el conjunto de entrenamiento contiene muestras mal etiquetadas o valores atípicos (outliers)",
 "los clasificadores base son muy sesgados y se necesita reducir ese sesgo al combinarlos",
 "se quiere que cada clasificador se especialice en los ejemplos más difíciles del conjunto"],
e:"Con el muestreo bootstrap, cada outlier cae solo en ALGUNOS subconjuntos: la mayoría de los clasificadores ni lo ven, y la votación final diluye su influencia. Por eso el bagging es la opción robusta ante etiquetas ruidosas. El contraste clave: el boosting hace lo contrario — al fallar el outlier le sube el peso una y otra vez y acaba obsesionado con el ruido.",
w:{1:"Reducir el SESGO combinando clasificadores débiles es la especialidad del boosting; el bagging reduce sobre todo la VARIANZA.",
   2:"Especializarse en los ejemplos difíciles es la definición del boosting (pesos adaptativos); en bagging los clasificadores son independientes y ciegos entre sí."}},
q116:{c:0,o:[
 "explore mucho al principio y explote cada vez más lo aprendido a medida que avanza",
 "explote al principio para asegurar recompensas tempranas y explore más hacia el final",
 "mantenga una proporción fija de exploración y explotación durante todo el proceso"],
e:"Lógica del decay: al principio el agente no sabe nada — explorar (ε alto, cercano a 1) es barato y muy informativo. Conforme la tabla Q se llena de buenas estimaciones, lo rentable es explotarlas (ε bajo). Reducir ε progresivamente recorre ese camino. La pauta inversa sería absurda: explotarías una política ignorante y explorarías cuando ya sabes lo que funciona.",
w:{1:"Al inicio no hay nada que explotar (los valores Q son cero o aleatorios): asegurar recompensas tempranas con una política ignorante no asegura nada.",
   2:"Un ε constante es la ε-greedy básica sin decay: funciona, pero desperdicia exploración tardía cuando ya apenas aporta información nueva."}},
q59:{c:1,o:[
 "sustituye la maximización del margen por la minimización directa del error cuadrático medio",
 "su función de coste ignora los puntos que caen dentro de una banda de anchura ε en torno a la predicción",
 "renuncia a los vectores de soporte y utiliza todos los puntos para definir la función de regresión"],
e:"El SVR traslada la filosofía SVM a la regresión: sigue minimizando ‖w‖ (suavidad/margen), pero la restricción pasa a ser |yᵢ−(wxᵢ+b)| ≤ ε — un «tubo» de tolerancia alrededor de la función. Los puntos DENTRO del tubo no cuentan error ninguno; solo los de fuera (con sus ξ y el precio C) y los del borde definen el modelo: esos son sus vectores de soporte. Y sí, admite kernels igual que la SVM.",
w:{0:"Conserva la maximización del margen (min ‖w‖): si pasara a minimizar el MSE sería una regresión regularizada tipo ridge, no un SVR.",
   2:"Al contrario: igual que la SVM, el SVR depende SOLO de un subconjunto (los puntos fuera o en el borde del tubo); los de dentro son invisibles para el coste."}},
q60:{c:1,o:[
 "softmax, con las salidas normalizadas para que sumen uno",
 "lineal (g(z)=z), capaz de devolver cualquier número real sin acotar",
 "ReLU, que garantiza predicciones positivas y un entrenamiento más estable"],
e:"Una regresión debe poder predecir cualquier valor real (un precio alto, una temperatura negativa): la activación lineal g(z)=z en la salida no impone ningún límite. Si la salida está acotada por naturaleza (p. ej., un porcentaje), puede usarse una sigmoide reescalada. El coste habitual es el MSE — que en redes, a diferencia de la regresión lineal, ya NO es convexo.",
w:{0:"Softmax produce una distribución de probabilidad sobre clases: es la salida del problema de CLASIFICACIÓN multiclase, sin sentido para predecir un número.",
   2:"ReLU anularía cualquier predicción negativa (¿temperatura de −5º?: imposible) y no aporta nada en la salida; su sitio son las capas ocultas."}},
q85:{c:0,o:[
 "usar una tasa de aprendizaje baja (p. ej. 0.0001) para ajustar sin destruir los pesos preentrenados",
 "volver a congelar la cabeza de clasificación mientras se entrenan las capas base descongeladas",
 "reiniciar el optimizador con una tasa alta para escapar de los mínimos locales heredados del preentrenamiento"],
e:"En el fine-tuning las capas descongeladas ya contienen pesos VALIOSOS: la tasa de aprendizaje baja (≈10× menor que la inicial) los ajusta con delicadeza al nuevo dominio sin borrarlos. Una tasa normal o alta provocaría gradientes que arrasan el conocimiento preentrenado (catastrophic forgetting), dejándote peor que al principio. Secuencia completa: congelar base → entrenar cabeza → descongelar (parte de la) base → reentrenar todo con LR baja.",
w:{1:"La cabeza sigue entrenándose siempre (es la parte específica de tu problema); lo que se gestiona con congelar/descongelar son las capas BASE.",
   2:"Los mínimos del preentrenamiento son justamente lo que quieres CONSERVAR: una tasa alta no te «libera» de ellos, te destruye lo aprendido."}},
q79:{c:1,o:[
 "sintetizar imágenes nuevas mediante un modelo generativo entrenado sobre el mismo conjunto",
 "generar variaciones de las imágenes existentes (giros, recortes, zoom…) para ampliar el conjunto y reducir el sobreajuste",
 "duplicar las imágenes que el modelo clasifica mal para que les preste más atención al reentrenar"],
e:"El data augmentation aplica transformaciones que NO cambian la etiqueta (rotaciones, volteos, recortes, zoom, cambios de brillo…) para fabricar variantes gratis de cada imagen. El modelo ve más diversidad, aprende que «un zapato girado sigue siendo un zapato» (invariancias) y le cuesta más memorizar ejemplos concretos → menos overfitting. Es la primera arma con datasets pequeños, antes incluso que tocar la arquitectura.",
w:{0:"Generar imágenes con un modelo generativo (GAN, difusión) es una técnica distinta y mucho más pesada; el augmentation clásico solo TRANSFORMA las existentes.",
   2:"Repetir los ejemplos difíciles recuerda al boosting y además invita a memorizarlos (más sobreajuste, no menos); el augmentation amplía variedad, no copias."}},
q208:{c:0,o:[
 "una crítica (critiquing) que refina iterativamente la búsqueda a partir de un ítem de referencia",
 "una restricción dura que filtra el catálogo completo antes de generar recomendaciones",
 "una valoración implícita que actualiza el perfil colaborativo del usuario"],
e:"«Como esta pero más barata» tiene las dos señas del critiquing: parte de un ÍTEM DE REFERENCIA concreto y pide un cambio RELATIVO a él. El sistema (basado en casos) busca productos similares que satisfagan la crítica, y el usuario puede encadenar críticas hasta dar con lo que busca — ideal cuando no sabe formular requisitos absolutos de entrada.",
w:{1:"Una restricción es ABSOLUTA y previa («precio < 400 €»); aquí la condición es relativa a un ejemplo mostrado, que es lo característico de los casos.",
   2:"No hay matriz de valoraciones en juego: la frase expresa un requisito sobre atributos del producto, no un voto que alimente al colaborativo."}},
q33:{c:1,o:[
 "atributos numéricos continuos medidos en escalas distintas",
 "atributos nominales o binarios: cuenta en cuántos atributos difieren dos ejemplos",
 "vectores dispersos de alta dimensionalidad, como las representaciones de textos"],
e:"Hamming suma 1 por cada atributo en que dos ejemplos difieren y 0 si coinciden: una comparación de igualdad pura, perfecta para valores nominales (color: rojo/verde/azul) o binarios donde no existe noción de «cerca». Reparto típico: numéricos → euclidiana; nominales/binarios → Hamming; nominales en PLN → MVDM (más fina pero costosa).",
w:{0:"Con valores continuos casi nunca hay igualdad exacta: Hamming daría «todo diferente». Para numéricos, euclidiana (idealmente normalizando antes).",
   2:"Para textos y vectores dispersos lo habitual es la similitud coseno sobre tf-idf, que mide ángulo y no exige coincidencias exactas."}},
q105:{c:0,o:[
 "combinan varios paradigmas (colaborativo, contenido, conocimiento) para compensar las carencias de cada uno",
 "alternan aleatoriamente entre los distintos paradigmas para repartir la carga computacional del sistema",
 "aplican un mismo paradigma con distintos hiperparámetros y promedian las recomendaciones resultantes"],
e:"Cada familia explota una fuente y cojea de algo: el colaborativo sufre el cold start, el contenido se sobreespecializa, el conocimiento exige modelar el dominio. Los híbridos los COMBINAN (en paralelo ponderando resultados, en cascada, conmutando según la situación…) para cubrir los huecos: p. ej., conocimiento/contenido para usuarios nuevos + colaborativo cuando ya hay historial.",
w:{1:"La combinación responde a las fortalezas de cada método según la situación, no al azar ni al reparto de carga.",
   2:"Promediar variantes del mismo algoritmo sería un ensemble homogéneo; el híbrido mezcla PARADIGMAS distintos con fuentes de información distintas."}},
q19:{c:0,o:[
 "al incrementar el tamaño del conjunto de ejemplos, la esperanza del modelo tiende a la función real f",
 "produce exactamente las mismas predicciones en cada ejecución sobre los mismos datos de entrada",
 "alcanza error cero en el conjunto de entrenamiento a partir de un tamaño de muestra suficiente"],
e:"Consistencia es una propiedad ASINTÓTICA: con más y más datos, la esperanza del modelo aprendido converge a la función real f. Es la garantía de que «más datos → mejor aproximación». No confundir con sesgo cero (puedes no tener sesgo y aun así aproximar mal con pocos datos por culpa de la varianza): por eso sesgo y varianza se analizan juntos.",
w:{1:"Predecir siempre lo mismo es DETERMINISMO (ausencia de aleatoriedad en el algoritmo), una propiedad computacional sin relación con aproximar bien f.",
   2:"Error cero en entrenamiento es más bien una señal de SOBREAJUSTE; la consistencia habla de acercarse a la función real, no de clavar la muestra."}},
q117:{c:1,o:[
 "dispone de la matriz completa de transiciones del entorno y planifica directamente sobre ella",
 "aprende únicamente de las interacciones con el entorno, sin una descripción completa de su funcionamiento",
 "construye una copia interna del entorno y simula episodios sobre ella antes de actuar en el real"],
e:"Model-free = aprender a base de golpes: el agente actúa, observa (s′, r) y actualiza sus valores, sin conocer ni estimar las probabilidades de transición del entorno. SARSA, Q-learning y DQN son de esta familia. Los métodos CON modelo (programación dinámica, planificación) usan la descripción completa del entorno — más eficientes si existe, pero en problemas reales casi nunca está disponible.",
w:{0:"Disponer de las transiciones y planificar sobre ellas es la definición de los métodos BASADOS EN MODELO (p. ej., programación dinámica).",
   2:"Aprender un modelo interno y simular con él (estilo Dyna) también es trabajar CON modelo, aunque sea aprendido: lo model-free prescinde de él por completo."}},
q63:{c:0,o:[
 "cada clasificador aporta un vector de probabilidades por clase y la decisión se toma promediándolos",
 "cada clasificador emite un único voto y la clase final se decide por mayoría simple",
 "los clasificadores votan por turnos y el recuento se detiene al alcanzarse mayoría absoluta"],
e:"Soft voting trabaja con CONFIANZAS: suma o promedia las probabilidades que cada clasificador asigna a cada clase y elige el argmax. Aprovecha información que el hard voting tira: un clasificador seguro al 95 % pesa más que tres dudosos al 51 %. Admite además pesos por clasificador. Requisito: que los modelos base produzcan probabilidades (o algo parecido).",
w:{1:"Un voto por clasificador y mayoría simple es exactamente el HARD voting (majority voting), no el soft.",
   2:"No existe recuento por turnos con parada: todos los clasificadores contribuyen siempre, sea con votos (hard) o con probabilidades (soft)."}},
q36:{c:1,o:[
 "la varianza: premia las particiones cuyos subconjuntos tienen valores de salida homogéneos",
 "la entropía: penaliza con más fuerza las particiones que dejan los conjuntos mezclados",
 "el índice de Gini: mide la probabilidad de clasificar mal un ejemplo elegido al azar"],
e:"ID3 elige el atributo de mayor ganancia de información G(S,a) = H(S) − Σ p(v)·H(Sᵥ), donde H es la ENTROPÍA (−Σp·log₂p): 0 en conjuntos puros, máxima (1 en binario) en el 50/50. Frente a la bondad básica (% bien clasificados), la entropía castiga más los conjuntos mezclados. Cada criterio con su árbol: entropía → ID3 (clasificación); varianza → árboles de regresión; Gini → CART (existe, pero no es ID3).",
w:{0:"La varianza de y es el criterio de los árboles de REGRESIÓN (salida continua); ID3 clasifica y necesita medir mezcla de clases.",
   2:"El índice de Gini es un criterio real… del algoritmo CART (el de scikit-learn por defecto); ID3 se define con entropía. Distractor clásico de examen."}},
q114:{c:0,o:[
 "el conjunto de criterios con los que decide qué acción ejecutar dado el estado actual",
 "la estimación del valor esperado a largo plazo de cada uno de los estados del entorno",
 "la secuencia completa de acciones y estados que recorre durante un episodio entero"],
e:"La política π es el «cerebro de decisión»: una función estado → acción (determinista o probabilística). Todo el RL se resume en encontrar la π* que maximiza la recompensa acumulada G. Glosario para no mezclarse: π = cómo actúo; V(s)/Q(s,a) = cuánto vale estar aquí / hacer esto aquí; τ (trayectoria/episodio) = lo que pasó de principio a fin.",
w:{1:"El valor esperado de cada estado es la función de VALOR V(s) — herramienta para evaluar y mejorar la política, pero no la política misma.",
   2:"La secuencia completa de un episodio es la TRAYECTORIA τ: el registro de lo ocurrido, no el criterio de decisión."}},
q20:{c:1,o:[
 "las muestras consecutivas guardan una dependencia temporal que el modelo puede aprovechar al entrenar",
 "cada muestra es independiente del resto y entrenamiento y prueba siguen la misma distribución",
 "los atributos de cada muestra quedan incorrelados entre sí después de aplicar la normalización"],
e:"i.i.d. tiene dos mitades: INDEPENDIENTES (una muestra no influye en otra) e IDÉNTICAMENTE DISTRIBUIDAS (todas vienen del mismo proceso generador, en particular train y test). Es el supuesto que legitima todo lo demás: minimizar el error de entrenamiento solo garantiza generalizar si el test «se parece estadísticamente» al train. Cuando se viola (series temporales, datos por usuario), hay que partir los datos con cuidado.",
w:{0:"La dependencia entre muestras consecutivas es la VIOLACIÓN típica del supuesto (series temporales), no su contenido.",
   2:"i.i.d. habla de la relación ENTRE MUESTRAS, no entre atributos de una misma muestra (eso sería incorrelación de variables, otro asunto)."}},
q149:{c:0,o:[
 "el promedio de dos valores consecutivos (sin repetidos) que maximiza la bondad de la partición",
 "la mediana del atributo, que reparte los ejemplos en dos mitades del mismo tamaño",
 "el valor que iguala la entropía de los dos subconjuntos generados por la división"],
e:"Receta del módulo: ordenar los valores del atributo, eliminar repetidos, generar como candidatos el promedio de cada par consecutivo, evaluar la bondad de cada candidato y quedarse con el mejor (en el ejemplo del módulo: corte 5.35 con bondad 66.7 %). El corte óptimo se ELIGE por calidad de la partición, no por ninguna regla fija de posición.",
w:{1:"La mediana equilibra TAMAÑOS, pero el objetivo es separar CLASES: el mejor corte puede dejar grupos muy desiguales si separa bien.",
   2:"No se busca igualar entropías, sino minimizar la entropía ponderada resultante (máxima ganancia); igualarlas no garantiza nada bueno."}},
q188:{c:0,o:[
 "un mismo detector de características se aplica en todas las posiciones de la imagen (invariancia a traslación)",
 "cada región de la imagen aprende un filtro propio adaptado a su contenido local específico",
 "los filtros de una capa comparten sus pesos con los de la capa siguiente para ahorrar memoria"],
e:"El mismo filtro (sus pesos y su sesgo) se desliza por TODA la imagen: si aprendió a detectar un borde vertical, lo detecta esté donde esté (equivariancia/invariancia a traslación). Doble dividendo: tiene sentido visual (un gato en la esquina sigue siendo un gato) y desploma el número de parámetros (un filtro 5×5 son ~26 pesos, se aplique a una imagen de 32×32 o de 1024×1024) → menos sobreajuste, menos datos necesarios.",
w:{1:"Un filtro por región es justo lo que la compartición EVITA: multiplicaría los parámetros y la red no generalizaría entre posiciones.",
   2:"La compartición es DENTRO de cada capa, a lo largo de las posiciones espaciales; capas distintas tienen filtros distintos (y deben tenerlos)."}},
q23:{c:1,o:[
 "todas las clases tienen el mismo número de ejemplos y conviene resaltar los errores absolutos",
 "las clases están desbalanceadas y queremos ver el rendimiento por clase sin que su tamaño distorsione",
 "se necesita conocer la exactitud global del modelo de un solo vistazo y sin cálculos"],
e:"Normalizar por filas convierte los conteos en porcentajes POR CLASE: cada fila dice «de los ejemplos reales de esta clase, qué fracción fue a parar a cada predicción». Con clases desbalanceadas, los números absolutos engañan (la clase de 1000 ejemplos siempre «pesa» más que la de 20); normalizado, ves al instante que el modelo acierta el 95 % de la mayoritaria pero solo el 40 % de la minoritaria.",
w:{0:"Con clases del mismo tamaño la normalización apenas cambia la lectura: su valor aparece precisamente cuando los tamaños difieren.",
   2:"La exactitud global es UN número agregado; la matriz (normalizada o no) sirve para lo contrario: desagregar el rendimiento clase a clase."}},
q3:{c:1,o:[
 "la selección crea atributos nuevos a partir de los originales y la extracción elige un subconjunto de ellos",
 "la extracción puede crear atributos nuevos combinando los originales y la selección solo elige un subconjunto",
 "la selección se aplica antes de entrenar el modelo y la extracción únicamente después de entrenarlo"],
e:"SELECCIÓN: de los atributos {altura, peso, edad, color} me quedo con {altura, peso} — los originales, intactos. EXTRACCIÓN: fabrico atributos nuevos como 0.7·altura+0.3·peso (combinaciones), proyectando a un espacio distinto — es lo que hacen PCA y LDA. Mnemónico: ex-tracción = ex-trae algo NUEVO de los datos; se-lección = se-para un subconjunto.",
w:{0:"Es la definición invertida: quien CREA es la extracción; quien ELIGE entre los existentes es la selección.",
   2:"Ambas son técnicas de PREPROCESO, aplicadas antes del entrenamiento; el orden temporal no las distingue."}},
q185:{c:0,o:[
 "rellenar los bordes de la entrada para controlar el tamaño de salida y que los píxeles del borde participen más",
 "espaciar las posiciones donde se aplica el filtro, saltando píxeles para reducir el coste de la convolución",
 "agrupar los canales de la entrada en bloques independientes que se procesan por separado"],
e:"Sin padding, cada convolución encoge la salida ((n−f)/s+1) y los píxeles del borde entran en pocas ventanas (se «desaprovechan»). El padding añade un marco (típicamente de ceros): con p=(f−1)/2 y s=1 («same») la salida conserva el tamaño de la entrada, lo que permite apilar muchas capas sin que la imagen desaparezca. Fórmula completa: (n+2p−f)/s+1.",
w:{1:"Saltar posiciones al deslizar el filtro es el STRIDE (s): el otro mando de la convolución, con efecto contrario (reduce la salida).",
   2:"Procesar canales por grupos existe (group convolutions), pero no tiene nada que ver con el padding, que actúa sobre los bordes espaciales."}},
q97:{c:0,o:[
 "hay muchos más usuarios que ítems y comparar todos los usuarios resulta computacionalmente prohibitivo",
 "el catálogo de ítems crece tan deprisa que las similitudes deben recalcularse en cada visita",
 "los usuarios valoran tan pocos ítems que únicamente las filas de la matriz resultan comparables"],
e:"Escenario típico: millones de usuarios, miles de ítems. Buscar los vecinos de un usuario exige comparar contra millones de filas EN TIEMPO REAL (inviable); las similitudes ítem-ítem son solo miles×miles, más estables en el tiempo y precomputables offline. Por eso Amazon popularizó el ítem-ítem. Regla: compara siempre en la dimensión PEQUEÑA y estable de la matriz.",
w:{1:"Es al revés: el enfoque por ítems funciona porque el catálogo es relativamente pequeño y ESTABLE, lo que permite precalcular similitudes.",
   2:"La dispersión afecta a filas y columnas por igual; además, si solo las filas fueran comparables, eso favorecería el método por USUARIOS, no por ítems."}},
q224:{c:0,o:[
 "porque el número de estados (~10¹⁷⁰) hace imposible almacenar la tabla y llenarla en un tiempo razonable",
 "porque las acciones del Go forman un espacio continuo que no puede discretizarse en columnas",
 "porque sus recompensas son tan densas que la tabla cambiaría por completo en cada jugada"],
e:"El Go tiene ≈2·10¹⁷⁰ estados válidos — más que átomos tiene el universo (~10⁸⁰). Una tabla con una fila por estado ni cabe en ninguna memoria ni podría visitarse lo suficiente para estimar sus valores: doble muerte (espacio y tiempo). La salida es aproximar Q con una RED NEURONAL que generalice entre estados parecidos (DQN y sucesores como AlphaGo).",
w:{1:"Las acciones del Go son perfectamente discretas (colocar una piedra en una intersección del tablero): el problema está en los ESTADOS.",
   2:"Las recompensas del Go son lo contrario: dispersísimas (solo al final: victoria o derrota). Y la frecuencia de recompensa no afecta al tamaño de la tabla."}},
q147:{c:0,o:[
 "está muy mezclado: el reparto 4/7 frente a 3/7 queda cerca del 50/50 de desorden máximo",
 "está prácticamente puro: casi todos los ejemplos pertenecen ya a la misma clase",
 "contiene ruido de etiquetado: con datos limpios la entropía binaria no supera el valor 0.5"],
e:"Lee la entropía como un «medidor de mezcla»: H=0 → conjunto puro (una sola clase); H=1 (máximo binario) → 50/50 perfecto. Con 4 edible y 3 poisonous el reparto es 57 %/43 %, casi mitad y mitad → H=0.985, rozando el máximo. En árboles de decisión esto significa: este nodo aún no separa nada, hace falta seguir particionando.",
w:{1:"Un conjunto casi puro tendría H cercana a 0, el extremo opuesto de la escala.",
   2:"La entropía no detecta ruido ni tiene techo en 0.5: mide composición de clases, y cualquier conjunto equilibrado roza 1 por limpio que esté."}},
q107:{c:1,o:[
 "reproduce las recomendaciones ante un panel de usuarios reales que las valoran en tiempo real",
 "divide las valoraciones en entrenamiento y test, usando métricas de clasificación o de regresión según el caso",
 "calcula qué fracción del catálogo llega a recomendarse alguna vez a lo largo del tiempo"],
e:"La evaluación offline reutiliza el esquema del aprendizaje supervisado: se OCULTA parte de las valoraciones conocidas (test), se predicen con el resto (train) y se mide el acierto — con MAE/RMSE si se predicen puntuaciones, o precisión/recall si se evalúa el top-N recomendado. Barata y reproducible; su límite es que no mide el efecto real sobre usuarios (para eso, estudios online/test A/B).",
w:{0:"Los paneles de usuarios reales son la evaluación ONLINE (estudios con usuarios, test A/B): más fiel pero cara — la histórica existe para evitarla en fases tempranas.",
   2:"Esa métrica es la COBERTURA: complementaria e interesante, pero no define la evaluación con datos históricos."}},
q101:{c:1,o:[
 "los términos muy frecuentes en toda la colección, por ser los más representativos del dominio",
 "los términos frecuentes en un documento concreto pero poco frecuentes en el conjunto de la colección",
 "los términos que aparecen una sola vez en la colección, por ser los más discriminativos posibles"],
e:"tf-idf multiplica dos factores: tf (frecuencia del término EN el documento: cuanto más aparece, más caracteriza ese documento) × idf (rareza EN la colección: penaliza lo que aparece en todas partes). Resultado: «mucho aquí + raro en general» = palabra clave del documento. Las palabras omnipresentes («el», «de», «sistema») puntúan ≈0 por su idf; así el perfil de contenido captura lo distintivo.",
w:{0:"Lo frecuente en TODA la colección es precisamente lo que el idf machaca: si está en todos los documentos, no distingue a ninguno.",
   2:"Una única aparición da el tf mínimo posible: rareza sin frecuencia local tampoco caracteriza al documento (suele ser ruido o erratas)."}},
q45:{c:0,o:[
 "optimización cuadrática convexa, con una única solución global garantizada",
 "optimización no convexa cuyo resultado depende de la inicialización de los pesos",
 "búsqueda voraz que incorpora vectores de soporte de uno en uno hasta converger"],
e:"Maximizar el margen se formula como minimizar ‖w‖ sujeto a que cada ejemplo quede del lado correcto: un problema CUADRÁTICO (objetivo) con restricciones lineales → CONVEXO → un único mínimo global, sin depender de inicializaciones ni de suerte. Es una de las grandes bazas teóricas de la SVM frente a las redes neuronales, cuyo paisaje de optimización está lleno de mínimos locales.",
w:{1:"La no convexidad con dependencia de la inicialización es el mundo de las REDES NEURONALES; la SVM se libra de él por diseño.",
   2:"Los vectores de soporte no se eligen uno a uno: EMERGEN de la solución del problema de optimización (los puntos con α≠0)."}},
q6:{c:1,o:[
 "es no supervisado y busca las direcciones de máxima varianza global de los datos",
 "es supervisado: usa las etiquetas para maximizar la dispersión interclase y minimizar la intraclase",
 "necesita que las clases estén balanceadas para poder calcular las matrices de dispersión"],
e:"LDA (Fisher) mira las ETIQUETAS y optimiza un cociente: separar los centros de las clases (dispersión interclase, arriba) mientras compacta cada clase (dispersión intraclase, abajo). PCA ignora las clases y solo persigue varianza global — puede incluso elegir una dirección que MEZCLE las clases si es la de mayor varianza. Si el objetivo final es clasificar, LDA suele proyectar mejor.",
w:{0:"No supervisado + máxima varianza es la ficha de PCA: la opción describe exactamente al rival de la comparación.",
   2:"LDA calcula medias y dispersiones POR CLASE, balanceadas o no: el desbalanceo no lo invalida (aunque influya en las estimaciones)."}},
q225:{c:0,o:[
 "guardar transiciones (s,a,r,s′) en una memoria y entrenar con mini-lotes muestreados al azar de ella",
 "repetir los episodios de mayor recompensa acumulada para reforzar las mejores trayectorias halladas",
 "sincronizar las dos redes copiando los pesos de la principal a la objetivo tras cada mini-lote"],
e:"El agente va llenando un gran buffer con sus transiciones (s,a,r,s′); para entrenar, se extraen MINI-LOTES AL AZAR de esa memoria. Dos beneficios: rompe la correlación temporal de las muestras consecutivas (el gradiente quiere datos ~i.i.d.) y reutiliza cada experiencia muchas veces (eficiencia de datos). El muestreo del replay clásico es uniforme: no favorece trayectorias «buenas».",
w:{1:"Priorizar las mejores trayectorias se parece al prioritized replay (variante posterior, y prioriza por error, no por recompensa); el replay de DQN muestrea UNIFORME.",
   2:"La sincronización de redes es el mecanismo de la TARGET network — y no ocurre tras cada mini-lote, sino cada N pasos."}},
q100:{c:1,o:[
 "explotan la matriz de valoraciones usuario-ítem buscando filas con patrones de puntuación similares",
 "usan características de los ítems y un perfil del usuario que pondera esas mismas características",
 "necesitan una comunidad amplia de usuarios para estimar con fiabilidad las similitudes entre perfiles"],
e:"El enfoque de contenido empareja DOS descripciones hechas con el mismo vocabulario: el ítem se describe por sus características (género, autor, términos tf-idf…) y el usuario por un perfil que pondera cuáles le gustan; se recomienda lo que mejor encaja con el perfil. Su superpoder: funciona con UN solo usuario y permite recomendar ítems recién llegados (basta su descripción) — inmune al cold start de ítem.",
w:{0:"Buscar filas (usuarios) con patrones similares en la matriz de valoraciones es el filtraje COLABORATIVO basado en usuarios.",
   2:"Necesitar comunidad es la servidumbre del colaborativo; el de contenido funciona aunque solo exista un usuario en el sistema."}},
q75:{c:1,o:[
 "modificar la métrica con la que se evalúa cada clasificador una vez terminado el entrenamiento",
 "variar los datos de entrenamiento: distintos subconjuntos de ejemplos o distintos subconjuntos de atributos",
 "entrenar el mismo modelo una única vez y conservar como variantes los estados de épocas intermedias"],
e:"Mismo algoritmo + datos distintos = modelos distintos: es el principio de toda la familia. Variando EJEMPLOS: bootstrap aleatorio (bagging) o ponderación adaptativa (boosting). Variando ATRIBUTOS: random subspaces (y stacking añade el meta-nivel). La otra gran vía de diversidad es combinar ALGORITMOS distintos sobre los mismos datos — diseño ad hoc según el problema.",
w:{0:"La métrica de evaluación se aplica DESPUÉS y no cambia nada de lo aprendido: con ella no fabricas clasificadores diferentes.",
   2:"Los estados intermedios de un mismo entrenamiento están fuertemente correlacionados entre sí: apenas aportan la diversidad que un ensemble necesita."}},
q26:{c:1,o:[
 "que las probabilidades a priori P(k) queden desequilibradas cuando hay clases minoritarias",
 "que una pareja atributo-valor no vista en entrenamiento dé P(xi|k)=0 y anule todo el producto",
 "que los atributos continuos saturen las colas de la densidad gaussiana en valores extremos"],
e:"Naive Bayes MULTIPLICA las P(xᵢ|k): basta UN factor a cero — una combinación atributo-valor que no apareció en el entrenamiento para esa clase — para aniquilar el producto entero, por prometedores que fueran los demás factores. El suavizado elimina los ceros sustituyéndolos por un valor pequeño (en el módulo, P(k)/n; la variante general es el suavizado de Laplace).",
w:{0:"El desbalanceo de P(k) es un problema REAL de Naive Bayes (tiende a la clase mayoritaria), pero no es lo que arregla el suavizado, que actúa sobre las condicionales.",
   2:"Las colas de la gaussiana dan probabilidades pequeñas pero NUNCA exactamente cero: no anulan el producto, que es el mal que el suavizado combate."}},
q27:{c:0,o:[
 "asumir que dentro de cada clase siguen una distribución gaussiana y aplicar su función de densidad",
 "transformarlos en rangos ordinales y compararlos mediante la distancia de Hamming",
 "estandarizarlos previamente para que la probabilidad condicional quede acotada entre 0 y 1"],
e:"Dos salidas dignas para los atributos continuos en Naive Bayes: (a) DISCRETIZAR en intervalos y tratarlos como categóricos, o (b) la elegante: asumir que dentro de cada clase el atributo es gaussiano, estimar su media μₖ y desviación σₖ con los datos de la clase, y usar la densidad normal como P(x=v|k). La opción (b) es el «Gaussian Naive Bayes» de las librerías.",
w:{1:"La distancia de Hamming pertenece a los métodos de DISTANCIAS (kNN); Naive Bayes trabaja con probabilidades, no compara ejemplos entre sí.",
   2:"Estandarizar cambia la escala pero no produce probabilidades: la densidad gaussiana ya se encarga de evaluar el valor, esté en la escala que esté."}},
q39:{c:1,o:[
 "reducir el coste de clasificar nuevos ejemplos acortando el camino medio de la raíz a las hojas",
 "evitar el sobreentrenamiento eliminando los nodos y hojas que cubren muy pocos ejemplos",
 "reequilibrar la estructura para que todas las hojas queden a la misma profundidad final"],
e:"Una hoja que cubre 2 ejemplos es una «regla» aprendida de una anécdota: estadísticamente nada fiable → sobreajuste puro. La poda lo corrige; la estrategia ganadora es construir el árbol COMPLETO y luego podar de las hojas hacia la raíz, fusionando nodos cuyo aporte no supera un umbral. (Parar pronto durante la construcción tiene una trampa: la mejora puede llegar justo un nivel después de donde paraste.)",
w:{0:"El árbol queda más pequeño y rápido, sí — pero como EFECTO COLATERAL; el objetivo que motiva la poda es la generalización.",
   2:"Los árboles de decisión no se balancean como un AVL: la profundidad desigual es natural (cada zona del espacio necesita más o menos preguntas)."}},
q175:{c:0,o:[
 "la normalización escala a [0,1]; la estandarización resta la media y divide por la desviación, y resiste mejor los outliers",
 "la estandarización acota los valores al rango [0,1] mientras la normalización los centra en media cero",
 "la normalización se aplica a atributos continuos y la estandarización únicamente a los categóricos"],
e:"NORMALIZACIÓN (min-max): (x−min)/(max−min) → comprime a [0,1] exacto; pero un solo outlier estira el min/max y aplasta al resto de valores. ESTANDARIZACIÓN (z-score): (x−μ)/σ → media 0 y desviación 1, sin rango fijo, y mucho más serena ante valores extremos. Si tu algoritmo exige entradas en [0,1] (algunas redes), min-max; si hay outliers, z-score.",
w:{1:"Tiene los nombres cruzados: quien acota a [0,1] es la normalización min-max; quien centra en media 0 es la estandarización.",
   2:"Ambas son transformaciones de atributos NUMÉRICOS; los categóricos se tratan con codificaciones (one-hot, ordinal), no con escalado."}},
q5:{c:0,o:[
 "los vectores propios de mayor valor propio de la matriz de covarianza de los datos",
 "las direcciones que maximizan la separación entre las distintas clases del conjunto",
 "los vectores propios de menor valor propio, que concentran el ruido residual de los datos"],
e:"Algoritmo PCA en cuatro pasos: centrar los datos (restar la media) → matriz de covarianza → descomposición en vectores/valores propios → quedarse con los D vectores de MAYOR valor propio como matriz de proyección. Cada valor propio mide la varianza en su dirección: te quedas con donde los datos «se mueven más», que es equivalente a minimizar el error cuadrático de reconstrucción.",
w:{1:"Separar clases exige etiquetas: es el objetivo de LDA. PCA ni sabe que existen clases — solo ve la nube de puntos y su varianza.",
   2:"Los de MENOR valor propio son justo lo que se DESCARTA (poca varianza ≈ ruido); conservarlos sería quedarse con la peor parte."}},
q108:{c:0,o:[
 "resta a cada valoración la media de su usuario antes de calcularla, quedando en el rango de −1 a 1",
 "pondera cada ítem por su popularidad para que los superventas no dominen las similitudes",
 "sustituye el producto escalar por la correlación de Pearson calculada entre los dos ítems"],
e:"El coseno simple tiene un punto ciego: ignora que cada usuario tiene su «nivel base» (el generoso que todo lo puntúa 4-5 vs. el duro de 1-3). La versión AJUSTADA primero centra cada valoración restando la media de SU usuario, y luego aplica el coseno: ahora un 4 del usuario duro vale más que un 4 del generoso. El rango pasa de [0,1] a [−1,1]. Es la medida estándar del filtraje ítem-ítem.",
w:{1:"No hay corrección por popularidad en el coseno ajustado: la normalización es por USUARIO (su media), no por ítem.",
   2:"Emparentadas, pero no iguales: Pearson centraría por la media del ÍTEM; el coseno ajustado centra por la media del USUARIO y luego aplica coseno."}},
q73:{c:1,o:[
 "porque el MAE eleva los errores al cuadrado y amplifica el efecto de los outliers del conjunto de test",
 "porque el RMSE penaliza mucho más los errores grandes (al elevarlos al cuadrado) que el MAE",
 "porque ambas métricas miden lo mismo y solo difieren en una constante de escala fija"],
e:"MAE promedia |error|: todos los errores pesan lo que miden. RMSE eleva al cuadrado antes de promediar: un error de 10 «cuesta» 100, uno de 1 cuesta 1 — los errores grandes dominan la métrica. Consecuencia: un modelo consistente sin fallos garrafales puede ganar en RMSE y perder en MAE frente a otro que suele clavar pero a veces se estrella. Mirar AMBAS te dice si tu modelo tiene «cisnes negros».",
w:{0:"Está al revés: el que eleva al cuadrado (y sufre con los outliers) es el RMSE; el MAE es el sereno de la pareja.",
   2:"Si solo difirieran en escala ordenarían igual a todos los modelos — y el enunciado parte justo de que pueden ordenar distinto."}},
q124:{c:1,o:[
 "que la acción del estado siguiente se muestrea de la política de comportamiento ε-greedy",
 "que el método asume que en el estado siguiente se tomará la mejor acción posible",
 "que las recompensas futuras quedan fuera del cálculo al actualizar el valor del estado presente"],
e:"El max es una declaración de OPTIMISMO: «valoraré este paso suponiendo que a partir de aquí jugaré perfecto». Por eso Q-learning aprende la política óptima aunque su comportamiento real sea exploratorio (off-policy): la actualización no mira lo que el agente HIZO después, sino lo MEJOR que podría hacer. SARSA, en cambio, usa la acción real a′ — evalúa la política que de verdad sigue.",
w:{0:"Usar la acción realmente muestreada por la política es SARSA (on-policy); el max de Q-learning ignora deliberadamente qué se hizo.",
   2:"Al contrario: el término γ·maxQ(s′,a) es exactamente cómo las recompensas futuras ENTRAN en el valor presente."}},
q28:{c:1,o:[
 "estima las probabilidades P(xi|k) mediante frecuencias relativas y multiplica las verosimilitudes",
 "no asume independencia entre los datos y modela el logaritmo de la probabilidad (log-odds)",
 "requiere que todos los atributos sean categóricos y no admite variables de entrada continuas"],
e:"La regresión logística ajusta directamente P(Y|X) como sigmoide de una combinación lineal — modela el log-odds ln[P/(1−P)] = β₀+β₁x₁+… — SIN suponer nada sobre la relación entre atributos: los β se reparten el trabajo aunque los atributos estén correlacionados. Naive Bayes, en cambio, factoriza P(X|k) como producto de condicionales independientes. Por eso la logística «se ha probado muy sólida» donde la independencia es falsa.",
w:{0:"Frecuencias relativas y producto de verosimilitudes es la mecánica de NAIVE BAYES — la opción describe al otro contendiente.",
   2:"Admite continuas con total naturalidad (la combinación lineal las consume tal cual); es Naive Bayes quien necesita trucos (gaussiana, discretizar)."}},
q102:{c:1,o:[
 "existe un historial denso de valoraciones que permite factorizar la matriz con precisión",
 "se compran productos con poca frecuencia (coches, electrodomésticos) y no hay historial fiable",
 "los usuarios prefieren no proporcionar ningún requisito explícito sobre el producto buscado"],
e:"¿Cada cuánto compras una nevera? Sin compras repetidas no hay historial, y sin historial el colaborativo está ciego (y el que hay, de hace 10 años, describe a otra persona). Los basados en CONOCIMIENTO sortean el problema con otra fuente: requisitos explícitos del usuario + datos estructurados del catálogo (restricciones o casos). Pago a cambio: hay que modelar el dominio a mano.",
w:{0:"Con historial denso el colaborativo/factorización es el rey; el basado en conocimiento brilla justo donde ese historial NO existe.",
   2:"Es su materia prima: sin requisitos del usuario (formulario, críticas), un sistema basado en conocimiento no tiene con qué trabajar."}},
q133:{c:0,o:[
 "los parámetros se ajustan automáticamente durante el entrenamiento; los hiperparámetros se fijan antes (a mano o con validación)",
 "los hiperparámetros se aprenden mediante descenso de gradiente y los parámetros se fijan manualmente antes de entrenar",
 "los parámetros regulan la complejidad del modelo y los hiperparámetros almacenan los pesos que se van aprendiendo"],
e:"PARÁMETROS: lo que el algoritmo aprende solo — pesos de una red, β de la logística, centroides de k-means. HIPERPARÁMETROS: los mandos que TÚ giras antes — k de kNN, C y γ de la SVM, profundidad del árbol, tasa de aprendizaje. Se eligen con el conjunto de VALIDACIÓN (nunca con el test) o con búsquedas tipo grid search. Truco: si aparece en model.fit() lo aprende el modelo; si aparece en el constructor, es hiperparámetro.",
w:{1:"Exactamente al revés: el gradiente ajusta los PARÁMETROS; los hiperparámetros no tienen gradiente que seguir y se fijan por fuera.",
   2:"Cruzado otra vez: los pesos aprendidos SON los parámetros, y la complejidad la regulan típicamente los hiperparámetros (profundidad, C, λ…)."}},
q93:{c:1,o:[
 "una puntuación directa del usuario en una escala numérica, como las estrellas de 1 a 5",
 "la que se deduce de una acción del usuario, como adquirir o consumir un ítem, sin puntuación directa",
 "la valoración media que el sistema asigna por defecto a los ítems que el usuario aún no ha consumido"],
e:"EXPLÍCITA: el usuario opina a propósito (estrellas, like). IMPLÍCITA: el sistema INFIERE interés del comportamiento — compró, escuchó entera, repitió, hizo clic. Elegir un ítem entre miles ya es una señal relevante. Ventaja de las implícitas: abundan sin pedir esfuerzo; inconveniente: son ambiguas (¿lo compró para regalar? ¿lo vio y lo odió?). Los sistemas reales explotan ambas.",
w:{0:"Las estrellas son el ejemplo canónico de valoración EXPLÍCITA: el usuario puntúa deliberadamente.",
   2:"Imputar una media a celdas vacías es un truco de relleno del algoritmo, no una valoración del usuario — la implícita nace de ACCIONES reales suyas."}}

{t:"En un árbol de decisión, tras particionar por un atributo NOMINAL", w:{

{t:"En una SVM con kernel RBF, un valor de gamma muy alto", w:{
 1:"Es lo contrario: gamma PEQUEÑO da fronteras suaves (influencia de cada punto muy extensa). Gamma grande = influencia muy local = frontera pegada a los datos.",
 2:"El kernel RBF nunca «se vuelve lineal» por subir gamma; con gamma alto se vuelve más flexible y sobreajustado, no más simple."}},
{t:"Para un problema de 4 clases con clasificadores binarios, la estrategia una-contra-una", w:{
 1:"4 clasificadores sería una-contra-TODAS (OvA): uno por clase contra el resto. OvO necesita uno por PAR de clases: C(C−1)/2 = 6.",
 2:"12 sería contar cada par dos veces (ordenado). Los pares no se repiten: 4·3/2 = 6."}},
{t:"Etiquetar una noticia a la vez como «deportes» y «economía»", w:{
 1:"Multiclase permite >2 clases pero solo UNA etiqueta por instancia. Aquí la noticia lleva DOS etiquetas a la vez → multietiqueta.",
 2:"No hay nada numérico continuo que predecir: no es regresión, y «multivariante» se refiere a varias variables de entrada."}},
{t:"Tres clasificadores dan estas probabilidades para las clases (A,B)", w:{
 1:"Cuenta los votos: el primero vota A (0.9) y los otros dos votan B (0.6) → hard = B. Soft promedia: A=0.567 > B=0.433 → soft = A. El clasificador muy seguro de A inclina el soft.",
 2:"Soft voting NO da B: promedia probabilidades y A gana con 0.567. Esa es justo la gracia del ejemplo: hard y soft pueden discrepar."}},
{t:"¿Qué técnica de ensemble es especialmente recomendable cuando el conjunto de entrenamiento contiene muestras mal etiquetadas", w:{
 1:"El boosting es el PEOR con outliers: al fallar en ellos les sube el peso exponencialmente y acaba obsesionado con el ruido.",
 2:"El stacking no aborda los outliers: aprende a combinar salidas de modelos. La dilución de outliers viene del muestreo bootstrap del bagging."}},
{t:"En AdaBoost, la confianza de cada hipótesis débil", w:{
 1:"Si todas pesaran igual sería una votación simple (como bagging). AdaBoost pondera cada regla por su fiabilidad α.",
 2:"Error 0.5 = acertar a cara o cruz → α = ½·ln(1) = 0: peso NULO, no máximo. Cuanto menor el error, mayor α."}},
{t:"La diferencia esencial entre bagging y boosting", w:{
 1:"Ambos son «meta-algoritmos»: pueden usar árboles, SVM o cualquier clasificador base. La diferencia es CÓMO generan los conjuntos de entrenamiento.",
 2:"Ambos son supervisados (necesitan etiquetas). La diferencia real es paralelo+aleatorio vs. secuencial+adaptativo."}},
{t:"Entrenamos con 2.000 ejemplos y batch size de 500", w:{
 1:"500 es el tamaño del lote, no el número de iteraciones. Iteraciones = ejemplos/batch = 2000/500 = 4.",
 2:"2000 sería el número de actualizaciones con SGD puro (batch=1). Con lotes de 500 solo hay 4 actualizaciones por época."}},
{t:"Una tasa de aprendizaje (η) demasiado alta", w:{
 1:"Lento pero seguro es el síntoma de η demasiado BAJA. Con η alta el paso se pasa de largo del mínimo: oscila o diverge.",
 2:"η no afecta a la arquitectura: la red tiene los mismos parámetros; lo que cambia es cómo de grandes son los pasos al ajustarlos."}},
{t:"El early stopping consiste en", w:{
 1:"Un número fijo de épocas no mira si el modelo empieza a sobreajustar: puede parar demasiado pronto o tarde. La señal correcta es el error de VALIDACIÓN subiendo.",
 2:"Desactivar neuronas aleatoriamente es DROPOUT, otra técnica de regularización distinta."}},
{t:"Una imagen de entrada de 32×32, un filtro 5×5", w:{
 1:"32×32 solo se mantendría con padding (p=2 con f=5). Sin padding la salida encoge: (32−5)/1+1 = 28.",
 2:"27 sale de olvidar el +1 de la fórmula: (n+2p−f)/s + 1 = 27+1 = 28."}},
{t:"Una capa de max-pooling 2×2 con stride 2 sobre un volumen de 28×28×6", w:{
 1:"El pooling NUNCA cambia el número de canales: opera dentro de cada canal por separado. 6 canales entran, 6 salen.",
 2:"7×7 sería dividir entre 4 (dos poolings seguidos). Un solo pooling 2×2 s=2 divide alto y ancho entre 2: 28→14."}},
{t:"En una CNN típica de clasificación, la mayor parte de los parámetros", w:{
 1:"Las convoluciones comparten el mismo filtro pequeño por toda la imagen: poquísimos parámetros (p. ej., 5×5×canales+1 por filtro).",
 2:"El pooling no tiene NINGÚN parámetro entrenable: solo toma el máximo (o la media) de cada ventana."}},
{t:"(PEC) En transfer learning con una red preentrenada", w:{
 1:"Reentrenar todo desde cero desaprovecha el preentrenamiento y con pocos datos sobreajusta: justo lo que el transfer learning evita.",
 2:"Es al revés: lo que se congela son las convoluciones (características generales) y lo que se reentrena es la salida/clasificador para tus clases."}},
{t:"En una celda LSTM, la puerta de olvido", w:{
 1:"Desactivar neuronas al azar es dropout (regularización), no una puerta de la LSTM.",
 2:"La tasa de aprendizaje es un hiperparámetro global del optimizador; las puertas regulan el flujo de información, no el aprendizaje."}},
{t:"¿Por qué Pearson y no distancia euclídea para comparar usuarios", w:{
 1:"Quedar entre 0 y 1 no es el motivo (Pearson va de −1 a 1). El motivo es que centra las valoraciones de cada usuario y no depende del nº de ítems en común.",
 2:"Pearson no penaliza por pocas valoraciones; de hecho con un solo ítem en común ni siquiera puede calcularse bien (queda 0)."}},
{t:"En el filtraje colaborativo basado en ítems, la medida de similitud más establecida", w:{
 1:"Pearson es la medida típica entre USUARIOS (filas). Para ítems (columnas) el estándar es la similitud coseno, idealmente ajustada.",
 2:"Hamming es para atributos binarios/categóricos (cuenta diferencias), no para vectores de valoraciones numéricas."}},
{t:"Un usuario recién registrado sin ninguna valoración", w:{
 1:"La burbuja de filtros es el problema OPUESTO: usuarios con tanto historial que solo ven contenido afín. Aquí el problema es la ausencia total de datos.",
 2:"La oveja gris SÍ tiene valoraciones, pero gustos tan atípicos que no encuentra vecinos similares. El nuevo usuario no tiene ninguna valoración."}},
{t:"¿Qué familia de recomendadores puede recomendar un ítem recién añadido", w:{
 1:"El colaborativo por usuarios necesita que ALGUIEN haya valorado el ítem para que aparezca en los perfiles: con cero valoraciones es invisible.",
 2:"El colaborativo por ítems necesita comparar las valoraciones del ítem nuevo con otros: sin valoraciones no hay columna que comparar."}},
{t:"Para recomendar neveras en una tienda donde cada cliente compra una cada 10 años", w:{
 1:"El colaborativo necesita historial denso de valoraciones/compras; con compras cada década no hay datos suficientes ni recientes.",
 2:"La factorización de matrices es filtraje colaborativo: sufre el mismo problema de falta de valoraciones."}},
{t:"Una política ε-avariciosa con ε=0.1", w:{
 1:"Elegir siempre la mejor acción sería ε=0: explotación pura, sin exploración. Con ε=0.1 hay un 10 % de exploración aleatoria.",
 2:"Lo tienes invertido: ε es la probabilidad de EXPLORAR (aleatoria), no de explotar. 0.1 → 10 % aleatoria, 90 % la mejor."}},
{t:"¿Qué método actualiza Q usando la acción que el agente REALMENTE ejecuta", w:{
 1:"Q-learning usa maxₐQ(s′,a): lo MEJOR posible en el estado siguiente, se haya ejecutado o no. Por eso es off-policy.",
 2:"DQN es la versión con red neuronal de Q-learning: también usa el max, no la acción ejecutada."}},
{t:"La diferencia clave en la fórmula de actualización entre SARSA y Q-learning", w:{
 1:"Ambos usan tasa de aprendizaje α en la actualización: V/Q ← V/Q + α·[objetivo − estimación].",
 2:"Ambos necesitan recompensas: son la única señal de aprendizaje en RL. La diferencia está en el término del estado siguiente (max vs. acción real)."}},
{t:"En DQN, la repetición de experiencias", w:{
 1:"Repetir el mismo episodio hasta memorizarlo sería sobreajuste puro y mantiene la correlación temporal: lo contrario de lo que busca el replay (muestras aleatorias variadas).",
 2:"Copiar la red es la otra técnica de DQN (target network), y no se hace en cada paso sino periódicamente."}},
{t:"La red objetivo (target network) de DQN", w:{
 1:"No es cuestión de capacidad: es una COPIA de la misma red, congelada, solo para calcular el objetivo de forma estable.",
 2:"La ε-greedy sigue siendo necesaria para explorar; la target network resuelve otro problema (el objetivo móvil del entrenamiento)."}},
{t:"Con γ=0.9, una recompensa de 10 que se recibirá dentro de 2 pasos", w:{
 1:"10 sin descuento sería γ=1 o recompensa inmediata (t=0). A dos pasos se aplica γ² = 0.81.",
 2:"10·0.9 = 9 es el valor a UN paso (t=1). A dos pasos el descuento es γ² → 10·0.81 = 8.1."}},
{t:"En la regresión lineal, la función de coste J(θ) basada en el MSE", w:{
 1:"Los múltiples mínimos locales aparecen en redes neuronales; en regresión LINEAL, J es convexa: un único mínimo global.",
 2:"J es continua y derivable en todo el espacio de parámetros: por eso funciona el descenso de gradiente."}},
{t:"En un SVR, los puntos del conjunto de entrenamiento que caen dentro de la banda", w:{
 1:"Es al revés: los vectores de soporte son los puntos FUERA o en el borde de la banda; los de dentro no influyen.",
 2:"El coste C penaliza los errores ξ de los puntos FUERA de la banda; dentro de ella el error es 0 por definición."}},
{t:"(PEC) Para construir un ensemble con bootstrap manual", w:{
 1:"Sin reemplazo y a mitad de tamaño es submuestreo simple, no bootstrap. El bootstrap repite ejemplos y mantiene el tamaño original.",
 2:"Partir en bloques ordenados ni es aleatorio ni permite repeticiones: rompe la idea del bootstrap (muestras independientes con reemplazo)."}},
{t:"(PEC) En scikit-learn, ¿por qué se ajusta el escalador", w:{
 1:"El test admite cualquier transformación; lo prohibido es CALCULAR los parámetros de la transformación (media, máx/mín) usando el test.",
 2:"El objetivo no es la media del test: es que la evaluación simule datos nunca vistos, sin contaminar el entrenamiento con información del test."}},
{t:"(PEC) La «burbuja de filtros» en plataformas", w:{
 1:"No tiene nada que ver con servidores ni tráfico: es un fenómeno informativo causado por la personalización algorítmica.",
 2:"Los usuarios nuevos sin recomendaciones son el problema del cold start, distinto de la burbuja (que afecta a usuarios con mucho historial)."}},
{t:"¿Por qué una tabla Q es inviable para juegos como el Go", w:{
 1:"Las acciones del Go (colocar piedra en una intersección) son discretas. El problema es el número astronómico de ESTADOS.",
 2:"Las recompensas del Go son justo lo contrario: dispersas (solo al final, ganar/perder). Y ese tampoco es el motivo de la inviabilidad de la tabla."}},
{t:"En Naive Bayes, con P(poisonous)=3/7 y siendo 2 de los 3", w:{
 1:"3/7 es la probabilidad a priori P(poisonous), no la condicional. P(blanco|venenosa) se calcula DENTRO de la clase: 2 de 3.",
 2:"2/7 dividiría entre todos los ejemplos; la condicional divide solo entre los de la clase venenosa (3)."}},
{t:"El conjunto S tiene 4 ejemplos «edible» y 3 «poisonous»", w:{
 1:"Un conjunto casi puro tendría entropía cercana a 0, no a 1. 0.985 indica mezcla casi máxima.",
 2:"Con una sola clase la entropía sería exactamente 0 (−1·log₂1 = 0)."}},
{t:"Cinco clasificadores votan: A, A, B, B, B", w:{
 1:"El orden de los votos es irrelevante en una votación por mayoría: solo cuenta el recuento final (B: 3, A: 2).",
 2:"No hay empate: 3 ≠ 2. Los empates se tratan con heurísticos (clase más frecuente, etc.) solo cuando ocurren."}},
{t:"¿Qué propiedad permite usar kernels en las SVM", w:{
 1:"El margen flexible (C) es independiente del uso de kernels: puedes tener margen flexible con kernel lineal y viceversa.",
 2:"La solución de la SVM es ÚNICA (optimización convexa); eso no tiene relación con poder usar kernels."}},
{t:"Tras entrenar una SVM, observas que casi todos los ejemplos", w:{
 1:"Es lo contrario: el óptimo «bueno» se delata con POCOS vectores de soporte y entrenamiento rápido.",
 2:"Si fueran perfectamente separables con ese kernel, bastarían unos pocos vectores de soporte para definir el margen."}},
{t:"Sin función de activación no lineal, una red neuronal de varias capas", w:{
 1:"No: componer funciones lineales da otra función lineal, da igual cuántas capas apiles. La capacidad de aproximador universal viene de la no linealidad.",
 2:"Entrenarse puede (el gradiente existe); el problema es que solo representaría funciones lineales."}},
{t:"El optimizador Adam combina las ideas de", w:{
 1:"Bagging y boosting son técnicas de ENSEMBLE (combinación de modelos), no de optimización del gradiente.",
 2:"Dropout y early stopping son técnicas de REGULARIZACIÓN contra el sobreajuste, no optimizadores."}},
{t:"La innovación principal de las redes residuales (ResNet)", w:{
 1:"Los filtros de varios tamaños en paralelo (y las conv 1×1) son la idea de INCEPTION/GoogLeNet, no de ResNet.",
 2:"ResNet sigue siendo una CNN: no elimina convoluciones, les añade atajos (skip connections)."}},
{t:"La arquitectura VGG se caracteriza por", w:{
 1:"VGG es una CNN: su gracia es justamente la uniformidad de sus capas CONVOLUCIONALES 3×3.",
 2:"Las conexiones residuales son de ResNet (2015), posterior a VGG (2014)."}},
{t:"El mecanismo de atención en una arquitectura codificador-decodificador", w:{
 1:"La atención no reduce capas: añade conexiones ponderadas entre decodificador y TODAS las posiciones de la entrada.",
 2:"Todo se entrena con retropropagación, atención incluida."}},
{t:"Clasificar el sentimiento (positivo/negativo) de una frase completa", w:{
 1:"One-to-many es lo inverso: UNA entrada genera una secuencia (p. ej., imagen → pie de foto). Aquí entran muchas palabras y sale un único valor.",
 2:"One-to-one no usa recurrencia (entrada y salida únicas): no aprovecharía la secuencia de palabras."}},
{t:"La factorización de matrices descompone la matriz de valoraciones en", w:{
 1:"Restar medias es la normalización del coseno ajustado/Pearson, no una factorización.",
 2:"Las reglas de asociación son otra técnica (minería de datos, a priori); la factorización aprende matrices de factores latentes."}},
{t:"En la predicción por ítems pred(a,i)", w:{
 1:"Si el usuario no valoró el ítem j, no existe aj con que ponderar: solo sirven ítems similares YA valorados por el usuario.",
 2:"Las valoraciones de otros usuarios ya se usaron para calcular las similitudes ítem-ítem; la predicción final pondera las valoraciones DEL PROPIO usuario."}},
{t:"En el bucle del aprendizaje por refuerzo, tras ejecutar la acción", w:{
 1:"Si el entorno diera la acción óptima sería aprendizaje SUPERVISADO. En RL solo hay recompensa y nuevo estado: el agente debe descubrir qué acciones son buenas.",
 2:"En RL no existe conjunto de datos etiquetado: la «experiencia» se genera interactuando."}},
{t:"¿Por qué conocer solo V(s) no basta para decidir la acción", w:{
 1:"V(s) se define igualmente en entornos estocásticos (como esperanza). El problema es otro: sin modelo no sabes qué acción te lleva al estado bueno.",
 2:"La ecuación de Bellman calcula V perfectamente; lo que falta es el vínculo estado→acción, que es lo que aporta Q(s,a)."}},
{t:"En la actualización TD V(s) ← V(s) + α·[r + γV(s′) − V(s)]", w:{
 1:"La recompensa acumulada total del episodio es lo que usa Montecarlo (esperar al final). TD usa solo la recompensa inmediata + estimación del siguiente estado.",
 2:"Las probabilidades de transición pertenecen a los métodos CON modelo; TD es model-free y no las estima."}}
];
const WHY = {};
(function(){
  for(const q of QUESTIONS){
    if(q._w){ WHY[q.id]=q._w; continue; }   // los parches tienen prioridad
    for(const e of WHY_LIST){
      if(q.t.indexOf(e.t)===0 && !(q.c in e.w)){ WHY[q.id]=e.w; break; }
    }
  }
})();

<script>
/* ===================================================================
   MOTOR v2 — SRS sobre preguntas, sesión diaria, gamificación
   =================================================================== */

/* ---------- SRS de preguntas ---------- */
const INT_DAYS = [0,1,2,3,5];          // días por caja (0 = 10 min)
function qsrs(){ return store.get("qsrs",{}); }
function srsInterval(box){
  const cap = Math.max(1, daysLeft()-1); // nunca programar más allá del examen
  return Math.min(INT_DAYS[box], cap);
}
function srsLabel(box, wrong){
  if(wrong) return "🔁 La verás de nuevo en esta sesión";
  const d = srsInterval(box);
  if(d<=0) return "⏳ Volverá en unos minutos";
  if(d===1) return "📆 Volverá mañana";
  return "📆 Volverá en "+d+" días";
}
function answerSRS(qid, ok){
  const s = qsrs(); const e = s[qid]||{b:0,lapses:0};
  if(ok){ e.b = Math.min(INT_DAYS.length-1,(e.b||0)+1); const d=srsInterval(e.b); e.due = Date.now() + (d===0? 10*60*1000 : d*86400000); }
  else { e.lapses=(e.lapses||0)+1; e.b=0; e.due = Date.now()+10*60*1000; }
  s[qid]=e; store.set("qsrs",s);
  return e;
}
/* migración desde la v1: siembra el SRS con el historial previo */
(function(){
  if(Object.keys(qsrs()).length) return;
  const st = qstats(); if(!Object.keys(st).length) return;
  const s={};
  for(const id in st){ s[id] = st[id].last===0 ? {b:0,due:Date.now(),lapses:st[id].bad||1} : {b:1,due:Date.now(),lapses:st[id].bad||0}; }
  store.set("qsrs",s);
})();

/* ---------- gamificación ---------- */
function daily(){ const d=store.get("daily",{}); return d.date===todayKey()? d : {date:todayKey(),n:0}; }
function streak(){ return store.get("streak",{last:null,n:0}); }
function touchStreak(){
  const s = streak(); const t = todayKey();
  if(s.last===t) return s;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yk = y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
  s.n = (s.last===yk)? s.n+1 : 1; s.last=t; store.set("streak",s);
  updateTop(); return s;
}
const DAILY_GOAL = 30;
function recordAnswer(qid, ok, firstTry){
  const s = qstats(); const e = s[qid]||{ok:0,bad:0};
  if(ok) e.ok++; else e.bad++;
  e.last = ok?1:0; s[qid]=e; store.set("qstats",s);
  const srsState = answerSRS(qid, ok);
  const d = daily(); d.n++; store.set("daily",d);
  store.set("xp",(store.get("xp",0)) + (ok? (firstTry?10:5) : 2));
  touchStreak();
  return srsState;
}
function masteredCount(){ const s=qsrs(); return QUESTIONS.filter(q=>s[q.id]&&s[q.id].b>=3).length; }
function dueQuestions(){ const s=qsrs(); const now=Date.now(); return QUESTIONS.filter(q=>s[q.id]&&s[q.id].due<=now).sort((a,b)=>s[a.id].due-s[b.id].due); }
function newQuestions(){ const s=qsrs(); return QUESTIONS.filter(q=>!s[q.id]); }

/* ---------- top bar ---------- */
function updateTop(){
  const sp=document.getElementById("streakpill"), dp=document.getElementById("dayspill");
  if(sp) sp.innerHTML = "🔥 "+streak().n;
  if(dp){ const d=daysLeft(); dp.innerHTML = d===0?"📅 ¡HOY!":"📅 "+d+" día"+(d===1?"":"s"); }
}

/* ================== NAVEGACIÓN ================== */
const TABS = [
  {id:"home", ico:"🏠", lbl:"Inicio"},
  {id:"study", ico:"🎯", lbl:"Estudiar"},
  {id:"exam", ico:"⏱️", lbl:"Simulacro"},
  {id:"theory", ico:"📖", lbl:"Teoría"},
  {id:"progress", ico:"📈", lbl:"Progreso"}
];
let currentTab="home", examTimer=null;
function renderNav(){
  document.getElementById("nav").innerHTML = TABS.map(t=>
    '<button class="'+(currentTab===t.id?"active":"")+'" onclick="go(\''+t.id+'\')"><span class="nico">'+t.ico+'</span>'+t.lbl+'</button>').join("");
}
function go(tab){
  if(examTimer && tab!=="exam"){ if(!confirm("Hay un simulacro en curso. ¿Salir y abandonarlo?")) return; stopTimer(); }
  currentTab=tab; renderNav(); scrollTop();
  ({home, study, exam, theory, progress})[tab]();
}

/* ================== INICIO ================== */
function moduleProgress(){
  const s = qstats(); const per = {};
  for(const m of Object.keys(MODS)) per[m]={ok:0,bad:0,total:QUESTIONS.filter(q=>q.m===m).length};
  QUESTIONS.forEach(q=>{ const e=s[q.id]; if(e){ per[q.m].ok+=e.ok; per[q.m].bad+=e.bad; } });
  return per;
}
function weakModule(){
  const per=moduleProgress(); let weak=null, acc=2;
  for(const m in per){ const p=per[m]; const n=p.ok+p.bad; if(n>=5){ const a=p.ok/n; if(a<acc){acc=a;weak=m;} } }
  return weak?{m:weak,acc:acc}:null;
}
function home(){
  const d=daysLeft(), dn=daily().n, due=dueQuestions().length, fresh=newQuestions().length,
        mast=masteredCount(), hist=examHistory(), w=weakModule(), dueF=dueFlash().length;
  const lastExam = hist.length? hist[hist.length-1] : null;
  const goalPct = Math.min(1, dn/DAILY_GOAL);
  app().innerHTML = `<div class="view">
  <div class="card" style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    ${ring(goalPct, dn+"/"+DAILY_GOAL, "hoy")}
    <div style="flex:1;min-width:170px">
      <h2 style="margin:0 0 4px">${dn>=DAILY_GOAL?"Objetivo cumplido 🎉":"Objetivo diario"}</h2>
      <p class="muted" style="font-size:13px;margin:0 0 10px">${due>0? "<b class='warn-t'>"+due+"</b> preguntas por repasar":"Sin repasos pendientes"} · <b class="acc-t">${fresh}</b> nuevas disponibles${dueF?" · <b class='gold-t'>"+dueF+"</b> tarjetas":""}</p>
      <button class="btn" onclick="startSession()">${due>0?"▶ Repasar ahora":"▶ Sesión de estudio"}</button>
    </div>
  </div>
  <div class="grid2">
    <button class="mode" onclick="go('exam')"><div class="ico">⏱️</div><h3>Simulacro real</h3><p>30 preguntas · 90 min · +1/−0,5${lastExam? " · último: <b class='"+(lastExam.nota>=5?"ok-t":"bad-t")+"'>"+lastExam.nota.toFixed(1)+"</b>":""}</p></button>
    <button class="mode" onclick="flashHome()"><div class="ico">🃏</div><h3>Tarjetas rápidas</h3><p>${dueF>0? dueF+" pendientes hoy":"Repaso de conceptos clave"}</p></button>
  </div>
  ${w?'<div class="card"><div class="row"><div style="flex:1;min-width:180px"><h3>💡 Punto débil: <span style="color:'+MOD_COLORS[w.m]+'">'+MODS[w.m]+'</span></h3><p class="muted" style="font-size:13px;margin:4px 0 0">'+Math.round(w.acc*100)+' % de acierto. Dale caña antes del examen.</p></div><button class="btn sm" onclick="startQuiz(QUESTIONS.filter(q=>q.m===\''+w.m+'\'),\'Refuerzo '+w.m+'\')">Practicar</button></div></div>':""}
  <div class="card">
    <div class="mb"><div class="lbl"><span>🏆 Dominadas (3+ aciertos seguidos)</span><span>${mast}/${QUESTIONS.length}</span></div>
    <div class="mini"><i style="width:${Math.round(100*mast/QUESTIONS.length)}%;background:var(--grad)"></i></div></div>
    <p class="muted" style="font-size:12.5px;margin:8px 0 0">Meta: llegar al 17 con el máximo de preguntas dominadas. Cada fallo la devuelve al principio — así trabaja la repetición espaciada.</p>
  </div>
  <div class="card">
    <h3>Estrategia del examen</h3>

const SESSION_SIZE = 16;
function startSession(){
  currentTab="study"; renderNav();
  const due = dueQuestions();
  const fresh = shuffle(newQuestions());
  let pool = due.slice(0, SESSION_SIZE);
  if(pool.length < SESSION_SIZE) pool = pool.concat(fresh.slice(0, SESSION_SIZE - pool.length));
  if(!pool.length){ pool = shuffle(QUESTIONS).slice(0,SESSION_SIZE); toast("Sin pendientes: ronda de refuerzo aleatoria"); }
  startQuiz(pool, "Sesión de estudio", true);
}

/* ---------- motor de quiz (sesión y práctica) ---------- */
let Q={queue:[],idx:0,first:{},ok1:0,seen:new Set(),title:"",isSession:false,answered:false,failedList:[]};
function startQuiz(pool, title, isSession){
  currentTab="study"; renderNav();
  if(!pool.length){ toast("No hay preguntas en esta selección 🎉"); study(); return; }
  Q={queue:shuffle(pool).slice(0,30),idx:0,first:{},ok1:0,seen:new Set(),title:title||"Práctica",isSession:!!isSession,answered:false,failedList:[]};
  scrollTop(); renderQ();
}
function renderQ(){
  if(Q.idx>=Q.queue.length) return quizSummary();
  const q=Q.queue[Q.idx];
  const order=shuffle(q.o.map((_,i)=>i));
  const isRetry = Q.first[q.id]!==undefined;
  Q.answered=false;
  app().innerHTML = `<div class="view">
  <div class="qmeta"><button class="btn sm ghost" onclick="quizExit()">✕</button>
    <span class="pill" style="color:${MOD_COLORS[q.m]}">${MODS_SHORT[q.m]}${q.p?" · PEC":""}</span>
    ${isRetry?'<span class="pill hot">🔁 reintento</span>':(qsrs()[q.id]?'<span class="pill">repaso</span>':'<span class="pill acc">nueva</span>')}
    <div class="spacer"></div><span class="pill">${Q.seen.size + 1 > Q.queue.length ? Q.queue.length : Q.seen.size+ (Q.first[q.id]===undefined?1:0)}/${qTotal()}</span></div>
  <div class="bar"><i style="width:${100*Q.idx/Q.queue.length}%"></i></div>
  <div class="card">
    <div class="qtext">${esc(q.t)}</div>
    ${order.map((oi,k)=>'<button class="opt" id="opt'+oi+'" data-k="'+k+'" onclick="qAnswer('+oi+')"><span style="display:flex;align-items:flex-start"><span class="lt">'+(k+1)+'</span><span>'+esc(q.o[oi])+'</span></span></button>').join("")}
    <div class="feed" id="feed"></div>
    <div class="row hide" id="nextrow" style="margin-top:12px">
      <button class="btn sm ghost" onclick="openTheory('${q.m}')">📖 Teoría ${MODS_SHORT[q.m]}</button>
      <div class="spacer"></div><button class="btn" id="nextbtn" onclick="qNext()">Continuar →</button>
    </div>
  </div>
  <p class="muted" style="font-size:11.5px;text-align:center">Teclas: 1-3 responder · Enter continuar</p></div>`;
}
function qTotal(){ return new Set(Q.queue.map(q=>q.id)).size; }
function qAnswer(oi){
  if(Q.answered) return; Q.answered=true;
  const q=Q.queue[Q.idx]; const ok=oi===q.c;
  const firstTry = Q.first[q.id]===undefined;
  if(firstTry){ Q.first[q.id]=ok; if(ok) Q.ok1++; else Q.failedList.push(q); Q.seen.add(q.id); }
  const srsState = recordAnswer(q.id, ok, firstTry);
  document.querySelectorAll(".opt").forEach(b=>{ b.disabled=true; if(b.id!=="opt"+q.c && b.id!=="opt"+oi) b.classList.add("dim"); });
  document.getElementById("opt"+q.c).classList.add("correct");
  if(!ok) document.getElementById("opt"+oi).classList.add("wrong");
  const f=document.getElementById("feed");
  f.className="feed show "+(ok?"good":"bad");
  let html = '<div class="ttl">'+(ok? '<span style="color:var(--ok)">✓ ¡Correcto!</span>' : '<span style="color:var(--bad)">✗ Incorrecto</span>')+'</div>';
  html += '<div class="exp"><b>Por qué:</b> '+esc(q.e)+'</div>';
  if(!ok && WHY[q.id] && WHY[q.id][oi]) html += '<div class="why"><b>Tu respuesta:</b> '+esc(WHY[q.id][oi])+'</div>';
  if(Q.isSession || true) html += '<span class="srschip">'+srsLabel(srsState.b, !ok)+'</span>';
  f.innerHTML = html;
  if(!ok){ const clone=q; Q.queue.splice(Math.min(Q.queue.length, Q.idx+3), 0, clone); }
  document.getElementById("nextrow").classList.remove("hide");
  setTimeout(()=>{ const el=document.getElementById("feed"); if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"}); },80);
}
function qNext(){ Q.idx++; scrollTop(); renderQ(); }
function quizExit(){ if(Q.seen.size===0 || confirm("¿Salir de la sesión?")) study(); }
function quizSummary(){
  const total=qTotal(); const pct=total?Math.round(100*Q.ok1/total):0;
  if(pct>=80) confetti();
  app().innerHTML = `<div class="view"><div class="card" style="text-align:center">

function flashHome(){
  currentTab="study"; renderNav(); scrollTop();

}
function flashStart(mod,all,fallbackAll){
  let q = all? FLASH.map((f,i)=>({f,i})).filter(x=>!mod||x.f.m===mod) : dueFlash(mod);
  if(!q.length&&fallbackAll) q=FLASH.map((f,i)=>({f,i})).filter(x=>!mod||x.f.m===mod);
  if(!q.length){ toast("No hay tarjetas pendientes 🎉"); flashHome(); return; }
  fQueue=shuffle(q); fIdx=0; fShown=false; scrollTop(); renderFlash();
}
function renderFlash(){
  if(fIdx>=fQueue.length){
    confetti();
    app().innerHTML='<div class="view"><div class="card" style="text-align:center"><div class="big ok-t">🎉</div><h2>Sesión completada</h2><p class="muted">Has repasado '+fQueue.length+' tarjetas.</p><div class="row" style="justify-content:center"><button class="btn" onclick="flashHome()">Volver</button></div></div></div>';
    return;
  }
  const x=fQueue[fIdx]; const f=x.f;
  app().innerHTML = `<div class="view">
  <div class="row"><button class="btn sm ghost" onclick="flashHome()">✕</button>
    <span class="pill" style="color:${MOD_COLORS[f.m]}">${MODS[f.m]}</span><div class="spacer"></div>
    <span class="pill">${fIdx+1}/${fQueue.length}</span></div>
  <div class="bar"><i style="width:${100*fIdx/fQueue.length}%"></i></div>
  <div class="fcard" onclick="fFlip()">
    ${fShown? '<div class="face back"><div class="muted" style="font-size:12px;margin-bottom:8px">'+esc(f.q)+'</div>'+esc(f.a)+'</div>'
            : '<div class="face"><b>'+esc(f.q)+'</b></div>'}
  </div>
  ${fShown? '<div class="srsbtns"><button class="btn bad" onclick="fGrade(0)">✗ No</button><button class="btn warn" onclick="fGrade(1)">~ A medias</button><button class="btn ok" onclick="fGrade(2)">✓ Sí</button></div>'
          : '<button class="btn" style="width:100%" onclick="fFlip()">Mostrar respuesta</button>'}
  <p class="muted" style="font-size:11.5px;text-align:center;margin-top:10px">Toca la tarjeta para girarla · Espacio girar · 1/2/3 valorar</p></div>`;
}
function fFlip(){ fShown=!fShown; renderFlash(); }
function fGrade(g){
  const x=fQueue[fIdx]; const s=fsrs(); const e=s[x.i]||{box:0};
  if(g===0) e.box=0; else if(g===1) e.box=Math.max(0,Math.min(1,e.box||0)); else e.box=Math.min(FBOX_DAYS.length-1,(e.box||0)+1);
  const days=Math.min(FBOX_DAYS[e.box], Math.max(1,daysLeft()-1));
  e.due=Date.now()+(g===0? 5*60*1000 : (days*86400000||12*3600*1000));
  s[x.i]=e; store.set("srs",s);
  if(g===0) fQueue.push(x);
  fIdx++; fShown=false; renderFlash();
}
