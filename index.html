ajo). Vale 1 con tendencias idénticas, −1 con opuestas y ~0 sin relación."}, {"m": "M5", "t": "¿Por qué no se suele usar la distancia euclídea simple para medir similitud entre usuarios?", "o": ["porque no se puede calcular", "porque depende del número de ítems en común: cuantos más, mayor tiende a ser la distancia", "porque siempre da cero"], "c": 1, "e": "La distancia euclídea crece con el número de ítems valorados en común (más términos en el sumatorio), lo cual no es deseable para comparar similitud. Por eso se prefiere Pearson, independiente de escala."}, {"m": "M5", "t": "En el filtraje colaborativo basado en ítems, la medida de similitud más establecida es...", "o": ["la correlación de Pearson", "la similitud coseno (o coseno ajustada)", "la distancia de Hamming"], "c": 1, "e": "En el enfoque basado en ítems la similitud coseno es la métrica estándar. La coseno ajustada resta la media de cada usuario (corrigiendo sesgos de puntuación) y, como Pearson, toma valores entre −1 y 1."}, {"m": "M5", "t": "El filtraje colaborativo basado en ítems se prefiere al basado en usuarios cuando...", "o": ["hay muchos más usuarios que ítems (comparar usuarios sería muy costoso)", "hay muchos más ítems que usuarios", "no hay ninguna valoración"], "c": 0, "e": "En escenarios realistas suele haber millones de usuarios y miles de ítems; comparar todos los usuarios es costoso. El enfoque basado en ítems (más estable y eficiente) calcula similitudes entre ítems."}, {"m": "M5", "t": "El filtraje colaborativo basado en factorización de matrices (p. ej. SVD)...", "o": ["descompone la matriz de valoraciones en factores que representan características latentes de usuarios e ítems", "usa reglas de restricciones explícitas", "no necesita ninguna valoración"], "c": 0, "e": "La factorización (SVD: M=UΣVᵀ) descubre características latentes (a veces interpretables como género de película). Un ítem se recomienda si su vector latente es parecido al del usuario. La matriz de valoraciones es dispersa, y U,V se hallan minimizando el error."}, {"m": "M5", "t": "El problema del 'arranque en frío' (usuarios o ítems nuevos sin valoraciones) afecta especialmente a...", "o": ["el filtraje colaborativo", "los sistemas basados en conocimiento", "los sistemas basados en restricciones"], "c": 0, "e": "El filtraje colaborativo necesita valoraciones previas, por lo que falla con usuarios o ítems nuevos. Los basados en contenido (con características del ítem) o en conocimiento sortean este problema."}, {"m": "M5", "t": "Los sistemas recomendadores basados en contenido...", "o": ["usan solo la matriz de valoraciones", "usan características de los ítems y un perfil de usuario que pondera esas características", "necesitan muchos usuarios para funcionar"], "c": 1, "e": "El enfoque basado en contenido recomienda comparando las características de los ítems con el perfil de preferencias del usuario. Ventaja: no necesita gran volumen de usuarios ni sufre el problema de ítems nuevos sin valoración."}, {"m": "M5", "t": "En recomendadores basados en contenido textual, la función tf-idf da más importancia a...", "o": ["las palabras muy frecuentes en todos los documentos", "las palabras frecuentes en un documento pero poco frecuentes en el conjunto de documentos", "las palabras más cortas"], "c": 1, "e": "tf-idf combina la frecuencia del término en el documento (tf) con la rareza del término en la colección (idf): una palabra relevante aparece mucho en un documento pero poco en los demás."}, {"m": "M5", "t": "Los sistemas recomendadores basados en conocimiento son útiles cuando...", "o": ["hay muchísimas valoraciones disponibles", "se compran productos con poca frecuencia (coches, electrodomésticos) y no hay historial fiable", "se quiere ignorar las preferencias del usuario"], "c": 1, "e": "Para productos comprados raramente (sin historial) o que cambian rápido, el filtraje colaborativo falla. Los basados en conocimiento usan requisitos explícitos del usuario y datos estructurados del producto."}, {"m": "M5", "t": "En un recomendador basado en restricciones, la consulta '[capacidad ≥ 8 AND precio < 400]' es un ejemplo de...", "o": ["consulta conjuntiva (varias condiciones que deben cumplirse a la vez)", "filtraje colaborativo", "factorización de matrices"], "c": 0, "e": "Los recomendadores basados en restricciones formulan consultas conjuntivas (condiciones unidas por AND) sobre el catálogo, recuperando los ítems que cumplen todos los requisitos del usuario."}, {"m": "M5", "t": "En recomendadores basados en casos, la técnica de 'criticar' (critiquing) permite que el usuario...", "o": ["valore con estrellas un producto", "indique cambios sobre un ítem recomendado (p. ej. 'más barato', 'más capacidad') para refinar la búsqueda", "entrene la red neuronal"], "c": 1, "e": "El critiquing apoya la navegación: a partir de un ítem recomendado al que le falta algo, el usuario expresa una crítica (más barato, más grande...) y el sistema busca alternativas que la satisfagan."}, {"m": "M5", "t": "Los sistemas recomendadores híbridos...", "o": ["combinan varios paradigmas (colaborativo, contenido, conocimiento) para aprovechar sus ventajas", "usan un único algoritmo siempre", "no pueden combinar fuentes de información"], "c": 0, "e": "Los híbridos combinan varios enfoques básicos para explotar más fuentes de información y superar las carencias de cada uno. Sus diseños pueden ser monolítico, paralelizado o canalizado (pipeline)."}, {"m": "M5", "t": "Un diseño híbrido 'canalizado' (pipeline) se caracteriza por...", "o": ["combinar las salidas de recomendadores que funcionan en paralelo", "encadenar recomendadores, donde la salida de uno es la entrada del siguiente", "integrar todo en un único algoritmo monolítico"], "c": 1, "e": "En el diseño canalizado los recomendadores se construyen secuencialmente: la salida de una etapa alimenta a la siguiente. El paralelizado combina salidas independientes; el monolítico integra todo en un solo algoritmo."}, {"m": "M5", "t": "La evaluación de sistemas recomendadores basada en datos históricos...", "o": ["pide a usuarios reales que valoren las recomendaciones en tiempo real", "divide las valoraciones en entrenamiento y test, usando métricas de clasificación o de regresión según el caso", "no usa ninguna métrica"], "c": 1, "e": "La evaluación con datos históricos es análoga al aprendizaje supervisado: se reservan valoraciones para test y se usan métricas de clasificación (precisión, recall, exactitud) o de regresión (MSE, RMSE, MAE), o de ranking (MAP, MRR). La basada en usuarios reales evalúa en tiempo real."}, {"m": "M5", "t": "La similitud coseno ajustada se diferencia de la coseno simple en que...", "o": ["resta a cada valoración la media del usuario antes de calcularla (rango −1 a 1)", "solo funciona con datos binarios", "no tiene en cuenta el producto escalar"], "c": 0, "e": "La coseno ajustada normaliza restando la media de valoraciones de cada usuario, corrigiendo que unos puntúen alto y otros bajo. Sus valores van de −1 a 1, como Pearson; la coseno simple va de 0 a 1."}, {"m": "M6", "t": "¿Qué caracteriza al aprendizaje por refuerzo frente al supervisado y no supervisado?", "o": ["dispone de un gran conjunto de datos etiquetados", "no hay datos de entrenamiento: un agente interactúa con un entorno y aprende de las recompensas", "solo busca grupos o clusters en los datos"], "c": 1, "e": "En RL no hay un dataset fijo: el agente aprende por ensayo y error interactuando con el entorno, guiado únicamente por las recompensas que recibe tras cada acción."}, {"m": "M6", "t": "En el bucle del aprendizaje por refuerzo, tras ejecutar una acción at en el estado st, el entorno devuelve...", "o": ["la acción óptima correcta", "un nuevo estado st+1 y una recompensa rt+1", "la política completa"], "c": 1, "e": "El bucle es: el agente ejecuta at en st, y el entorno responde con un nuevo estado st+1 y una recompensa rt+1. Nunca se le da la acción correcta (eso sería supervisado)."}, {"m": "M6", "t": "Cuando el agente solo percibe parte del estado del entorno (p. ej. con sensores), se dice que recibe...", "o": ["una observación (en lugar del estado completo), convirtiendo el problema en un POMDP", "la recompensa acumulada", "la política objetivo"], "c": 0, "e": "Si el agente no percibe el estado completo recibe una observación parcial; el problema deja de ser un MDP totalmente observable y se convierte en un POMDP, frecuente en sistemas robóticos reales."}, {"m": "M6", "t": "El objetivo de cualquier problema de aprendizaje por refuerzo es...", "o": ["minimizar el número de estados", "crear un agente que maximice la recompensa acumulada G", "memorizar todas las trayectorias"], "c": 1, "e": "Todo problema de RL se formula como maximizar la recompensa acumulada G(k)=Σ ri hasta completar la tarea. El agente busca la secuencia de acciones que maximiza esa suma."}, {"m": "M6", "t": "Una recompensa 'dispersa' (sparse) es aquella que...", "o": ["se recibe en cada iteración", "solo se recibe (distinta de cero) al lograr objetivos principales o completar la tarea", "siempre es negativa"], "c": 1, "e": "Las recompensas dispersas solo aparecen al alcanzar objetivos importantes (p. ej. soldar una pieza), a diferencia de las densas, que se reciben en casi cada iteración (p. ej. cada paso sin caer)."}, {"m": "M6", "t": "La política (π) de un agente de RL es...", "o": ["el conjunto de criterios para decidir qué acción ejecutar dado el estado actual", "la lista de todas las recompensas posibles", "el modelo del entorno"], "c": 0, "e": "La política define cómo actúa el agente: dado el estado, qué acción elige. El objetivo del entrenamiento es encontrar la política que maximiza la recompensa acumulada."}, {"m": "M6", "t": "En una política ε-avariciosa (ε-greedy), el parámetro ε regula...", "o": ["la tasa de aprendizaje", "el equilibrio entre exploración (acción aleatoria con probabilidad ε) y explotación (mejor acción con probabilidad 1−ε)", "el factor de descuento"], "c": 1, "e": "La política ε-greedy elige una acción al azar con probabilidad ε (exploración) o la mejor acción conocida con probabilidad 1−ε (explotación). Suele aplicarse una atenuación (decay) que reduce ε con el tiempo."}, {"m": "M6", "t": "La atenuación (decay) de ε durante el entrenamiento busca que el agente...", "o": ["explore mucho al principio y explote más a medida que aprende", "explote siempre desde el inicio", "nunca explore"], "c": 0, "e": "Al inicio interesa explorar (ε alto, próximo a 1) porque el agente no conoce las consecuencias; al avanzar conviene explotar lo aprendido (ε bajo). El decay reduce ε progresivamente."}, {"m": "M6", "t": "Un método de RL es 'sin modelo' (model-free) cuando...", "o": ["conoce perfectamente las transiciones estado-acción del entorno", "aprende solo mediante las interacciones con el entorno, sin una descripción completa de su funcionamiento", "no usa recompensas"], "c": 1, "e": "Los métodos sin modelo aprenden por interacción, sin conocer a priori las transiciones del entorno. Los basados en modelo sí disponen de una descripción completa (transiciones), pero suelen ser inviables salvo en entornos pequeños."}, {"m": "M6", "t": "La diferencia entre métodos 'on-policy' (política actual) y 'off-policy' (política óptima) es que los off-policy...", "o": ["usan una sola política para actuar y aprender", "usan dos políticas: una de comportamiento (para actuar) y una objetivo (que aprende), lo que da más estabilidad", "no aprenden nada"], "c": 1, "e": "Los off-policy mantienen una política de comportamiento (interactúa, se actualiza de vez en cuando) y una política objetivo (aprende constantemente), lo que estabiliza el aprendizaje. Q-learning es off-policy; SARSA es on-policy."}, {"m": "M6", "t": "La tabla Q(s,a) almacena...", "o": ["la recompensa acumulada estimada de tomar la acción a en el estado s", "la probabilidad de cada estado", "el número de episodios ejecutados"], "c": 0, "e": "La tabla Q (valores-acciones) tiene una fila por estado y una columna por acción, y guarda la recompensa acumulada estimada (calidad, quality) de ejecutar la acción a en el estado s. El agente elige argmax_a Q(s,a)."}, {"m": "M6", "t": "El factor de descuento λ (gamma), entre 0 y 1, sirve para...", "o": ["restar peso a las recompensas más lejanas en el tiempo", "aumentar el número de estados", "eliminar la exploración"], "c": 0, "e": "El factor de descuento (λ^t, típicamente 0.95–0.99) hace que las recompensas futuras pesen menos que las inmediatas, facilitando el aprendizaje. Cuanto mayor λ, más se valoran las recompensas lejanas."}, {"m": "M6", "t": "La ecuación de Bellman permite calcular el valor de un estado...", "o": ["recorriendo siempre la trayectoria completa hasta el final", "de forma recursiva, como la recompensa inmediata más el valor descontado del estado siguiente", "sin usar ninguna recompensa"], "c": 1, "e": "Bellman define V(s)=E[rt + γ·V(st+1)]: el valor de un estado en función del valor del siguiente. Esta estrategia (bootstrapping) permite aprender con cada acción, sin recorrer trayectorias enteras como el método de Montecarlo."}, {"m": "M6", "t": "El 'bootstrapping' en el aprendizaje por diferencia temporal (TD) consiste en...", "o": ["esperar al final del episodio para actualizar valores", "estimar el valor de un estado a partir de los valores estimados de los estados sucesores", "muestrear datos con repetición"], "c": 1, "e": "En TD se aplica la idea de Bellman: se actualiza el valor de un estado usando la estimación del estado siguiente, permitiendo aprender en cada acción sin esperar al final de la trayectoria (a diferencia de Montecarlo)."}, {"m": "M6", "t": "La diferencia principal entre SARSA y Q-learning es que...", "o": ["SARSA usa una política (on-policy) y Q-learning usa la acción de valor máximo del estado siguiente (off-policy)", "son exactamente iguales", "Q-learning no usa tabla Q"], "c": 0, "e": "SARSA actualiza con Q(st+1, at+1) siguiendo la política actual (on-policy); Q-learning actualiza con max_a Q(st+1, a) —la mejor acción— y usa dos políticas (off-policy), siendo más eficiente."}, {"m": "M6", "t": "En la actualización de Q-learning, el término 'max_a Q(st+1, a)' refleja que el método...", "o": ["elige la acción siguiente al azar", "asume que en el estado siguiente se tomará la mejor acción posible", "ignora el estado siguiente"], "c": 1, "e": "Q-learning usa el valor de la mejor acción del estado siguiente (max), aprendiendo hacia la política óptima independientemente de la acción que realmente ejecute la política de comportamiento (off-policy)."}, {"m": "M6", "t": "La principal limitación de Q-learning tabular es que...", "o": ["no converge nunca", "la tabla Q crece demasiado cuando el número de estados es grande (memoria y tiempo de entrenamiento)", "solo funciona con recompensas negativas"], "c": 1, "e": "La tabla Q tiene tamaño |S|×|A|; en problemas complejos el número de estados es enorme y la tabla se vuelve inabarcable. La solución es aproximar Q con una función (p. ej. una red neuronal)."}, {"m": "M6", "t": "En las redes Q profundas (DQN), el 'replay buffer' (memoria de experiencia) sirve para...", "o": ["almacenar el modelo del entorno", "extraer ejemplos pasados al azar de modo que sean independientes e idénticamente distribuidos (IID) y estabilizar el descenso de gradientes", "eliminar la exploración"], "c": 1, "e": "Usar las últimas N iteraciones (muy correlacionadas) desestabiliza el entrenamiento. El replay buffer guarda muchas experiencias pasadas y muestrea N al azar, logrando ejemplos más IID y reutilizándolos."}, {"m": "M6", "t": "La segunda gran mejora de DQN, usar una 'red objetivo' que se actualiza solo cada cierto número de iteraciones, resuelve el problema...", "o": ["del objetivo móvil (los parámetros y el valor que se aproxima cambiaban a la vez)", "de la falta de recompensas", "del exceso de estados"], "c": 0, "e": "Si la red ajusta θ para producir yi mientras yi también cambia, hay un 'objetivo móvil' e inestabilidad. La red objetivo mantiene yi fijo durante N iteraciones, estabilizando el aprendizaje."}, {"m": "M6", "t": "En el DQN original para juegos de Atari, ¿por qué la red recibe como entrada las 4 últimas imágenes del juego?", "o": ["para reducir el coste computacional", "porque con una sola imagen no se puede deducir el movimiento (velocidad y dirección de los objetos)", "para aumentar el número de clases"], "c": 1, "e": "Una sola imagen no informa de la dirección/velocidad (p. ej. hacia dónde va la pelota). Apilar las 4 últimas imágenes permite a la red deducir el movimiento. La red tiene capas convolucionales seguidas de capas densas."}, {"m": "M6", "t": "En la PEC6 (navegación de un dron), una política reactiva basada en 'campos de fuerza' (atracción al objetivo + repulsión de obstáculos)...", "o": ["es siempre óptima", "funciona razonablemente pero presenta oscilaciones y no planifica ni se adapta bien, lo que motiva usar RL", "no necesita ningún sensor"], "c": 1, "e": "Las políticas puramente reactivas (campos potenciales) logran comportamientos básicos pero oscilan y no planifican ni generalizan a situaciones nuevas, especialmente con percepción parcial y entornos dinámicos; por eso se recurre al aprendizaje por refuerzo."}];

 "la proporción de acciones aleatorias (exploración) frente a la mejor acción conocida (explotación)",
 "el peso que reciben las recompensas lejanas en el tiempo frente a las inmediatas"],
e:"En ε-greedy, con probabilidad ε el agente actúa al azar (explora, por si hay algo mejor que lo conocido) y con 1−ε elige la acción de mayor Q (explota). ε suele empezar alto e ir decayendo: primero conocer el entorno, después aprovecharlo. Las tres letras griegas del RL: ε = exploración, α = tasa de aprendizaje, γ = descuento. Si la pregunta habla de «equilibrio explorar/explotar», la respuesta lleva ε.",
w:{0:"El tamaño del paso de actualización es α (tasa de aprendizaje): V/Q ← V/Q + α·[error TD].",
   2:"El peso de las recompensas lejanas lo controla γ (factor de descuento): G = Σ γᵗ·rₜ."}},
q72:{c:1,o:[
 "se promedian ponderándolas por la precisión de validación que obtuvo cada clasificador",
 "se usan como atributos de entrada (pseudoetiquetas) de un metaalgoritmo que aprende a combinarlas",
 "se filtran, conservando únicamente aquellas en las que todos los clasificadores coinciden"],
e:"La idea diferencial del stacking es que la combinación NO es una regla fija (voto, promedio, pesos), sino algo APRENDIDO: las predicciones de los modelos de nivel 0 se apilan como atributos de un nuevo dataset con el que se entrena un metamodelo de nivel 1. Así puede descubrir, por ejemplo, que el clasificador 2 es fiable solo en cierta región del espacio. Voto/promedio = bagging; pesos adaptativos sobre ejemplos = boosting; combinar APRENDIENDO = stacking.",
w:{0:"El promedio ponderado por precisión sigue siendo una regla fija de combinación (un soft voting con pesos); el stacking sustituye esa regla por un modelo entrenado.",
   2:"Quedarse solo con los casos de unanimidad descartaría la mayoría de predicciones y no aprende nada sobre cómo combinar los desacuerdos, que es donde está el valor."}},
q126:{c:1,o:[
 "guardar los pares estado-acción más recientes para entrenar siempre con la experiencia más actual",
 "muestrear experiencias pasadas al azar, logrando ejemplos casi independientes (IID) que estabilizan el gradiente",
 "mantener una copia de los pesos de la red que solo se actualiza cada N iteraciones"],
e:"Las experiencias consecutivas de un agente están muy correlacionadas (cada estado se parece al anterior), y entrenar una red con datos correlacionados desestabiliza el descenso de gradiente. El replay buffer almacena muchas transiciones (s,a,r,s′) y entrena con MINI-LOTES ALEATORIOS de ellas: rompe la correlación temporal (ejemplos ~IID) y además reutiliza la experiencia varias veces. Es uno de los dos estabilizadores de DQN; el otro es la red objetivo.",
w:{0:"Entrenar solo con lo más reciente es justo el problema que el buffer evita: lo reciente está correlacionado entre sí y la red olvida lo aprendido antes.",
   2:"La copia de pesos congelada que se actualiza cada N pasos es la RED OBJETIVO (target network), el otro mecanismo de DQN: no lo confundas con el buffer."}},
q129:{c:1,o:[
 "consigue trayectorias casi óptimas si se calibran con cuidado los coeficientes de atracción y repulsión",
 "funciona razonablemente, pero oscila y no planifica ni se adapta, lo que motiva pasar a aprendizaje por refuerzo",
 "resulta inviable en la práctica porque exige conocer por adelantado el mapa completo del entorno"],
e:"Una política reactiva de campos de fuerza (vector hacia el objetivo + repulsión de los obstáculos) produce comportamientos básicos aceptables, pero tiene límites estructurales: oscila entre fuerzas contrapuestas, se atasca en mínimos locales (p. ej., un obstáculo en forma de U), no planifica a futuro y no mejora con la experiencia. El RL aborda justo eso: aprender de las interacciones una política que maximice la recompensa a largo plazo.",
w:{0:"Por bien calibrada que esté, una política reactiva pura no anticipa: sigue oscilando y cayendo en mínimos locales; no existe calibración que la haga óptima en entornos complejos.",
   2:"Al contrario: los campos de fuerza son locales (solo usan lo que el dron percibe en cada instante); precisamente por eso no planifican. No requieren mapa completo."}},
q47:{c:1,o:[
 "ReLU, porque garantiza salidas positivas y entrenamiento rápido también en la última capa",
 "softmax: una unidad por clase, con salidas positivas que suman 1 (distribución de probabilidad)",
 "una sigmoide por unidad, porque acota cada salida de forma independiente entre 0 y 1"],
e:"Para clases mutuamente EXCLUYENTES (la imagen es un dígito: o es un 3 o es un 7), softmax es la elección natural: normaliza las salidas para que sumen 1 y se interpreten como P(clase|entrada); subir una baja las demás, codificando la exclusividad. Mapa rápido de salidas: regresión → lineal; binaria o etiquetas NO excluyentes → sigmoide(s); multiclase excluyente → softmax. ReLU vive en las capas ocultas.",
w:{0:"ReLU es la reina de las capas OCULTAS: en la salida no produce probabilidades (no está acotada ni suma 1).",
   2:"Sigmoides independientes son lo correcto en MULTIETIQUETA (cada clase sí/no por separado); con clases excluyentes no garantizan que las probabilidades sumen 1."}},
q123:{c:0,o:[
 "SARSA aprende con la acción que realmente ejecuta (on-policy) y Q-learning con la mejor acción posible del estado siguiente (off-policy)",
 "SARSA mantiene una tabla de valores estado-acción mientras que Q-learning trabaja directamente sobre los valores de estado V(s)",
 "SARSA necesita aprender un modelo de las transiciones del entorno mientras que Q-learning es un método sin modelo"],
e:"Ambos son TD, tabulares y sin modelo; la diferencia está en el término del estado siguiente. SARSA: r + γ·Q(s′,a′) con la acción a′ que la política REALMENTE eligió (por eso s,a,r,s,a y por eso on-policy: evalúa la política que está usando). Q-learning: r + γ·maxₐQ(s′,a), lo mejor posible aunque no lo haya hecho (off-policy: aprende la política óptima mientras se comporta con otra, p. ej. ε-greedy). Consecuencia práctica: SARSA es más conservador; Q-learning va más directo al óptimo.",
w:{1:"Los dos usan tabla Q(s,a); ninguno trabaja solo con V(s) — de hecho V(s) sola no permite elegir acción sin modelo del entorno.",
   2:"Ambos son model-free: aprenden de la interacción sin estimar las probabilidades de transición. La diferencia on/off-policy no tiene que ver con el modelo."}},
q82:{c:1,o:[
 "reducir automáticamente la tasa de aprendizaje cuando la mejora de la pérdida se estanca",
 "evitar el sobreajuste deteniendo el entrenamiento cuando la pérdida de validación deja de mejorar",
 "guardar el mejor modelo visto y reanudar desde él si la pérdida vuelve a empeorar"],
e:"EarlyStopping vigila una métrica de VALIDACIÓN (val_loss): si no mejora durante `patience` épocas, corta el entrenamiento. La lógica: cuando val_loss se estanca o sube mientras el loss de entrenamiento sigue bajando, el modelo está empezando a memorizar (sobreajuste); seguir entrenando solo empeora la generalización. Suele combinarse con restore_best_weights para quedarse con el mejor punto. Es la regularización «gratis»: no toca la arquitectura ni la función de coste.",
w:{0:"Bajar la learning rate al estancarse es otro callback: ReduceLROnPlateau. EarlyStopping no ajusta hiperparámetros, detiene el proceso.",
   2:"Guardar el mejor modelo es ModelCheckpoint (y EarlyStopping puede restaurarlo al parar), pero nunca «reanuda» el entrenamiento: lo termina."}},
q44:{c:1,o:[
 "la anchura del kernel gaussiano y, con ella, lo ajustada que queda la frontera a los datos",
 "el equilibrio entre maximizar el margen y penalizar los errores de clasificación (variables ξ)",
 "el número máximo de vectores de soporte que el modelo puede llegar a utilizar"],
e:"En el margen flexible se permite que algunos puntos violen el margen (errores ξᵢ) a cambio de un margen mayor. C pone precio a esos errores: C GRANDE = errores caros → margen rígido y estrecho, riesgo de sobreajuste; C PEQUEÑO = errores baratos → margen ancho y flexible, mejor generalización (menos varianza). Se explora en potencias de 10. No confundir los dos mandos de una SVM-RBF: C regula errores/margen; γ regula la forma (localidad) de la frontera.",
w:{0:"La anchura del kernel RBF la controla γ (gamma): γ alto = frontera muy local y ajustada. C existe incluso con kernel lineal.",
   2:"El número de vectores de soporte no se fija como parámetro: emerge de la optimización (e indirectamente refleja la dificultad del problema)."}},
q84:{c:1,o:[
 "se sustituyen sus pesos por una inicialización aleatoria nueva para adaptarlos al dominio del problema",
 "se congelan para conservar los pesos preentrenados, entrenando inicialmente solo la cabeza nueva",
 "se reentrenan todas desde la primera época con una tasa de aprendizaje alta para acelerar la adaptación"],
e:"El orden canónico del transfer learning: 1) congelar TODO el modelo base (sus convoluciones ya saben ver bordes, texturas, formas: conocimiento general de ImageNet) y entrenar solo la cabeza nueva; 2) opcionalmente, fine-tuning: descongelar las últimas capas con una tasa de aprendizaje MUY baja. ¿Por qué congelar primero? Porque la cabeza recién inicializada genera gradientes grandes y caóticos que destrozarían los pesos preentrenados si estuvieran descongelados.",
w:{0:"Reinicializar aleatoriamente equivale a tirar el preentrenamiento a la basura: sería entrenar desde cero, que es justo lo que el transfer learning evita.",
   2:"Reentrenar todo con tasa alta destruye los pesos buenos (catastrophic forgetting). El fine-tuning llega después, parcial y con tasa muy baja."}},
q222:{c:0,o:[
 "usa el máximo de Q sobre las acciones del estado siguiente en lugar de la acción realmente tomada",
 "actualiza los valores al final de cada episodio completo en lugar de hacerlo paso a paso",
 "prescinde de la política de exploración porque siempre elige la acción de mayor valor estimado"],
e:"Las dos fórmulas solo difieren en un término: SARSA usa r + γ·Q(s′,a′) (la acción a′ que de verdad ejecutó su política, on-policy) y Q-learning usa r + γ·maxₐQ(s′,a) (lo mejor disponible, lo haya hecho o no: off-policy). Ese «max» hace a Q-learning optimista: aprende el valor de la política óptima aunque se esté comportando de forma exploratoria. Mnemónico: Q-learning = «¿Qué es lo MÁXimo que podría sacar desde aquí?».",
w:{1:"Ambos son métodos de diferencia temporal: actualizan EN CADA PASO usando bootstrapping. Esperar al final del episodio es lo que hace Montecarlo.",
   2:"Q-learning sigue necesitando explorar: su política de COMPORTAMIENTO es típicamente ε-greedy. El «max» aparece en la actualización, no en cómo actúa."}},
q111:{c:0,o:[
 "una observación (en lugar del estado completo), y el problema se convierte en un POMDP",
 "una estimación del estado: el valor V(s) que su función de valor predice para la situación actual",
 "un estado agregado: el promedio de los últimos estados que han percibido sus sensores"],
e:"Cuando los sensores no captan todo (una cámara solo ve su cono de visión), el agente recibe una OBSERVACIÓN parcial en vez del estado completo, y el problema pasa de MDP a POMDP (partially observable MDP). Es la situación normal en robótica real, frente a juegos de tablero donde se ve todo. Importa porque la mayoría de algoritmos asumen estado completo; con observaciones parciales hacen falta trucos (memoria/recurrencia, apilar frames como hace DQN en Atari).",
w:{1:"V(s) es una valoración que el propio agente calcula DESPUÉS de percibir; no es lo que recibe del entorno. Además confunde percepción con estimación de valor.",
   2:"Promediar estados pasados sería una técnica del agente para construir contexto, no lo que el entorno entrega; y un promedio no define el concepto de observación."}},
q104:{c:1,o:[
 "valore con una escala numérica los ítems recomendados para reentrenar el modelo de fondo",
 "indique cambios sobre el ítem recomendado («más barato», «más capacidad») para refinar la búsqueda",
 "especifique de antemano todas las condiciones duras que el producto debe cumplir obligatoriamente"],
e:"En los recomendadores basados en casos, el sistema propone un ítem de referencia y el usuario lo CRITICA: «como este, pero más barato», «con más capacidad»… Cada crítica refina la búsqueda hacia productos parecidos que satisfacen el cambio pedido: navegación iterativa por el catálogo, ideal cuando el usuario no sabe formular sus requisitos exactos de entrada pero los reconoce al ver ejemplos.",
w:{0:"Las valoraciones numéricas (estrellas) alimentan el filtraje COLABORATIVO; los basados en casos funcionan sin historial de valoraciones.",
   2:"Las condiciones fijadas de antemano (precio < X AND capacidad ≥ Y) definen los sistemas basados en RESTRICCIONES, la otra variante de los basados en conocimiento."}},
q53:{c:1,o:[
 "el número de clases posibles es mayor que dos, siendo las clases mutuamente excluyentes",
 "cada ejemplo puede tener asociadas varias etiquetas simultáneamente (o incluso ninguna)",
 "las etiquetas se organizan en una jerarquía con varios niveles de generalidad"],
e:"Multiclase: el ejemplo pertenece a UNA sola clase de entre >2 (un animal es perro O gato O pájaro). Multietiqueta: f(x) devuelve un CONJUNTO de etiquetas, posiblemente vacío (una película puede ser comedia Y romántica Y española a la vez). Implicación práctica en redes: multiclase → softmax (suma 1); multietiqueta → una sigmoide independiente por etiqueta.",
w:{0:"«Más de dos clases excluyentes» es exactamente la definición de MULTICLASE, no la diferencia con ella.",
   2:"La organización jerárquica (clasificación jerárquica/taxonomías) es otro paradigma distinto; la multietiqueta no exige ninguna jerarquía entre etiquetas."}},
q113:{c:1,o:[
 "se recibe en casi todas las iteraciones, dando al agente una señal de progreso constante",
 "solo es distinta de cero al lograr objetivos importantes o al completar la tarea",
 "se reparte uniformemente entre todas las acciones del episodio una vez terminado"],
e:"Recompensa DISPERSA (sparse): el agente pasa la mayoría de pasos sin señal (recompensa 0) y solo cobra al alcanzar hitos o terminar (p. ej., +1 al ganar la partida). Son las más difíciles de aprender: con miles de acciones entre recompensa y recompensa, ¿cuál tuvo la culpa del éxito? (problema de asignación de crédito). Antónimo: densa (señal en casi cada paso, p. ej. +0.1 por cada paso sin caerse). Eje independiente del momento: inmediata vs. diferida.",
w:{0:"Recibir señal en casi cada paso es la recompensa DENSA, justo el caso contrario.",
   2:"Repartir la recompensa final entre las acciones es una técnica de asignación de crédito (lo que hace implícitamente el descuento γ), no la definición de dispersa."}},
q118:{c:1,o:[
 "actualizan sus estimaciones de valor únicamente cuando el episodio ha terminado por completo",
 "separan la política que actúa en el entorno (comportamiento) de la que aprende (objetivo)",
 "pueden prescindir de la exploración porque su política objetivo ya nace siendo óptima"],
e:"On-policy (SARSA): una ÚNICA política hace de todo —actúa y aprende—, evaluándose a sí misma; es coherente pero inestable, porque cambia mientras se usa. Off-policy (Q-learning): DOS políticas con roles separados: la de comportamiento explora el entorno (p. ej. ε-greedy) y la objetivo acumula el aprendizaje y será la final; periódicamente se sincronizan. La separación aporta estabilidad y permite aprender de experiencia generada por otra política (incluso de un buffer antiguo, como en DQN).",
w:{0:"Actualizar solo al final del episodio es Montecarlo vs. diferencia temporal: un eje distinto del on/off-policy. SARSA y Q-learning actualizan paso a paso ambos.",
   2:"Nada nace óptimo: precisamente la política de comportamiento existe para EXPLORAR; sin exploración no se descubren alternativas mejores."}},
q95:{c:1,o:[
 "porque exige que los dos usuarios hayan valorado exactamente los mismos ítems del catálogo",
 "porque su valor depende del número de ítems en común: cuantos más compartan, mayor tiende a ser la distancia",
 "porque trata igual los ítems que ambos valoraron y los que solo ha valorado uno de los dos"],
e:"La euclídea suma un término por cada ítem valorado en común: dos usuarios con 50 ítems compartidos acumulan más sumandos (y normalmente más distancia) que dos con 3 ítems, aunque coincidan menos en gustos. Además ignora las escalas personales (el que puntúa todo 4-5 vs. el que puntúa 1-3). Pearson arregla ambas cosas: resta la media de cada usuario y normaliza, midiendo la TENDENCIA común (∈[−1,1]) con independencia del número de ítems y de la escala.",
w:{0:"No exige catálogos idénticos: se calcula sobre la intersección de ítems valorados por ambos. El problema es cómo crece con el tamaño de esa intersección.",
   2:"Es lo contrario: la euclídea SOLO usa los ítems en común (los demás ni entran en la fórmula); su defecto está en depender de cuántos sean."}},
q125:{c:1,o:[
 "que necesita conocer las probabilidades de transición del entorno antes de empezar a aprender",
 "que la tabla crece como |S|×|A| y se vuelve inabarcable en memoria y tiempo con muchos estados",
 "que solo admite recompensas inmediatas, sin poder aplicar el factor de descuento γ"],
e:"La tabla Q necesita una celda por par (estado, acción) y visitar cada par muchas veces para estimar bien su valor. Con espacios de estados realistas (ajedrez 10¹²⁰, Go 10¹⁷⁰, imágenes de una cámara) ni cabe en memoria ni hay tiempo de entrenarla: maldición de la dimensionalidad. Solución: sustituir la tabla por un APROXIMADOR de funciones —una red neuronal— que generalice entre estados parecidos: eso es DQN.",
w:{0:"Q-learning es model-free: aprende interactuando, sin estimar transiciones. Los que usan transiciones son los métodos basados en modelo (programación dinámica).",
   2:"Q-learning incorpora γ en su actualización (r + γ·maxQ): maneja recompensas diferidas sin problema. Su límite es el tamaño del espacio de estados."}},
q30:{c:0,o:[
 "asume una relación lineal con el log-odds, y los datos reales rara vez son separables linealmente",
 "tiende a sobreajustar con facilidad, sobre todo en conjuntos de datos de baja dimensionalidad",
 "sus parámetros β no pueden estimarse de forma eficiente cuando el conjunto de datos crece"],
e:"La regresión logística modela ln[P/(1−P)] = β₀+β₁x₁+…: una combinación LINEAL. Su frontera de decisión es por tanto un hiperplano, y si las clases no son separables linealmente (lo habitual en el mundo real), el modelo se queda corto por diseño. A cambio ofrece ventajas: poco propensa al sobreajuste, eficiente de entrenar, interpretable y con salida probabilística.",
w:{1:"Es justo al revés: la regresión logística es de los modelos MENOS propensos al sobreajuste, por su simplicidad (pocos parámetros, frontera lineal).",
   2:"Se entrena de forma muy eficiente (máxima verosimilitud con optimización convexa), incluso con muchos datos: es otra de sus virtudes."}},
q31:{c:1,o:[
 "construye su modelo de forma incremental, refinándolo cada vez que clasifica un ejemplo nuevo",
 "pospone toda la generalización al momento de clasificar: en entrenamiento solo guarda los ejemplos",
 "comprime el conjunto de entrenamiento en unos pocos prototipos para acelerar cada consulta"],
e:"kNN no induce ningún modelo durante el «entrenamiento»: literalmente almacena los datos y se echa a dormir (lazy). Todo el trabajo —calcular distancias a todos los ejemplos, ordenar, votar entre los k vecinos— ocurre al clasificar. Consecuencias: entrenamiento instantáneo pero clasificación LENTA (malo para tiempo real), y el coste crece con el tamaño del conjunto guardado. Lo opuesto son los métodos «eager» (árboles, SVM, redes), que invierten el esfuerzo antes.",
w:{0:"kNN no refina nada con cada clasificación: el conjunto guardado no cambia. Aprender incrementalmente sería un enfoque online, distinto.",
   2:"Comprimir en prototipos es el clasificador por CENTROIDES (o clustering dentro de clases): precisamente la alternativa «diligente» a kNN."}},
q58:{c:0,o:[
 "minimizar la suma de las varianzas de y en los dos subconjuntos resultantes de la partición",
 "maximizar la ganancia de información calculada con la entropía de los subconjuntos",
 "minimizar la profundidad total del árbol manteniendo hojas con suficientes ejemplos"],
e:"En regresión las hojas predicen la MEDIA de las y que les llegan, así que el mejor corte es el que deja los dos grupos lo más homogéneos posible en y: argmin Var(A)+Var(B). La conexión elegante: la varianza de un grupo ES su MSE respecto a una recta horizontal en la media, o sea, el criterio minimiza directamente el error del modelo. Traducción clasificación→regresión: entropía→varianza, clase mayoritaria→media.",
w:{1:"La entropía/ganancia de información necesita CLASES para contar proporciones: es el criterio de los árboles de clasificación (ID3), sin sentido con y continua.",
   2:"La profundidad se controla aparte como regularización (max_depth, poda); no es el criterio que decide cada división."}},
q127:{c:0,o:[
 "del objetivo móvil: la red perseguía un valor objetivo que cambiaba con sus propios pesos",
 "de la correlación temporal entre las experiencias consecutivas que genera el agente",
 "de la sobreestimación sistemática del valor de las acciones poco visitadas por la política"],
e:"Sin red objetivo, la misma red calcula su predicción Q(s,a) Y el objetivo r+γ·maxQ(s′,a): cada actualización de pesos mueve también el objetivo, como perseguir una diana que se desplaza con cada disparo — inestabilidad pura. La target network es una copia CONGELADA que da objetivos fijos durante N iteraciones y luego se sincroniza. Los dos males y sus dos remedios en DQN: objetivo móvil → red objetivo; correlación temporal → experience replay.",
w:{1:"La correlación entre experiencias consecutivas la resuelve el EXPERIENCE REPLAY (muestreo aleatorio del buffer), el otro pilar de DQN.",
   2:"La sobreestimación del max es un sesgo real de Q-learning, pero lo aborda Double DQN (posterior), no la red objetivo básica."}},
q41:{c:1,o:[
 "ortogonal y con determinante igual a uno",
 "simétrica y semidefinida positiva (todos sus valores propios ≥ 0)",
 "triangular y diagonalmente dominante"],
e:"La matriz kernel contiene κ(xᵢ,xⱼ)=⟨φ(xᵢ),φ(xⱼ)⟩ para cada par de ejemplos. Como el producto escalar es conmutativo, es SIMÉTRICA (κ(x,z)=κ(z,x)); y para que represente un producto escalar válido en algún espacio debe ser SEMIDEFINIDA POSITIVA (valores propios ≥ 0) — condición del teorema de Mercer. Si una función no produce matrices así, no es un kernel legítimo y el truco del kernel no tiene garantías.",
w:{0:"Ortogonalidad y determinante 1 caracterizan a las matrices de rotación, sin relación con los kernels.",
   2:"Una matriz kernel casi nunca es triangular (es simétrica con entradas no nulas a ambos lados); la dominancia diagonal tampoco es requisito."}},
q77:{c:0,o:[
 "bloques Conv2D + MaxPooling2D, seguidos de una capa densa y una salida softmax",
 "bloques Conv2D + BatchNormalization sin pooling, con una salida sigmoide por cada clase",
 "capas densas con dropout intercalado y una única capa convolucional antes de la salida"],
e:"Arquitectura CNN de manual y la usada en la PEC4: [Conv2D → MaxPooling2D] repetido (extraen características y reducen resolución), luego Flatten + capa densa (combinan lo extraído) y softmax final con una neurona por clase (3: adidas/converse/nike). El patrón general: al avanzar, el alto×ancho baja y los canales suben; las densas siempre al final.",
w:{1:"BatchNorm es un complemento válido, pero quitar el pooling impide reducir la resolución; y la sigmoide por clase es para multietiqueta — aquí las clases son excluyentes (softmax).",
   2:"Invertir el orden (densas antes que convolución) destruye la estructura espacial de la imagen que la convolución necesita: las densas van al final."}},
q74:{c:0,o:[
 "por descenso de gradiente, porque la función de coste MSE sigue siendo convexa y derivable",
 "resolviendo iterativamente un sistema de ecuaciones no lineales mediante búsqueda aleatoria",
 "probando puntos de corte sobre cada variable, como hacen los árboles de regresión"],
e:"Pasar de una variable a n variables no cambia la naturaleza del problema: J(θ) = (1/2m)Σ(θᵀxᵢ−yᵢ)² sigue siendo convexa (un único mínimo global) y derivable, así que el descenso de gradiente funciona igual: θ ← θ − η·∇J. La única diferencia es que ahora el gradiente tiene n+1 componentes. (También existe solución cerrada —ecuación normal—, pero el método estudiado y escalable es el gradiente.)",
w:{1:"No hay nada no lineal ni aleatorio: el modelo es lineal en θ y la optimización es determinista guiada por el gradiente.",
   2:"Los puntos de corte pertenecen a los árboles; la regresión lineal ajusta parámetros continuos de un hiperplano, no divide el espacio."}},
q38:{c:0,o:[
 "puntos de corte: promedios de valores consecutivos que generan decisiones binarias",
 "discretización previa en intervalos de igual frecuencia, fijada antes de construir el árbol",
 "normalización min-max previa, para que el árbol compare los atributos en la misma escala"],
e:"El procedimiento del módulo: ordenar los valores del atributo, eliminar repetidos, generar candidatos como el PROMEDIO de cada par consecutivo, y elegir el de mejor bondad. El corte produce una decisión binaria (≤ umbral / > umbral) y —a diferencia de los nominales— el atributo numérico PUEDE reutilizarse más abajo con otro umbral. Detalle fino: solo hace falta evaluar cortes entre valores de clase distinta.",
w:{1:"Discretizar a priori en intervalos fijos existe como preproceso general, pero pierde información: el árbol busca el corte ÓPTIMO para cada nodo dinámicamente.",
   2:"Los árboles son invariantes a la escala (comparan con umbrales, y el orden no cambia al normalizar): la normalización ni les ayuda ni la necesitan."}},
q166:{c:0,o:[
 "Hard voting: B (2 votos contra 1) · soft voting: A (media 0.567 frente a 0.433)",
 "Hard voting: A (gana el clasificador más seguro) · soft voting: B (mayoría de votos)",
 "Ambos predicen B: con votos es 2 a 1 y con medias queda 0.53 frente a 0.47"],
e:"Hard voting cuenta votos: el 1º vota A (0.9>0.1), el 2º y el 3º votan B (0.6>0.4) → B gana 2-1. Soft voting promedia probabilidades: A=(0.9+0.4+0.4)/3≈0.567, B=(0.1+0.6+0.6)/3≈0.433 → gana A. Moraleja de examen: pueden DISCREPAR, y el soft da más influencia a los clasificadores muy seguros (el 0.9 arrastra la media). Comprueba siempre con la cuenta, no de memoria.",
w:{1:"Tiene los métodos intercambiados: el que mira la seguridad (probabilidades) es el soft; el de mayoría de votos es el hard.",
   2:"La media de A no es 0.47 sino 0.567: el 0.9 del primer clasificador pesa mucho. Haz la suma antes de fiarte de una opción con números."}},
q98:{c:0,o:[
 "descompone la matriz de valoraciones en factores que capturan características latentes de usuarios e ítems",
 "agrupa a los usuarios en clústeres de gustos similares aplicando k-means sobre sus valoraciones",
 "construye un grafo de similitudes ítem-ítem y lo explora mediante paseos aleatorios"],
e:"La factorización (tipo SVD) busca R ≈ U·Vᵀ: cada usuario y cada ítem se representan con un vector de k FACTORES LATENTES (dimensiones de gusto que emergen de los datos: «acción», «cine independiente»…). La predicción es el producto escalar usuario·ítem, y U,V se aprenden minimizando el error sobre las celdas conocidas de una matriz muy dispersa. Fue la técnica estrella del Netflix Prize: captura patrones globales y escala bien.",
w:{1:"Agrupar usuarios con k-means es clustering: daría segmentos, no una predicción de valoración por ítem ni factores interpretables ítem-a-ítem.",
   2:"Los grafos con paseos aleatorios son otra familia de recomendación; la factorización trabaja con álgebra de matrices, no con recorridos de grafos."}},
q40:{c:0,o:[
 "el producto escalar ⟨φ(x),φ(z)⟩ en un espacio de mayor dimensión, sin construir φ explícitamente",
 "una proyección de los datos a menor dimensión que conserva la máxima varianza posible",
 "la probabilidad conjunta P(x,z) estimada según la distribución del conjunto de entrenamiento"],
e:"El kernel trick: para separar datos no lineales, proyéctalos a un espacio de MÁS dimensiones donde sí sean separables linealmente… pero sin pagar el coste de la proyección. κ(x,z) devuelve directamente el producto escalar ⟨φ(x),φ(z)⟩ del espacio destino operando sobre los puntos originales. Como en la formulación dual de la SVM los datos solo aparecen en productos escalares, basta sustituirlos por κ. Ojo a la dirección: kernel SUBE la dimensión (PCA la baja).",
w:{1:"Proyectar a MENOS dimensiones conservando varianza es PCA: la dirección opuesta al kernel, que (implícitamente) sube la dimensionalidad.",
   2:"Un kernel no es una probabilidad: es un producto escalar generalizado (medida de similitud geométrica), sin semántica probabilística."}},
q170:{c:0,o:[
 "bagging los entrena en paralelo con muestras aleatorias y boosting secuencialmente, centrado en los ejemplos difíciles",
 "bagging pondera el voto de cada clasificador por su precisión y boosting usa votos uniformes",
 "bagging remuestrea los atributos de entrada mientras que boosting remuestrea los ejemplos"],
e:"El contraste de examen: BAGGING = paralelo + bootstrap aleatorio + voto simple → reduce VARIANZA, robusto a outliers (Random Forest). BOOSTING = secuencial + pesos crecientes en los ejemplos fallados + voto ponderado por α → convierte clasificadores débiles en uno fuerte, reduce SESGO (AdaBoost). Cada palabra del par paralelo/secuencial, aleatorio/adaptativo te da la respuesta.",
w:{1:"Lo tiene cambiado: el voto ponderado (por αₜ = ½ln((1−ε)/ε)) es de AdaBoost/boosting; el bagging vota de forma uniforme.",
   2:"Remuestrear ATRIBUTOS es el método random subspaces. Bagging remuestrea ejemplos (bootstrap) y boosting los repondera."}},
q90:{c:1,o:[
 "ampliar el campo receptivo duplicando la resolución de los mapas de características",
 "reducir las dimensiones espaciales (submuestreo) conservando el valor máximo de cada región",
 "normalizar las activaciones de cada canal para estabilizar y acelerar la convergencia"],
e:"Max-pooling recorre cada mapa de características con una ventana (típicamente 2×2, stride 2) y se queda con el MÁXIMO de cada región: la salida tiene la mitad de alto y ancho (los canales no cambian). Beneficios: menos cómputo y parámetros aguas abajo, cierta invariancia a pequeñas traslaciones («la característica está por esta zona»), y campo receptivo efectivo mayor en capas siguientes. No tiene parámetros entrenables.",
w:{0:"El pooling REDUCE la resolución, nunca la duplica (eso sería upsampling, usado en otros contextos como segmentación o autoencoders).",
   2:"Normalizar activaciones por canal es BatchNormalization: otra capa, con parámetros aprendibles, que no reduce dimensiones."}},
q83:{c:0,o:[
 "descartar la capa de clasificación original para poder añadir una cabeza adaptada al nuevo problema",
 "cargar únicamente la arquitectura de la red, sin los pesos aprendidos en ImageNet",
 "impedir que las capas superiores del modelo se actualicen durante el fine-tuning"],
e:"`include_top=False` quita la «tapa» del modelo: la cabeza densa final que clasificaba en las 1000 clases de ImageNet. Te quedas con el extractor de características convolucional (con sus pesos preentrenados intactos) y añades tu propia cabeza —p. ej. GlobalAveragePooling + Dropout + Dense softmax con TUS clases—. Cada cosa con su parámetro: pesos → weights='imagenet'; congelar → layer.trainable=False; quitar cabeza → include_top=False.",
w:{1:"Los pesos los controla el parámetro weights ('imagenet' o None): include_top no toca los pesos de las capas que conserva.",
   2:"Congelar capas se hace con trainable=False; include_top decide qué capas EXISTEN, no cuáles se entrenan."}},
q196:{c:0,o:[
 "que el decodificador consulte todas las posiciones de la entrada en cada paso, en vez de solo el vector final",
 "comprimir la secuencia de entrada en un único vector de contexto más rico e informativo",
 "compartir los pesos entre codificador y decodificador para reducir los parámetros del modelo"],
e:"En el encoder-decoder clásico TODA la entrada debe caber en un único vector de contexto: con frases largas, ese cuello de botella pierde información. La atención lo elimina: en cada paso de generación, el decodificador calcula pesos sobre TODAS las posiciones de la entrada y atiende a las relevantes («al traducir esta palabra, mira aquella zona de la frase original»). Es la idea germinal de los Transformers.",
w:{1:"Comprimir en un solo vector es justo el cuello de botella que la atención viene a ELIMINAR, no a mejorar.",
   2:"La atención no comparte pesos entre módulos: añade conexiones ponderadas dinámicas entre decodificador y entrada (de hecho añade parámetros)."}},
q182:{c:0,o:[
 "La regularización L2 (weight decay): suma de los cuadrados de los pesos, ponderada por λ",
 "La regularización L1: suma de los valores absolutos de los pesos, ponderada por λ",
 "El término de momento (momentum), que suaviza las actualizaciones del gradiente"],
e:"L2 añade (λ/2n)·Σw² al coste: como el cuadrado castiga más a los pesos grandes, el gradiente los empuja proporcionalmente hacia cero («decaen», weight decay) sin anularlos del todo → modelos más suaves que generalizan mejor. L1 usa Σ|w| y tiene otro efecto característico: anula pesos por completo (esparsidad, selección de atributos implícita). Mnemónico: L2 = cuadrado = w²; L1 = primera potencia = |w|.",
w:{1:"L1 penaliza con |w| (valor absoluto), no con w²; su firma es producir pesos exactamente cero (esparsidad).",
   2:"El momentum modifica el OPTIMIZADOR (acumula inercia del gradiente); no añade ningún término a la función de coste."}},
q223:{c:0,o:[
 "la de comportamiento interactúa con el entorno y se actualiza periódicamente copiando la objetivo, que es la que aprende",
 "la objetivo interactúa con el entorno mientras la de comportamiento consolida y almacena el aprendizaje",
 "ambas aprenden en paralelo de las mismas experiencias y al final se conserva la de mayor recompensa media"],
e:"Reparto de papeles en Q-learning (off-policy): la política de COMPORTAMIENTO sale al mundo —típicamente ε-greedy, con su punto de aleatoriedad para explorar—; la política OBJETIVO se queda en casa aprendiendo de esas experiencias y es la que al final se usa. Cada cierto tiempo, la de comportamiento se sincroniza copiando a la objetivo, para explorar desde una base mejor. Nombres = funciones: comportamiento → se comporta; objetivo → es el objetivo final.",
w:{1:"Tiene los papeles invertidos: quien sale a interactuar es la de comportamiento; la objetivo es la que aprende y se conserva.",
   2:"No compiten ni se elige una al final: cooperan con roles fijos, y la objetivo es siempre la definitiva."}},
q103:{c:0,o:[
 "una consulta conjuntiva: varias condiciones unidas por AND que deben satisfacerse a la vez",
 "una crítica compuesta sobre un ítem de referencia («como este, pero mejor en dos aspectos»)",
 "una regla de asociación extraída del historial de compras de usuarios con gustos similares"],
e:"Los recomendadores basados en RESTRICCIONES convierten los requisitos explícitos del usuario en una consulta conjuntiva sobre el catálogo —[capacidad ≥ 8 AND precio < 400]— y devuelven los ítems que cumplen TODAS las condiciones. Si no hay resultados, el sistema puede proponer relajar alguna restricción. Es la variante «formulario» de los basados en conocimiento; la variante «navegación» son los basados en casos (critiquing).",
w:{1:"Las críticas («más barato que este») pertenecen a los recomendadores basados en CASOS: parten de un ítem ejemplo, no de condiciones formales.",
   2:"Las reglas de asociación se MINAN de datos de comportamiento (colaborativo); aquí las condiciones las declara el propio usuario."}},
q204:{c:0,o:[
 "dos matrices de rango bajo (usuarios×factores e ítems×factores) cuyo producto reconstruye las valoraciones",
 "una matriz de similitudes coseno entre ítems y un vector con la valoración media de cada usuario",
 "tantas matrices booleanas de incidencia como factores latentes se deseen extraer del catálogo"],
e:"R (usuarios×ítems, dispersa) ≈ U·Vᵀ, donde U es usuarios×k y V es ítems×k, con k factores latentes pequeños (decenas). Se aprenden minimizando el error de reconstrucción SOLO sobre las celdas conocidas (descenso de gradiente, a menudo con regularización), y la predicción de una celda vacía es el producto escalar del vector del usuario por el del ítem. La gracia: comprime millones de celdas en dos matrices finas que generalizan.",
w:{1:"Similitudes coseno + medias de usuario describen el filtraje colaborativo basado en ÍTEMS (memoria), no la factorización (modelo).",
   2:"Los factores latentes son dimensiones continuas de dos matrices densas, no colecciones de matrices booleanas."}},
q226:{c:0,o:[
 "calcular el objetivo r+γ·maxQ con una copia congelada de la red, que solo se actualiza periódicamente",
 "almacenar las transiciones pasadas del agente y servirlas en mini-lotes aleatorios a la red principal",
 "entrenar en paralelo dos redes con inicializaciones distintas y promediar sus predicciones finales"],
e:"El objetivo de entrenamiento de DQN (r+γ·maxQ) se calcula con una red CONGELADA —la target network— que se sincroniza con la principal solo cada N pasos. Sin ella, cada actualización de pesos movería también el objetivo a perseguir (objetivo móvil → inestabilidad). Los dos estabilizadores de DQN y a qué mal responde cada uno: target network ↔ objetivo móvil; experience replay ↔ correlación temporal de las muestras.",
w:{1:"Guardar transiciones y servir mini-lotes aleatorios es el EXPERIENCE REPLAY: el otro mecanismo de DQN, no la red objetivo.",
   2:"Promediar redes independientes sería un ensemble: la target network no es independiente (es una copia diferida de la principal) ni se promedia."}},
q80:{c:0,o:[
 "estabilizar y acelerar el entrenamiento normalizando las activaciones (media ≈ 0, desviación ≈ 1)",
 "elegir dinámicamente el tamaño de lote óptimo según la varianza del gradiente en cada época",
 "recortar los gradientes que superan un umbral para evitar que exploten en redes profundas"],
e:"BatchNormalization normaliza las activaciones de cada capa usando la media y desviación del mini-lote (y aprende dos parámetros, γ y β, para reescalar). Efectos: entrenamiento más estable y rápido (permite tasas de aprendizaje mayores), menos sensibilidad a la inicialización, y un ligero efecto regularizador por el ruido del lote. «Batch» se refiere a CON QUÉ normaliza (las estadísticas del mini-lote), no a que ajuste su tamaño.",
w:{1:"El batch size es un hiperparámetro que fijas tú; ninguna capa lo modifica dinámicamente. El «batch» del nombre indica de dónde salen las estadísticas.",
   2:"Recortar gradientes es gradient clipping: técnica contra la EXPLOSIÓN del gradiente (típica en RNN), independiente de BatchNorm."}},
q35:{c:1,o:[
 "evita tener que calcular distancias al clasificar: basta consultar la etiqueta del clúster asignado",
 "obtiene M centroides por clase: más representativo que un único centroide y más barato que comparar con todos los ejemplos",
 "permite entrenar un clasificador especializado e independiente dentro de cada uno de los clústeres"],
e:"Es el punto medio entre dos extremos. kNN puro: compara con TODOS los n ejemplos (representa perfectamente la clase, carísimo). Centroides: compara con C prototipos (baratísimo, pero un solo punto puede representar fatal una clase con forma compleja). Clustering dentro de clases: aplica k-means DENTRO de cada clase para sacar M representantes, y clasifica con kNN sobre los M×C centroides — buena representación a coste moderado.",
w:{0:"Las distancias siguen siendo necesarias: se clasifica con kNN sobre los centroides; lo que cambia es CUÁNTAS comparaciones (M×C en vez de n).",
   2:"No se entrena ningún clasificador por clúster: los clústeres solo aportan prototipos (centroides) para el kNN final."}},
q54:{c:1,o:[
 "porque los árboles normalizan internamente las ganancias de información al elegir cada punto de corte",
 "porque SVM y regresión logística operan con distancias y productos escalares sensibles a la escala, y los árboles dividen por umbrales invariantes a ella",
 "porque la normalización altera el orden relativo de los valores y los árboles dependen de ese orden"],
e:"SVM y regresión logística calculan productos escalares/distancias donde cada atributo aporta según su magnitud: un atributo en miles (longitud media de mayúsculas seguidas) aplastaría a uno en [0,1] (frecuencia de una palabra) — sin escalar, el modelo se sesga. Los árboles solo preguntan «¿x ≤ umbral?»: como escalar es una transformación monótona, el MISMO corte existe antes y después, y la entropía de la partición no cambia. Regla práctica: modelos de distancia/gradiente → escala; árboles y derivados (RF, boosting de árboles) → les da igual.",
w:{0:"No existe tal «normalización interna de ganancias»: la invariancia de los árboles viene de comparar con umbrales, no de corregir nada.",
   2:"Es al revés: min-max y estandarización son transformaciones MONÓTONAS que preservan el orden — por eso los árboles ni se enteran."}},
q67:{c:1,o:[
 "en paralelo, asignando a cada clasificador un subconjunto bootstrap independiente del resto",
 "secuencialmente, dando más peso a las muestras que fallaron los clasificadores de iteraciones anteriores",
 "secuencialmente, eliminando del entrenamiento las muestras que ya quedaron bien clasificadas"],
e:"El boosting construye la cadena UNO DESPUÉS DE OTRO: tras cada clasificador débil, AdaBoost sube exponencialmente el peso de los ejemplos mal clasificados y baja el de los acertados, de modo que el siguiente se concentre en lo difícil. Al final, voto ponderado por la fiabilidad αₜ de cada regla. El reverso de la moneda: esa obsesión por lo difícil lo hace sensible al ruido/outliers (donde el bagging es robusto).",
w:{0:"Paralelo + bootstrap independiente es la definición de BAGGING: en boosting cada clasificador depende de los errores de los anteriores.",
   2:"Las muestras bien clasificadas no se eliminan: REDUCEN su peso pero siguen presentes (si se eliminaran, el modelo las olvidaría y volvería a fallarlas)."}},
q34:{c:0,o:[
 "aplicando 1NN sobre los centroides de cada clase, calculados como la media de sus ejemplos",
 "buscando sus k ejemplos más próximos del conjunto y votando la clase mayoritaria entre ellos",
 "proyectándolo sobre la dirección de máxima varianza y aplicando un umbral de decisión"],
e:"Entrenamiento: un centroide por clase = media de los atributos de sus ejemplos. Clasificación: distancia del nuevo ejemplo a cada centroide y gana el más cercano (1NN sobre centroides). Solo C comparaciones — eficiencia máxima — a costa de asumir que un punto resume bien cada clase (falla con clases multimodales o no convexas). Además equivale a un clasificador LINEAL: w = p−n, b = −½(⟨p,p⟩−⟨n,n⟩).",
w:{1:"Comparar con los k ejemplos más próximos del conjunto completo es kNN clásico: el método de centroides comprime cada clase en un solo prototipo.",
   2:"Proyección sobre la máxima varianza es PCA (y con umbral, un clasificador sobre la 1ª componente): nada que ver con centroides por clase."}},
q165:{c:0,o:[
 "B, que acumula 3 de los 5 votos emitidos",
 "A, si los dos primeros clasificadores son los más precisos del conjunto",
 "depende: sin las probabilidades de cada clasificador no puede decidirse"],
e:"Hard voting (majority voting) = recuento simple de votos: B suma 3 y A suma 2 → B. Ni el orden de emisión ni la precisión individual importan, salvo que se asignen PESOS explícitos a los clasificadores (variante ponderada, que habría que indicar). Contraste con soft voting: ese sí necesita las probabilidades, porque promedia confianzas en lugar de contar votos.",
w:{1:"La precisión de cada clasificador solo cuenta en el voto PONDERADO (con pesos asignados); el hard voting estándar trata todos los votos por igual.",
   2:"Las probabilidades hacen falta para el SOFT voting; el hard se decide solo con los votos, y aquí hay mayoría clara 3-2."}},
q87:{c:0,o:["Adam","RMSProp","SGD con momentum"],
e:"La PEC4 compila sus modelos con Adam (learning_rate=0.001), el optimizador por defecto en deep learning moderno: combina la inercia del momentum con las tasas adaptativas por parámetro de RMSProp. Los tres candidatos son optimizadores legítimos de redes — la pregunta va de recordar cuál se usó — pero Adam es además el «estándar razonable» cuando no hay motivo para otra cosa.",
w:{1:"RMSProp es real y respetable (adapta la tasa por parámetro), pero la PEC4 usa Adam — que de hecho incorpora la idea de RMSProp y le añade momentum.",
   2:"SGD+momentum es el clásico (y a veces generaliza mejor), pero no fue el elegido en la PEC4."}}

q78:{c:1,o:[
 "porque acota cada salida entre 0 y 1 de forma independiente para cada una de las clases",
 "porque convierte las salidas en un vector de probabilidades que suman 1 (una por clase)",
 "porque introduce la no linealidad necesaria para que la red aproxime fronteras complejas"],
e:"Softmax exponencia cada salida y la divide por la suma de todas: el resultado es un vector de valores positivos que SUMAN 1 — una distribución de probabilidad sobre las clases. Eso codifica la exclusividad (subir una clase baja las demás) y permite leer la predicción como P(clase|entrada), eligiendo el argmax. Mapa de salidas: regresión → lineal; binaria/multietiqueta → sigmoide(s); multiclase excluyente → softmax.",
w:{0:"Acotar cada salida POR SEPARADO en (0,1) es lo que hacen sigmoides independientes (multietiqueta): no garantizan que sumen 1, que es la gracia de softmax.",
